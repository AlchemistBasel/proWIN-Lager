<!DOCTYPE html>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Lorena's Portal"/>
  <meta name="theme-color" content="#1e3a8a"/>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito','Segoe UI',sans-serif;background:#eef3fc;min-height:100vh;-webkit-tap-highlight-color:transparent}
    input,select,textarea,button{font-family:inherit}
    input:focus,select:focus,textarea:focus{outline:2px solid #93c5fd;outline-offset:1px}
    @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideup{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    @keyframes splashOut{to{opacity:0;pointer-events:none}}
    @keyframes logoIn{from{opacity:0;transform:scale(0.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes textIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%,100%{opacity:0.6}50%{opacity:1}}
    @keyframes ringPulse{0%{transform:scale(1);opacity:0.4}100%{transform:scale(1.6);opacity:0}}
    .spinner{width:28px;height:28px;border:3px solid #bfdbfe;border-top:3px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:16px auto 0}
    @media(max-width:600px){
      .hdr-sub{display:none!important}
      .nav-label{display:none}
      .nav-btn{padding:10px 4px!important;flex:1;justify-content:center!important}
      .main-pad{padding:12px 10px 90px!important}
      .stat-val{font-size:18px!important}
      .prod-row-btn{width:34px!important;height:34px!important}
      .prod-row-btns{gap:3px!important}
      .drawer-inner{padding:20px 16px 32px!important;border-radius:20px 20px 0 0!important;max-height:90vh!important}
      .module-card{padding:20px 16px!important}
    }
    /* Safe area / Notch support */
    .safe-header{
      padding-top: env(safe-area-inset-top, 0px) !important;
    }
    .safe-nav{
      top: calc(56px + env(safe-area-inset-top, 0px)) !important;
    }
    .safe-bottom{
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)) !important;
    }
    .safe-home-top{
      top: calc(12px + env(safe-area-inset-top, 0px)) !important;
    }
    /* Swipe hint indicator */
    @keyframes swipeHint{0%{opacity:0;transform:translateX(12px)}40%{opacity:1}100%{opacity:0;transform:translateX(-4px)}}
  </style>
</head>

function statusOf(p) {
  if (p.stock===0)            return {label:"Aus",    color:"#dc2626",bg:"#fef2f2",dot:"#ef4444"};
  if (p.stock<=p.minStock)    return {label:"Wenig",  color:"#d97706",bg:"#fffbeb",dot:"#f59e0b"};
  return                             {label:"OK",     color:"#16a34a",bg:"#f0fdf4",dot:"#22c55e"};
}

function LoginScreen({onUnlock}) {
  const [pw,setPw]=useState(""); const [show,setShow]=useState(false);
  const [shake,setShake]=useState(false); const [err,setErr]=useState("");
  const tryLogin=(e)=>{
    e.preventDefault();
    if(pw===APP_PASSWORD){localStorage.setItem(STORAGE_KEY,"1");onUnlock();}
    else{setErr("Falsches Passwort – bitte nochmals versuchen");setShake(true);setPw("");setTimeout(()=>setShake(false),600);}
  };
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(145deg,${B[900]},#0891b2,${Z[600]})`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

          <span style={{fontSize:36,color:"#fff",fontWeight:900}}>L</span>
        </div>
        <h1 style={{margin:"0 0 6px",fontSize:26,fontWeight:900,color:B[900],letterSpacing:-.5}}>Lorena's Portal</h1>
        <p style={{margin:"0 0 36px",color:"#94a3b8",fontSize:14,fontWeight:500}}>proWIN & Zumba 💜</p>
        <form onSubmit={tryLogin}>
          <div style={{animation:shake?"shake .4s ease":undefined,marginBottom:16}}>
            <div style={{position:"relative"}}>
              <Ic n="lock" s={16} style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:B[400]}}/>
              <input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Passwort eingeben" autoFocus
                style={{width:"100%",padding:"14px 48px 14px 44px",border:`2px solid ${err?"#fecaca":B[100]}`,borderRadius:14,fontSize:16,background:"#f8faff",color:B[900]}}/>
              <button type="button" onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94a3b8"}}><Ic n="eye" s={16}/></button>
            </div>
            {err&&<p style={{marginTop:8,color:"#dc2626",fontSize:12,fontWeight:600,textAlign:"left"}}>{err}</p>}

        </form>
      </div>
    </div>
  );
}

// SWIPE BACK HOOK
// ══════════════════════════════════════════════════════════════════════════════
function useSwipeBack(onBack) {
  useEffect(()=>{
    let startX=0, startY=0, active=false;
    const onStart=(e)=>{
      const t=e.touches?e.touches[0]:e;
      startX=t.clientX; startY=t.clientY; active=true;
    };
    const onEnd=(e)=>{
      if(!active)return; active=false;
      const t=e.changedTouches?e.changedTouches[0]:e;
      const dx=t.clientX-startX;
      const dy=Math.abs(t.clientY-startY);
      // Right swipe from left edge (first 60px) or general right swipe > 80px and mostly horizontal
      if(dx>60&&dy<80&&(startX<60||dx>120)){onBack();}
    };
    document.addEventListener("touchstart",onStart,{passive:true});
    document.addEventListener("touchend",onEnd,{passive:true});
    return()=>{document.removeEventListener("touchstart",onStart);document.removeEventListener("touchend",onEnd);};
  },[onBack]);
}

// ── Monthly Income Chart ──────────────────────────────────────────────────────
function MonthlyChart({income,expenses}) {
  const [selected,setSelected]=useState(null);
  const MONTHS=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const currentMonth=new Date().getMonth();

  const data=useMemo(()=>{
    return MONTHS.map((_,i)=>{
      const inc=income.filter(x=>{
        const d=new Date(x.date); return d.getFullYear()===2026&&d.getMonth()===i;
      }).reduce((s,x)=>s+(x.amount||0),0);
      const exp=expenses.filter(x=>{
        const d=new Date(x.date); return d.getFullYear()===2026&&d.getMonth()===i;
      }).reduce((s,x)=>s+(x.amount||0),0);
      return {inc,exp,net:inc-exp};
    });
  },[income,expenses]);

  const maxVal=Math.max(...data.map(d=>d.inc),1);
  const totalYear=data.reduce((s,d)=>s+d.inc,0);
  const bestMonth=data.reduce((bi,d,i)=>d.inc>data[bi].inc?i:bi,0);

  return (
    <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:20,padding:"18px 16px",marginBottom:16}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
        <div>
          <div style={{fontWeight:900,fontSize:15,color:Z[900]}}>Einnahmen 2026</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>Total: <strong style={{color:Z[700]}}>{chf(totalYear)}</strong></div>
        </div>
        {selected!==null&&(
          <div style={{textAlign:"right",animation:"fadein .15s ease"}}>
            <div style={{fontWeight:900,fontSize:14,color:Z[700]}}>{chf(data[selected].inc)}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{MONTHS[selected]} · Netto {chf(data[selected].net)}</div>
          </div>
        )}
      </div>

      {/* Bars */}
      <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80,marginTop:14,marginBottom:8}}>
        {data.map((d,i)=>{
          const isSelected=selected===i;
          const isCurrent=i===currentMonth;
          const isFuture=i>currentMonth;
          const h=d.inc>0?Math.max(6,Math.round((d.inc/maxVal)*72)):4;
          return (
            <div key={i} onClick={()=>setSelected(selected===i?null:i)}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",gap:3}}>
              <div style={{
                width:"100%",height:h,
                background:isFuture?"#f1f5f9":isSelected?`linear-gradient(180deg,${Z[400]},${Z[600]})`:`linear-gradient(180deg,${Z[300]},${Z[500]})`,
                borderRadius:"4px 4px 2px 2px",
                transition:"all .2s",
                opacity:isFuture?0.35:1,
                boxShadow:isSelected?`0 4px 12px ${Z[400]}60`:"none",
                transform:isSelected?"scaleX(1.15)":"scaleX(1)",
              }}/>
              {/* Current month dot */}
              {isCurrent&&<div style={{width:4,height:4,borderRadius:"50%",background:Z[500]}}/>}
            </div>
          );
        })}
      </div>

      {/* Month labels */}
      <div style={{display:"flex",gap:4}}>
        {MONTHS.map((m,i)=>(
          <div key={i} style={{flex:1,textAlign:"center",fontSize:9,fontWeight:selected===i?900:600,color:selected===i?Z[600]:i===currentMonth?"#64748b":"#94a3b8",transition:"all .15s"}}>
            {m}
          </div>
        ))}
      </div>

      {/* Best month pill */}
      {totalYear>0&&(
        <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
          <div style={{fontSize:11,fontWeight:700,color:Z[700],background:Z[50],borderRadius:20,padding:"3px 10px",border:`1px solid ${Z[200]}`}}>
            🏆 Bester Monat: {MONTHS[bestMonth]} · {chf(data[bestMonth].inc)}
          </div>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",background:"#f8faff",borderRadius:20,padding:"3px 10px",border:"1px solid #e2e8f0"}}>
            Ø {chf(Math.round(totalYear/Math.max(1,data.filter(d=>d.inc>0).length)))} / Monat
          </div>
        </div>
      )}
    </div>
  );
}

const ABO_TYPES = [
  {id:"probe",   label:"Probestunde",  icon:"star",  color:"#0891b2", sessions:1},
  {id:"einzel",  label:"Einzelstunde", icon:"music", color:Z[600],    sessions:1},
  {id:"abo5",    label:"5er-Abo",      icon:"star",  color:"#0891b2", sessions:5,  bonus:1},
  {id:"abo10",   label:"10er-Abo",     icon:"star",  color:"#16a34a", sessions:10, bonus:1},
];

function getAboLabel(type) {
  const a=ABO_TYPES.find(x=>x.id===type);
  return a?a.label:type;
}

function getAboPrice(type,prices) {
  if(type==="probe")  return prices.probe;
  if(type==="einzel") return prices.einzel;
  if(type==="abo5")   return prices.abo5;
  if(type==="abo10")  return prices.abo10;
  return 0;
}

function getAboSessions(type) {
  const a=ABO_TYPES.find(x=>x.id===type);
  if(!a) return 1;
  return (a.sessions||1)+(a.bonus||0); // total including bonus
}

// Member modal – neu: kombiniert mit Einnahme + Mehrfach-Datum-Auswahl
function MemberModal({member,onSave,onClose,prices}) {
  const isEdit=!!member;
  const [f,setF]=useState(member||{name:"",phone:"",email:"",notes:"",aboType:"einzel",aboStart:today(),sessionsLeft:1,active:true});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));

  // Mehrere Daten (nur bei neuem Teilnehmer, für Nachtragseinnahmen)
  const [selectedDates,setSelectedDates]=useState([]);
  const [showCalendar,setShowCalendar]=useState(false);

  // Kalender: Montage von 01.01 bis heute
  const mondaysSinceJan=useMemo(()=>{
    const mondays=[];
    const d=new Date("2026-01-05"); // erster Montag 2026
    const today_=new Date();
    today_.setHours(23,59,59,999);
    while(d<=today_){
      mondays.push(d.toISOString().slice(0,10));
      d.setDate(d.getDate()+7);
    }
    return mondays.reverse(); // neueste zuerst
  },[]);

  const toggleDate=(dt)=>setSelectedDates(prev=>prev.includes(dt)?prev.filter(x=>x!==dt):[...prev,dt]);

  const isAbo=f.aboType==="abo5"||f.aboType==="abo10";
  const showDatePicker=!isEdit; // immer anzeigen bei neuen Teilnehmern

  const handleAboChange=(type)=>{
    const sessions=getAboSessions(type);
    s("aboType",type);
    if(!isEdit) s("sessionsLeft",sessions);
    setSelectedDates([]);
  };

  const submit=(e)=>{
    e.preventDefault();
    if(!f.name.trim())return;
    // Für Abos: Lektionen = Total - bereits besucht
    const totalSessions=getAboSessions(f.aboType);
    const sessionsLeft=isAbo?Math.max(0,totalSessions-selectedDates.length):f.sessionsLeft;
    onSave({
      member:{...f,aboPrice:getAboPrice(f.aboType,prices),sessionsLeft},
      incomeDates:isEdit?[]:selectedDates.length>0?selectedDates:[f.aboStart],
      isEdit,
    });
  };

  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:Z[900]}}>{isEdit?"Teilnehmer bearbeiten":"Neue Teilnehmerin"}</h3>
      <form onSubmit={submit}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <Lbl t="Name *"><input required value={f.name} onChange={e=>s("name",e.target.value)} style={inp}/></Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Lbl t="Telefon"><input value={f.phone} onChange={e=>s("phone",e.target.value)} style={inp} placeholder="+41…"/></Lbl>
            <Lbl t="E-Mail"><input value={f.email} onChange={e=>s("email",e.target.value)} style={inp} placeholder="name@…"/></Lbl>
          </div>
          <Lbl t="Abo-Typ">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {ABO_TYPES.map(a=>(
                <div key={a.id} onClick={()=>handleAboChange(a.id)}
                  style={{padding:"10px 12px",borderRadius:12,border:`2px solid ${f.aboType===a.id?a.color:B[100]}`,background:f.aboType===a.id?a.color+"10":"#f8faff",cursor:"pointer",transition:"all .15s"}}>
                  <div style={{fontWeight:800,fontSize:13,color:f.aboType===a.id?a.color:B[800]}}>{a.label}</div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{chf(getAboPrice(a.id,prices))}{a.bonus?` · +${a.bonus} gratis`:""}</div>
                </div>
              ))}
            </div>
          </Lbl>

          {/* Datum-Auswahl – für alle Typen bei neuen Teilnehmern */}
          {showDatePicker&&(
            <div>
              <label style={{fontSize:11,color:"#94a3b8",fontWeight:700,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>
                {isAbo?"Bereits besuchte Lektionen (seit Jan. 2026)":"Besuchte Lektionen (seit Jan. 2026)"}
              </label>
              <button type="button" onClick={()=>setShowCalendar(v=>!v)}
                style={{width:"100%",padding:"10px 14px",background:Z[50],border:`1.5px solid ${Z[200]}`,borderRadius:12,fontSize:13,fontWeight:700,color:Z[700],cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{selectedDates.length===0?"Daten auswählen…":`${selectedDates.length} Lektion${selectedDates.length!==1?"en":""} ausgewählt`}</span>
                <Ic n={showCalendar?"up":"down"} s={14}/>
              </button>
              {showCalendar&&(
                <div style={{marginTop:8,background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:12,maxHeight:220,overflowY:"auto",padding:8,display:"flex",flexDirection:"column",gap:4}}>
                  {mondaysSinceJan.map(dt=>{
                    const sel=selectedDates.includes(dt);
                    const d=new Date(dt);
                    const lbl=d.toLocaleDateString("de-CH",{day:"2-digit",month:"short",year:"numeric"});
                    return (
                      <div key={dt} onClick={()=>toggleDate(dt)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,background:sel?Z[50]:"transparent",border:`1px solid ${sel?Z[300]:"transparent"}`,cursor:"pointer",transition:"all .1s"}}>
                        <div style={{width:22,height:22,borderRadius:6,background:sel?Z[500]:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#fff",fontSize:12,fontWeight:900}}>
                          {sel?"✓":""}
                        </div>
                        <span style={{fontSize:13,fontWeight:sel?700:500,color:sel?Z[800]:"#64748b"}}>Mo. {lbl}</span>
                      </div>
                    );
                  })}
                </div>
              )}
              {isAbo&&selectedDates.length>0&&(
                <div style={{marginTop:6,background:Z[50],borderRadius:10,padding:"8px 12px",fontSize:12,color:Z[700],fontWeight:600}}>
                  📊 {getAboSessions(f.aboType)-selectedDates.length} von {getAboSessions(f.aboType)} Lektionen übrig
                </div>
              )}
              {!isAbo&&selectedDates.length>0&&(
                <div style={{marginTop:6,background:Z[50],borderRadius:10,padding:"8px 12px",fontSize:12,color:Z[700],fontWeight:600}}>
                  💰 {selectedDates.length}× {chf(getAboPrice(f.aboType,prices))} = {chf(selectedDates.length*getAboPrice(f.aboType,prices))} total
                </div>
              )}
            </div>
          )}

          {/* Abo-Start */}
          <Lbl t="Abo-Start"><input type="date" value={f.aboStart} onChange={e=>s("aboStart",e.target.value)} style={inp}/></Lbl>

          {/* Lektionen übrig – nur beim Bearbeiten oder Abo */}
          {(isEdit||isAbo)&&(
            <Lbl t="Lektionen übrig"><input type="number" min="0" value={f.sessionsLeft} onChange={e=>s("sessionsLeft",parseInt(e.target.value)||0)} style={inp}/></Lbl>
          )}

          <Lbl t="Status">
            <div style={{display:"flex",gap:8}}>
              {[["Aktiv",true],["Inaktiv",false]].map(([lb,val])=>(
                <div key={lb} onClick={()=>s("active",val)}
                  style={{flex:1,padding:"10px",borderRadius:12,border:`2px solid ${f.active===val?(val?"#16a34a":"#dc2626"):B[100]}`,background:f.active===val?(val?"#f0fdf4":"#fff5f5"):"#f8faff",cursor:"pointer",textAlign:"center",fontWeight:800,fontSize:13,color:f.active===val?(val?"#16a34a":"#dc2626"):B[600]}}>
                  {lb}
                </div>
              ))}
            </div>
          </Lbl>
          <Lbl t="Notizen"><textarea value={f.notes} onChange={e=>s("notes",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></Lbl>
        </div>
        <div style={{display:"flex",gap:10,marginTop:18}}>

// ZUMBA MODULE
// ══════════════════════════════════════════════════════════════════════════════
function ZumbaModule({col,flash,syncing,setSyncing,onBack}) {
  const [members,setMembers]=useState([]);
  const [income,setIncome]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [classes,setClasses]=useState([]);
  const [tab,setTab]=useState("dashboard");
  const [modal,setModal]=useState(null);

  useSwipeBack(useCallback(()=>{if(!modal)onBack();},[modal,onBack]));
  const [prices,setPricesState]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("zumba_prices")||"null")||DEFAULT_ZUMBA_PRICES;}catch{return DEFAULT_ZUMBA_PRICES;}
  });
  const savePrices=(p)=>{setPricesState(p);localStorage.setItem("zumba_prices",JSON.stringify(p));};

  useEffect(()=>{
    const mq=query(col("zumba_members"),orderBy("name"));
    const iq=query(col("zumba_income"),orderBy("date","desc"));
    const eq=query(col("zumba_expenses"),orderBy("date","desc"));
    const cq=query(col("zumba_classes"),orderBy("date","desc"));
    const um=onSnapshot(mq,s=>setMembers(s.docs.map(d=>({id:d.id,...d.data()}))));
    const ui=onSnapshot(iq,s=>setIncome(s.docs.map(d=>({id:d.id,...d.data()}))));
    const ue=onSnapshot(eq,s=>setExpenses(s.docs.map(d=>({id:d.id,...d.data()}))));
    const uc=onSnapshot(cq,s=>setClasses(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{um();ui();ue();uc();};
  },[]);

  const saveMember=async(payload)=>{
    setSyncing(true);
    try{
      const {member:m,incomeDates=[],isEdit}=payload;
      const id=m.id||uid();
      await setDoc(doc(col("zumba_members"),id),{...m,id,updatedAt:serverTimestamp()});
      if(!isEdit&&incomeDates.length>0){
        const price=getAboPrice(m.aboType,prices);
        if(m.aboType==="abo5"||m.aboType==="abo10"){
          // Abo: eine Einnahme für den ganzen Abo-Preis
          const incId=uid();
          const firstDate=incomeDates.slice().sort()[0];
          await setDoc(doc(col("zumba_income"),incId),{id:incId,date:firstDate,type:m.aboType,memberId:id,memberName:m.name,amount:price,notes:`Abo erfasst · ${incomeDates.length} Lektionen nachgetragen`,createdAt:serverTimestamp()});
        } else {
          // Einzel/Probe: pro Datum eine separate Einnahme
          for(const dt of incomeDates){
            const incId=uid();
            await setDoc(doc(col("zumba_income"),incId),{id:incId,date:dt,type:m.aboType,memberId:id,memberName:m.name,amount:price,notes:"Automatisch bei Anmeldung erfasst",createdAt:serverTimestamp()});
          }
        }
      }
      flash(isEdit?"Aktualisiert ✓":incomeDates.length>0?`Gespeichert + ${incomeDates.length} Einnahme${incomeDates.length!==1?"n":""} ✓`:"Hinzugefügt ✓");
    }catch(e){flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };
  const renewAbo=async(m,{payment="Twint",notes=""}={})=>{
    setSyncing(true);
    try{
      const totalSessions=getAboSessions(m.aboType);
      const price=getAboPrice(m.aboType,prices);
      await setDoc(doc(col("zumba_members"),m.id),{...m,sessionsLeft:totalSessions,aboStart:today(),updatedAt:serverTimestamp()});
      const incId=uid();
      const noteText=[`Abo erneuert · ${getAboLabel(m.aboType)}`,payment,notes].filter(Boolean).join(" · ");
      await setDoc(doc(col("zumba_income"),incId),{id:incId,date:today(),type:m.aboType,memberId:m.id,memberName:m.name,amount:price,payment,notes:noteText,createdAt:serverTimestamp()});
      flash(`Abo erneuert ✓ · ${chf(price)} (${payment})`);
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const delMember=async(id)=>{if(!window.confirm("Teilnehmerin löschen?"))return;setSyncing(true);try{await deleteDoc(doc(col("zumba_members"),id));flash("Gelöscht",false);}catch{flash("Fehler",false);}setSyncing(false);};

  const saveIncome=async(inc)=>{
    setSyncing(true);
    try{
      const id=uid();
      await setDoc(doc(col("zumba_income"),id),{...inc,id,createdAt:serverTimestamp()});
      // Deduct session from member if linked
      if(inc.memberId){
        const m=members.find(x=>x.id===inc.memberId);
        if(m&&m.sessionsLeft>0){
          await setDoc(doc(col("zumba_members"),m.id),{...m,sessionsLeft:Math.max(0,m.sessionsLeft-1),updatedAt:serverTimestamp()});
        }
      }
      flash("Einnahme gespeichert ✓");
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const saveExpense=async(exp)=>{setSyncing(true);try{const id=uid();await setDoc(doc(col("zumba_expenses"),id),{...exp,id,createdAt:serverTimestamp()});flash("Ausgabe gespeichert ✓");}catch{flash("Fehler",false);}setSyncing(false);setModal(null);};

  const saveClass=async(cls)=>{
    setSyncing(true);
    try{
      const id=uid();
      await setDoc(doc(col("zumba_classes"),id),{...cls,id,createdAt:serverTimestamp()});
      // Deduct 1 session from each attendee
      for(const mid of (cls.attendees||[])){
        const m=members.find(x=>x.id===mid);
        if(m&&m.sessionsLeft>0){
          await setDoc(doc(col("zumba_members"),m.id),{...m,sessionsLeft:Math.max(0,m.sessionsLeft-1),updatedAt:serverTimestamp()});
        }
      }
      // Auto-add rent expense
      const expId=uid();
      await setDoc(doc(col("zumba_expenses"),expId),{id:expId,date:cls.date,category:"Raummiete",amount:prices.miete,notes:`Automatisch: Kurs ${dateStr(cls.date)}`,createdAt:serverTimestamp()});
      flash(`Kurs gespeichert ✓ · Raummiete CHF ${prices.miete} verbucht`);
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const exportCSV=(inc,exp)=>{
    const rows=[];
    rows.push(["Datum","Typ","Name/Kategorie","Betrag CHF","Zahlungsart","Notiz"]);
    inc.forEach(x=>rows.push([x.date,getAboLabel(x.type),x.memberName||"",x.amount.toFixed(2),x.payment||"",x.notes||""]));
    exp.forEach(x=>rows.push([x.date,"Ausgabe",x.category,"-"+x.amount.toFixed(2),"",x.notes||""]));
    rows.sort((a,b)=>a[0]<b[0]?-1:1);
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const bom="\uFEFF"; // UTF-8 BOM für Excel
    const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`Zumba_Finanzen_2026.csv`;a.click();
    URL.revokeObjectURL(url);
    flash("CSV exportiert ✓");
  };

  const totalIncome=income.reduce((s,x)=>s+(x.amount||0),0);
  const totalExpenses=expenses.reduce((s,x)=>s+(x.amount||0),0);
  const netResult=totalIncome-totalExpenses;
  const activeMembers=members.filter(m=>m.active).length;
  const lowAbo=members.filter(m=>m.active&&m.sessionsLeft<=1&&(m.aboType==="abo5"||m.aboType==="abo10")).length;

  // Next Monday calculation
  const nextMonday=useMemo(()=>{
    const d=new Date();
    const day=d.getDay();
    const diff=day===1?7:(8-day)%7;
    d.setDate(d.getDate()+diff);
    return d.toLocaleDateString("de-CH",{day:"2-digit",month:"long"});
  },[]);

  return (
    <div style={{minHeight:"100vh",background:"#fdf4ff"}}>
      {/* Header */}
      <header className="safe-header" style={{background:`linear-gradient(135deg,${Z[900]},${Z[600]})`,position:"sticky",top:0,zIndex:50,boxShadow:`0 4px 24px ${Z[900]}50`,paddingTop:"env(safe-area-inset-top,0px)"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 12px",display:"flex",alignItems:"center",height:56,gap:8}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:12,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0,WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}><Ic n="home" s={16}/></button>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
            <span style={{fontSize:22}}>💃</span>
            <div style={{fontWeight:900,fontSize:16,color:"#fff"}}>Zumba Kurse</div>
            <div className="hdr-sub" style={{fontSize:10,color:"rgba(255,255,255,0.65)",fontWeight:700,letterSpacing:.6,marginLeft:4}}>MONTAG 20:00</div>
          </div>
          {lowAbo>0&&<span style={{background:"rgba(255,251,235,0.9)",color:"#d97706",border:"1px solid #fde68a",padding:"3px 7px",borderRadius:20,fontSize:11,fontWeight:700}}>{lowAbo} fast leer</span>}
        </div>
      </header>

      {/* Nav */}
      <nav style={{background:"#fff",borderBottom:`1px solid ${Z[100]}`,position:"sticky",top:"calc(56px + env(safe-area-inset-top,0px))",zIndex:40}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 4px",display:"flex"}}>
          {[["dashboard","Übersicht","grid"],["members","Teilnehmer","users"],["finances","Finanzen","cash"],["classes","Kurse","cal"]].map(([id,lb,ic])=>(
            <button key={id} onClick={()=>setTab(id)} className="nav-btn" style={{display:"flex",alignItems:"center",gap:5,padding:"12px 8px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,color:tab===id?Z[600]:"#94a3b8",borderBottom:`2.5px solid ${tab===id?Z[500]:"transparent"}`,flex:1,justifyContent:"center"}}>
              <Ic n={ic} s={15}/><span className="nav-label">{lb}</span>
            </button>
          ))}
        </div>
      </nav>

      <main className="main-pad" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px",paddingBottom:"calc(80px + env(safe-area-inset-bottom,0px))"}}>

        {/* DASHBOARD */}
        {tab==="dashboard"&&<div style={{animation:"fadein .3s ease"}}>
          {/* Next class banner */}
          <div style={{background:`linear-gradient(135deg,${Z[700]},${Z[500]})`,borderRadius:20,padding:"18px 20px",marginBottom:20,color:"#fff",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:36}}>💃</div>
            <div>
              <div style={{fontWeight:900,fontSize:16}}>Nächster Kurs</div>
              <div style={{fontSize:14,opacity:.9,marginTop:2}}>Montag, {nextMonday} · 20:00 Uhr</div>
              <div style={{fontSize:12,opacity:.7,marginTop:2}}>{activeMembers} aktive Teilnehmer</div>
            </div>
            <button onClick={()=>setModal({type:"class"})} style={{marginLeft:"auto",padding:"10px 14px",background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.35)",borderRadius:12,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
              Kurs erfassen
            </button>
          </div>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
            <Stat icon="users" label="Aktive Teilnehmer" value={activeMembers} accent={Z[600]}/>
            <Stat icon="cal" label="Kurse total" value={classes.length} accent="#0891b2"/>
            <Stat icon="cash" label="Einnahmen (gesamt)" value={chf(totalIncome)} accent="#16a34a"/>
            <Stat icon="trend" label="Gewinn / Verlust" value={chf(netResult)} accent={netResult>=0?"#16a34a":"#dc2626"} sub={netResult>=0?"positiv 🎉":"negativ"}/>
          </div>

          {/* Monats-Chart */}
          <MonthlyChart income={income} expenses={expenses}/>

          {/* Abo-Warnungen – nur für 5er/10er-Abo */}
          {members.filter(m=>m.active&&m.sessionsLeft<=1&&(m.aboType==="abo5"||m.aboType==="abo10")).length>0&&(
            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:16,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontWeight:900,fontSize:14,color:"#92400e",marginBottom:10}}>⚠️ Abo fast leer</div>
              {members.filter(m=>m.active&&m.sessionsLeft<=1&&(m.aboType==="abo5"||m.aboType==="abo10")).map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #fde68a"}}>
                  <span style={{fontWeight:700,color:"#92400e"}}>{m.name}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,fontWeight:700,color:m.sessionsLeft===0?"#dc2626":"#d97706"}}>
                      {m.sessionsLeft===0?"Leer!":`${m.sessionsLeft} Lekt. übrig`}
                    </span>
                    <button onClick={()=>setModal({type:"renew",member:m})}
                      style={{padding:"4px 10px",background:Z[600],color:"#fff",border:"none",borderRadius:8,fontSize:11,fontWeight:800,cursor:"pointer"}}>
                      🔄 Erneuern
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Recent income */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>Letzte Einnahmen</span>
              <button onClick={()=>setModal({type:"income"})} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",background:Z[600],color:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:800,cursor:"pointer"}}>
                <Ic n="plus" s={12}/>Neu
              </button>
            </div>
            {income.slice(0,5).map(inc=>(
              <div key={inc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${Z[50]}`}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:Z[900]}}>{inc.memberName||"–"}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{getAboLabel(inc.type)} · {dateStr(inc.date)}</div>
                </div>
                <div style={{fontWeight:900,fontSize:15,color:"#16a34a"}}>+{chf(inc.amount)}</div>
              </div>
            ))}
            {income.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Einnahmen</div>}
          </div>

          {/* Quick add expense */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>Ausgaben</span>
              <button onClick={()=>setModal({type:"expense"})} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:20,fontSize:12,fontWeight:800,cursor:"pointer"}}>
                <Ic n="plus" s={12}/>Ausgabe
              </button>
            </div>
            <div style={{marginTop:10,display:"flex",justifyContent:"space-between",background:"#f8faff",borderRadius:12,padding:"12px 14px"}}>
              <span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}>Total Ausgaben</span>
              <span style={{fontWeight:900,fontSize:15,color:"#dc2626"}}>{chf(totalExpenses)}</span>
            </div>
          </div>
        </div>}

        {/* MEMBERS */}
        {tab==="members"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:900,color:Z[900]}}>Teilnehmerinnen</h2>
              <div style={{fontSize:13,color:"#94a3b8"}}>{activeMembers} aktiv · {members.length-activeMembers} inaktiv</div>
            </div>
            <button onClick={()=>setModal({type:"member"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:Z[600],color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Neu
            </button>
          </div>

          {/* Active */}
          {members.filter(m=>m.active).length===0&&<div style={{textAlign:"center",padding:40,background:"#fff",borderRadius:16,border:`2px dashed ${Z[200]}`}}>
            <div style={{fontSize:36,marginBottom:8}}>💃</div>
            <div style={{fontWeight:800,fontSize:15,color:Z[800],marginBottom:4}}>Noch keine Teilnehmer</div>
            <p style={{color:"#94a3b8",fontSize:13}}>Füge deine erste Teilnehmerin hinzu</p>
          </div>}

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {members.sort((a,b)=>b.active-a.active||a.name.localeCompare(b.name)).map(m=>{
              const aboInfo=ABO_TYPES.find(x=>x.id===m.aboType);
              const sessionColor=m.sessionsLeft===0?"#dc2626":m.sessionsLeft<=1?"#d97706":"#16a34a";
              return (
                <div key={m.id} style={{background:"#fff",border:`2px solid ${m.active?Z[100]:"#e2e8f0"}`,borderRadius:16,padding:"14px 16px",opacity:m.active?1:.7}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:44,height:44,borderRadius:14,background:m.active?`linear-gradient(135deg,${Z[500]},${Z[300]})`:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#fff",flexShrink:0}}>
                      {m.name[0]?.toUpperCase()||"?"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                        <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>{m.name}</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,background:m.active?Z[100]:"#f1f5f9",color:m.active?Z[700]:"#64748b"}}>{m.active?"Aktiv":"Inaktiv"}</span>
                      </div>
                      <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>{getAboLabel(m.aboType)}{aboInfo?.bonus?` (+${aboInfo.bonus} gratis)`:""}</div>
                      {(m.aboType==="abo5"||m.aboType==="abo10")&&(
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{flex:1,height:6,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${Math.min(100,(m.sessionsLeft/getAboSessions(m.aboType||"einzel"))*100)}%`,background:sessionColor,borderRadius:4,transition:"width .3s"}}/>
                        </div>
                        <span style={{fontSize:12,fontWeight:800,color:sessionColor,whiteSpace:"nowrap"}}>{m.sessionsLeft} Lekt.</span>
                      </div>
                      )}
                      {m.phone&&<div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>📱 {m.phone}</div>}
                    </div>
                    <div style={{display:"flex",gap:5,flexShrink:0}}>
                      <button onClick={()=>setModal({type:"member",member:m})} style={{width:32,height:32,borderRadius:8,background:Z[50],color:Z[600],border:`1px solid ${Z[200]}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" s={13}/></button>
                      <button onClick={()=>delMember(m.id)} style={{width:32,height:32,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={13}/></button>
                    </div>
                  </div>
                  {/* Abo erneuern Button – nur für 5er/10er wenn leer oder fast leer */}
                  {m.active&&(m.aboType==="abo5"||m.aboType==="abo10")&&m.sessionsLeft<=1&&(
                    <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${Z[50]}`}}>
                      <button onClick={()=>setModal({type:"renew",member:m})}
                        style={{width:"100%",padding:"9px 14px",background:`linear-gradient(135deg,${Z[600]},${Z[400]})`,color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        🔄 Abo erneuern · {chf(getAboPrice(m.aboType,prices))}
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>}

        {/* FINANCES */}
        {tab==="finances"&&<div style={{animation:"fadein .3s ease"}}>
          {/* Summary */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            <Stat icon="cash"  label="Einnahmen"  value={chf(totalIncome)}   accent="#16a34a"/>
            <Stat icon="trend" label="Ausgaben"   value={chf(totalExpenses)} accent="#dc2626"/>
            <Stat icon="bar"   label="Resultat"   value={chf(netResult)}     accent={netResult>=0?"#16a34a":"#dc2626"}/>
            <Stat icon="cal"   label="Kurse"      value={classes.length}     accent={Z[600]}/>
          </div>

          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <button onClick={()=>setModal({type:"income"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Einnahme
            </button>
            <button onClick={()=>setModal({type:"expense"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Ausgabe
            </button>
            <button onClick={()=>exportCSV(income,expenses)} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"#f8faff",color:B[600],border:`1px solid ${B[200]}`,borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer",marginLeft:"auto"}}>
              <Ic n="dl" s={14}/>Export CSV
            </button>
          </div>

          {/* Income list */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{fontWeight:900,fontSize:15,color:Z[900],marginBottom:12}}>💚 Einnahmen ({income.length})</div>
            {income.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Einnahmen</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {income.map(inc=>(
                <div key={inc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#f0fdf4",borderRadius:12}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#14532d"}}>{inc.memberName||"Anonym"}</div>
                    <div style={{fontSize:11,color:"#4ade80",display:"flex",alignItems:"center",gap:6}}>
                      {getAboLabel(inc.type)} · {dateStr(inc.date)}
                      {inc.payment&&<span style={{background:"#dcfce7",color:"#166534",padding:"1px 7px",borderRadius:20,fontWeight:700,fontSize:10}}>{inc.payment==="Twint"?"📱 Twint":inc.payment==="Bar"?"💵 Bar":"🏦 "+inc.payment}</span>}
                    </div>
                    {inc.notes&&<div style={{fontSize:11,color:"#94a3b8",fontStyle:"italic"}}>{inc.notes}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontWeight:900,fontSize:15,color:"#16a34a"}}>+{chf(inc.amount)}</div>
                    <button onClick={async()=>{if(!window.confirm("Einnahme löschen?"))return;await deleteDoc(doc(col("zumba_income"),inc.id));flash("Gelöscht",false);}} style={{width:28,height:28,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={12}/></button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Expense list */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16}}>
            <div style={{fontWeight:900,fontSize:15,color:Z[900],marginBottom:12}}>❤️ Ausgaben ({expenses.length})</div>
            {expenses.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Ausgaben</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {expenses.map(exp=>(
                <div key={exp.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#fff5f5",borderRadius:12}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#7f1d1d"}}>{exp.category}</div>
                    <div style={{fontSize:11,color:"#fca5a5"}}>{dateStr(exp.date)}</div>
                    {exp.notes&&<div style={{fontSize:11,color:"#94a3b8",fontStyle:"italic"}}>{exp.notes}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontWeight:900,fontSize:15,color:"#dc2626"}}>−{chf(exp.amount)}</div>
                    <button onClick={async()=>{if(!window.confirm("Ausgabe löschen?"))return;await deleteDoc(doc(col("zumba_expenses"),exp.id));flash("Gelöscht",false);}} style={{width:28,height:28,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={12}/></button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>}

        {/* CLASSES */}
        {tab==="classes"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:900,color:Z[900]}}>Kurse</h2>
              <div style={{fontSize:13,color:"#94a3b8"}}>Jeden Montag 20:00 Uhr</div>
            </div>
            <button onClick={()=>setModal({type:"class"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:Z[600],color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Kurs erfassen
            </button>
          </div>

          {classes.length===0&&<div style={{textAlign:"center",padding:60,background:"#fff",borderRadius:16,border:`2px dashed ${Z[200]}`}}>
            <div style={{fontSize:40,marginBottom:8}}>📅</div>
            <div style={{fontWeight:800,fontSize:15,color:Z[800],marginBottom:4}}>Noch keine Kurse</div>
            <p style={{color:"#94a3b8",fontSize:13}}>Erfasse deinen ersten Kurs</p>
          </div>}

          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {classes.map(cls=>(
              <div key={cls.id} style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontWeight:900,fontSize:15,color:Z[900]}}>📅 {dateStr(cls.date)}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{background:Z[100],color:Z[700],padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:800}}>{cls.count||0} Teilnehmer</span>
                    <button onClick={async()=>{if(!window.confirm("Kurs löschen?"))return;await deleteDoc(doc(col("zumba_classes"),cls.id));flash("Gelöscht",false);}} style={{width:28,height:28,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={12}/></button>
                  </div>
                </div>
                {cls.notes&&<div style={{fontSize:12,color:"#94a3b8",fontStyle:"italic",marginBottom:6}}>"{cls.notes}"</div>}
                {(cls.attendees||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {(cls.attendees||[]).map(mid=>{
                    const m=members.find(x=>x.id===mid);
                    return m?<span key={mid} style={{fontSize:11,fontWeight:700,background:Z[50],color:Z[700],padding:"2px 8px",borderRadius:20,border:`1px solid ${Z[200]}`}}>{m.name}</span>:null;
                  })}
                </div>}
              </div>
            ))}
          </div>
        </div>}
      </main>

      {/* Modals */}
      {modal?.type==="member"&&<MemberModal member={modal.member||null} onSave={saveMember} onClose={()=>setModal(null)} prices={prices}/>}
      {modal?.type==="renew"&&<RenewModal member={modal.member} onSave={(opts)=>renewAbo(modal.member,opts)} onClose={()=>setModal(null)} prices={prices}/>}
      {modal?.type==="income"&&<IncomeModal onSave={saveIncome} onClose={()=>setModal(null)} members={members} prices={prices}/>}
      {modal?.type==="expense"&&<ExpenseModal onSave={saveExpense} onClose={()=>setModal(null)}/>}
      {modal?.type==="class"&&<ClassModal onSave={saveClass} onClose={()=>setModal(null)} members={members}/>}

      {/* Settings FAB */}
      {tab==="dashboard"&&<div style={{position:"fixed",bottom:"calc(24px + env(safe-area-inset-bottom,0px))",right:16,zIndex:90}}>
        <button onClick={()=>setModal({type:"settings"})} style={{width:48,height:48,borderRadius:24,background:`linear-gradient(135deg,${Z[700]},${Z[500]})`,border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 6px 24px ${Z[600]}60`}}><Ic n="cog" s={20}/></button>
      </div>}

      {modal?.type==="settings"&&(
        <Drawer onClose={()=>setModal(null)}>
          <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:Z[900]}}>Preise & Einstellungen</h3>
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            {[["probe","Probestunde CHF"],["einzel","Einzelstunde CHF"],["abo5","5er-Abo CHF"],["abo10","10er-Abo CHF"],["miete","Raummiete/Kurs CHF"]].map(([key,label])=>(
              <Lbl key={key} t={label}>
                <input type="number" step="0.01" min="0" defaultValue={prices[key]} onBlur={e=>savePrices({...prices,[key]:parseFloat(e.target.value)||0})} style={inp}/>
              </Lbl>
            ))}
            <div style={{background:Z[50],borderRadius:12,padding:"12px 14px",fontSize:12,color:Z[700],fontWeight:600}}>
              💡 5er-Abo: 5 Lektionen + 1 gratis (total 6)<br/>10er-Abo: 10 Lektionen + 1 gratis (total 11)
            </div>
          </div>
          <button onClick={()=>setModal(null)} style={{width:"100%",marginTop:18,...aBtn(`linear-gradient(135deg,${Z[700]},${Z[500]})`)}}>Fertig</button>
        </Drawer>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [unlocked,setUnlocked]=useState(!!localStorage.getItem(STORAGE_KEY));
  const [splash,setSplash]=useState(true);
  const [module,setModule]=useState(null); // null=home, "prowin", "zumba"
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState(null);

  // Aggregated stats for home screen
  const [prowinStats,setProwinStats]=useState({products:0,revenue:0,out:0});
  const [zumbaStats,setZumbaStats]=useState({members:0,income:0,classes:0});

  const col=(sub)=>collection(db,"users",USER_ID,sub);
  const flash=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2800);};

  // Load summary stats for home
  useEffect(()=>{
    if(!unlocked)return;
    const pq=query(col("products"),orderBy("name"));
    const sq=query(col("sales"),orderBy("date","desc"));
    const mq=query(col("zumba_members"),orderBy("name"));
    const iq=query(col("zumba_income"),orderBy("date","desc"));
    const cq=query(col("zumba_classes"),orderBy("date","desc"));

    const up=onSnapshot(pq,s=>{
      const ps=s.docs.map(d=>d.data());
      setProwinStats(x=>({...x,products:ps.length,out:ps.filter(p=>p.stock===0).length}));
    });
    const us=onSnapshot(sq,s=>{
      const ss=s.docs.map(d=>d.data());
      setProwinStats(x=>({...x,revenue:ss.reduce((a,b)=>a+(b.revenue||0),0)}));
    });
    const um=onSnapshot(mq,s=>{
      setZumbaStats(x=>({...x,members:s.docs.filter(d=>d.data().active).length}));
    });
    const ui=onSnapshot(iq,s=>{
      setZumbaStats(x=>({...x,income:s.docs.reduce((a,d)=>a+(d.data().amount||0),0)}));
    });
    const uc=onSnapshot(cq,s=>{
      setZumbaStats(x=>({...x,classes:s.docs.length}));
    });
    return()=>{up();us();um();ui();uc();};
  },[unlocked]);

  if(splash) return <SplashScreen onDone={()=>setSplash(false)}/>;
  if(!unlocked) return <LoginScreen onUnlock={()=>setUnlocked(true)}/>;

  return (
    <div>
      {/* Logout button on home */}
      {module===null&&(
        <div style={{position:"fixed",top:"calc(12px + env(safe-area-inset-top,0px))",right:16,zIndex:100}}>
          <button onClick={()=>{localStorage.removeItem(STORAGE_KEY);setUnlocked(false);}} title="Ausloggen"
            style={{width:36,height:36,borderRadius:18,background:"rgba(255,255,255,0.9)",border:`1px solid ${B[200]}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:B[600],boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>
            <Ic n="key" s={15}/>
          </button>
        </div>
      )}

      {module===null&&(
        <HomeScreen onSelect={setModule} prowinStats={prowinStats} zumbaStats={zumbaStats}/>
      )}

      {module==="prowin"&&(
        <ProwinModule col={col} flash={flash} syncing={syncing} setSyncing={setSyncing} onBack={()=>setModule(null)}/>
      )}

      {module==="zumba"&&(
        <ZumbaModule col={col} flash={flash} syncing={syncing} setSyncing={setSyncing} onBack={()=>setModule(null)}/>
      )}

      {toast&&<div style={{position:"fixed",bottom:"calc(24px + env(safe-area-inset-bottom,0px))",left:"50%",transform:"translateX(-50%)",background:toast.ok?B[800]:"#7f1d1d",color:"#fff",padding:"11px 22px",borderRadius:30,fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,.2)",zIndex:9999,whiteSpace:"nowrap",animation:"fadein .2s ease"}}>{toast.msg}</div>}
    </div>
  );
}

function waitAndRender() {
  if(window.__firebase){ReactDOM.createRoot(document.getElementById("root")).render(<App/>);}
  else{setTimeout(waitAndRender,50);}
}
waitAndRender();
</script>
</body>
</html>
