// ── Login ─────────────────────────────────────────────────────────────────────
function LoginScreen() {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const login = async () => {
    setLoading(true); setErr("");
    try { await signInWithPopup(auth, gProvider); }
    catch { setErr("Anmeldung fehlgeschlagen. Bitte nochmals versuchen."); }
    finally { setLoading(false); }
  };
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${B[50]},${B[100]},${B[200]})`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:24,padding:"40px 32px",maxWidth:380,width:"100%",textAlign:"center",boxShadow:`0 20px 60px ${B[200]}`}}>
        <div style={{width:64,height:64,background:`linear-gradient(135deg,${B[700]},${B[400]})`,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
          <Ic n="drop" s={30} style={{color:"#fff"}}/>
        </div>
        <h1 style={{margin:"0 0 6px",fontSize:24,fontWeight:900,color:B[900],letterSpacing:-.5}}>proWIN Lager</h1>
        <p style={{margin:"0 0 8px",color:"#94a3b8",fontSize:14}}>Lagerverwaltung · Cloud-Edition</p>
        <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center",margin:"0 0 28px",background:B[50],borderRadius:12,padding:"8px 16px"}}>
          <Ic n="cloud" s={14} style={{color:B[500]}}/>
          <span style={{fontSize:12,color:B[600],fontWeight:700}}>Echtzeit-Sync auf allen Geräten</span>
        </div>
        <button onClick={login} disabled={loading} style={{width:"100%",padding:"14px",background:"#fff",color:"#374151",border:"2px solid #e5e7eb",borderRadius:14,fontSize:15,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <Ic n="google" s={20} style={{color:"#4285f4"}}/>
          {loading?"Wird angemeldet…":"Mit Google anmelden"}
        </button>
        {err && <p style={{marginTop:12,color:"#dc2626",fontSize:13,fontWeight:600}}>{err}</p>}
        <p style={{marginTop:20,fontSize:12,color:"#94a3b8",lineHeight:1.6}}>Nur du hast Zugriff auf deine Daten.<br/>Änderungen erscheinen sofort auf allen Geräten.</p>
      </div>
    </div>
  );
}

function Stat({icon,label,value,accent}) {
  return (
    <div style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <div style={{width:30,height:30,borderRadius:9,background:accent+"18",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n={icon} s={14} style={{color:accent}}/></div>
        <span style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{label}</span>
      </div>
      <div style={{fontSize:22,fontWeight:900,color:B[900],letterSpacing:-.5}}>{value}</div>
    </div>
  );
}

function ProdCard({p,onEdit,onIn,onSale}) {
  const st=statusOf(p),cs=CAT_STYLE[p.category]||{bg:B[50],color:B[700],border:B[200]};
  const [err,setErr]=useState(false);
  const margin=p.sellPrice>0?((p.sellPrice-p.buyPrice)/p.sellPrice*100).toFixed(0):0;
  return (
    <div style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:18,overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 1px 4px rgba(30,64,175,.05)"}}>
      <div style={{height:145,background:B[50],display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
        {p.image&&!err?<img src={p.image} alt={p.name} onError={()=>setErr(true)} style={{width:"100%",height:"100%",objectFit:"contain",padding:10}}/>:<div style={{width:60,height:60,borderRadius:16,background:B[100],display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:B[600]}}>{ini(p.name)}</div>}
        <span style={{position:"absolute",top:10,right:10,background:st.bg,color:st.color,fontSize:10,fontWeight:800,padding:"3px 9px",borderRadius:12,border:`1px solid ${st.color}30`,display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:st.dot,display:"inline-block"}}/>{st.label}</span>
        <span style={{position:"absolute",top:10,left:10,background:cs.bg,color:cs.color,fontSize:10,fontWeight:800,padding:"3px 9px",borderRadius:12,border:`1px solid ${cs.border}`}}>{p.category}</span>
      </div>
      <div style={{padding:"12px 14px",flex:1}}>
        <div style={{fontWeight:800,fontSize:14,color:B[900],lineHeight:1.3,marginBottom:3}}>{p.name}</div>
        {p.description&&<div style={{fontSize:12,color:"#94a3b8",lineHeight:1.4,marginBottom:10}}>{p.description.slice(0,55)}{p.description.length>55?"…":""}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.4}}>Verkaufspreis</div>
            <div style={{fontSize:20,fontWeight:900,color:B[600],letterSpacing:-.5}}>{chf(p.sellPrice)}</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>EK: {chf(p.buyPrice)} · {margin}% Marge</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.4}}>Bestand</div>
            <div style={{fontSize:24,fontWeight:900,letterSpacing:-.5,color:p.stock===0?"#dc2626":p.stock<=p.minStock?"#d97706":B[800]}}>{p.stock}</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>Min: {p.minStock}</div>
          </div>
        </div>
      </div>
      <div style={{padding:"10px 14px",borderTop:`1px solid ${B[50]}`,display:"flex",gap:8}}>
        <button onClick={()=>onIn(p)} style={{flex:1,padding:"9px 4px",background:B[50],color:B[600],border:`1px solid ${B[200]}`,borderRadius:10,fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Ic n="up" s={12}/> Eingang</button>
        <button onClick={()=>onSale(p)} style={{flex:1,padding:"9px 4px",background:"#fff7ed",color:"#c2410c",border:"1px solid #fed7aa",borderRadius:10,fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Ic n="down" s={12}/> Verkauf</button>
        <button onClick={()=>onEdit(p)} style={{width:36,height:36,background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" s={14}/></button>
      </div>
    </div>
  );
}

function Drawer({children,onClose}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:24,width:"100%",maxWidth:540,maxHeight:"93vh",overflowY:"auto",animation:"slideup .25s ease"}}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:4}}>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:`1px solid ${B[100]}`,background:"#f8faff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8"}}><Ic n="x" s={15}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Lbl({t,children}) {
  return <div style={{marginBottom:0}}><label style={{fontSize:11,color:"#94a3b8",fontWeight:700,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>{t}</label>{children}</div>;
}
const inp  = {width:"100%",padding:"10px 12px",border:`1px solid ${B[100]}`,borderRadius:10,fontSize:14,background:"#f8faff",color:B[900]};
const aBtn = (bg)=>({padding:"12px",background:bg,color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer"});

function ProdModal({product,onSave,onClose,onDel}) {
  const [f,setF]=useState(product||{name:"",description:"",category:"Reinigung",buyPrice:"",sellPrice:"",stock:"",minStock:2,image:"",notes:""});
  const [imgErr,setImgErr]=useState(false);
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const submit=(e)=>{e.preventDefault();if(!f.name.trim())return;onSave({...f,buyPrice:parseFloat(f.buyPrice)||0,sellPrice:parseFloat(f.sellPrice)||0,stock:parseInt(f.stock)||0,minStock:parseInt(f.minStock)||1});};
  const margin=f.sellPrice&&f.buyPrice?((f.sellPrice-f.buyPrice)/f.sellPrice*100).toFixed(0):null;
  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:B[900]}}>{product?"Produkt bearbeiten":"Neues Produkt"}</h3>
      {f.image&&!imgErr&&<div style={{height:90,background:B[50],borderRadius:12,marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}><img src={f.image} alt="" onError={()=>setImgErr(true)} style={{maxHeight:"100%",objectFit:"contain",padding:8}}/></div>}
      <form onSubmit={submit}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <Lbl t="Produktname *"><input required value={f.name} onChange={e=>s("name",e.target.value)} style={inp}/></Lbl>
          <Lbl t="Beschreibung"><textarea value={f.description} onChange={e=>s("description",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></Lbl>
          <Lbl t="Kategorie"><select value={f.category} onChange={e=>s("category",e.target.value)} style={inp}>{CATS.filter(c=>c!=="Alle").map(c=><option key={c}>{c}</option>)}</select></Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Lbl t="Einkaufspreis CHF"><input type="number" step="0.01" min="0" value={f.buyPrice} onChange={e=>s("buyPrice",e.target.value)} style={inp} placeholder="0.00"/></Lbl>
            <Lbl t="Verkaufspreis CHF"><input type="number" step="0.01" min="0" value={f.sellPrice} onChange={e=>s("sellPrice",e.target.value)} style={inp} placeholder="0.00"/></Lbl>
            <Lbl t="Bestand (Stk)"><input type="number" min="0" value={f.stock} onChange={e=>s("stock",e.target.value)} style={inp} placeholder="0"/></Lbl>
            <Lbl t="Mindestbestand"><input type="number" min="0" value={f.minStock} onChange={e=>s("minStock",e.target.value)} style={inp} placeholder="2"/></Lbl>
          </div>
          {margin&&<div style={{background:B[50],border:`1px solid ${B[200]}`,borderRadius:8,padding:"7px 12px",fontSize:12,color:B[700],fontWeight:700,textAlign:"center"}}>Marge {margin}% · Gewinn/Stk: CHF {(f.sellPrice-f.buyPrice).toFixed(2)}</div>}
          <Lbl t="Bild-URL"><input value={f.image} onChange={e=>{s("image",e.target.value);setImgErr(false);}} style={inp} placeholder="https://prowin.net/files/…"/></Lbl>
          <Lbl t="Notizen"><textarea value={f.notes} onChange={e=>s("notes",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></Lbl>
        </div>
        <div style={{display:"flex",gap:10,marginTop:18}}>
          {product&&<button type="button" onClick={()=>{if(window.confirm("Löschen?"))onDel(product.id);}} style={{flex:1,...aBtn("#dc2626")}}>Löschen</button>}
          <button type="button" onClick={onClose} style={{flex:1,padding:"12px",background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>Abbrechen</button>
          <button type="submit" style={{flex:2,...aBtn(B[600])}}>Speichern</button>
        </div>
      </form>
    </Drawer>
  );
}

function StockModal({product,onApply,onClose}) {
  const [mode,setMode]=useState(product._mode==="sale"?"sale":"in");
  const [qty,setQty]=useState(1);
  const apply=()=>onApply({product,delta:mode==="sale"?-qty:qty,type:mode==="sale"?"sale":"incoming",qty});
  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 3px",fontSize:18,fontWeight:900,color:B[900]}}>Bestand anpassen</h3>
      <p style={{margin:"0 0 16px",fontSize:13,color:"#94a3b8",fontWeight:600}}>{product.name}</p>
      <div style={{display:"flex",gap:10,marginBottom:18}}>
        {[["in","Wareneingang",B[600],B[50],B[200]],["sale","Verkauf buchen","#c2410c","#fff7ed","#fed7aa"]].map(([v,l,c,bg,b])=>(
          <button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:"13px 8px",background:mode===v?bg:"#f8faff",color:mode===v?c:"#94a3b8",border:`2px solid ${mode===v?b:B[100]}`,borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
            <Ic n={v==="in"?"up":"down"} s={20}/>{l}
          </button>
        ))}
      </div>
      <Lbl t="Anzahl Stück">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{width:44,height:44,borderRadius:12,border:`1px solid ${B[100]}`,background:"#f8faff",cursor:"pointer",fontSize:22,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",color:B[700]}}>−</button>
          <input type="number" min="1" value={qty} onChange={e=>setQty(Math.max(1,parseInt(e.target.value)||1))} style={{flex:1,textAlign:"center",padding:"10px",border:`1px solid ${B[100]}`,borderRadius:12,fontSize:24,fontWeight:900,color:B[900]}}/>
          <button onClick={()=>setQty(q=>q+1)} style={{width:44,height:44,borderRadius:12,border:`1px solid ${B[100]}`,background:"#f8faff",cursor:"pointer",fontSize:22,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",color:B[700]}}>+</button>
        </div>
      </Lbl>
      {mode==="sale"&&<div style={{background:B[50],border:`1px solid ${B[200]}`,borderRadius:12,padding:14,marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><div style={{fontSize:10,color:"#94a3b8",fontWeight:700}}>UMSATZ</div><div style={{fontWeight:900,color:B[700],fontSize:16}}>{chf(product.sellPrice*qty)}</div></div>
        <div><div style={{fontSize:10,color:"#94a3b8",fontWeight:700}}>GEWINN</div><div style={{fontWeight:900,color:"#16a34a",fontSize:16}}>{chf((product.sellPrice-product.buyPrice)*qty)}</div></div>
      </div>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <button onClick={onClose} style={{flex:1,padding:"12px",background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>Abbrechen</button>
        <button onClick={apply} style={{flex:2,...aBtn(mode==="sale"?"#c2410c":B[600])}}>{mode==="sale"?`${qty} Stk. verkaufen`:`${qty} Stk. einlagern`}</button>
      </div>
    </Drawer>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]         = useState(undefined);
  const [products,setProducts] = useState([]);
  const [sales,setSales]       = useState([]);
  const [syncing,setSyncing]   = useState(false);
  const [tab,setTab]           = useState("dashboard");
  const [search,setSearch]     = useState("");
  const [cat,setCat]           = useState("Alle");
  const [sort,setSort]         = useState("name");
  const [modal,setModal]       = useState(null);
  const [toast,setToast]       = useState(null);

  useEffect(()=>{ const u=onAuthStateChanged(auth,u=>setUser(u)); return u; },[]);
  useEffect(()=>{
    if(!user) return;
    const pq=query(collection(db,"users",user.uid,"products"),orderBy("name"));
    const sq=query(collection(db,"users",user.uid,"sales"),orderBy("date","desc"));
    const up=onSnapshot(pq,s=>setProducts(s.docs.map(d=>({id:d.id,...d.data()}))));
    const us=onSnapshot(sq,s=>setSales(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{up();us();};
  },[user]);

  const flash=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2800);};
  const col=(sub)=>collection(db,"users",user.uid,sub);

  const saveProduct=async(p)=>{
    setSyncing(true);
    try{const id=p.id||uid();await setDoc(doc(col("products"),id),{...p,id,updatedAt:serverTimestamp()});flash(p.id?"Aktualisiert ✓":"Hinzugefügt ✓");}
    catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };
  const delProduct=async(id)=>{
    setSyncing(true);
    try{await deleteDoc(doc(col("products"),id));flash("Gelöscht",false);}
    catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };
  const applyStock=async({product,delta,type,qty})=>{
    setSyncing(true);
    try{
      await setDoc(doc(col("products"),product.id),{...product,stock:Math.max(0,product.stock+delta),updatedAt:serverTimestamp()});
      if(type==="sale"){const sid=uid();await setDoc(doc(col("sales"),sid),{id:sid,date:new Date().toISOString(),productId:product.id,productName:product.name,qty,sellPrice:product.sellPrice,buyPrice:product.buyPrice,profit:(product.sellPrice-product.buyPrice)*qty,revenue:product.sellPrice*qty,createdAt:serverTimestamp()});}
      flash(type==="sale"?`${qty} Stk. verkauft ✓`:`${qty} Stk. eingelagert ✓`);
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };
  const importSeed=async()=>{
    if(!window.confirm("28 Beispielprodukte importieren?"))return;
    setSyncing(true);
    try{for(const p of SEED)await setDoc(doc(col("products"),p.id),{...p,updatedAt:serverTimestamp()});flash("Importiert ✓");}
    catch{flash("Fehler",false);}
    setSyncing(false);
  };

  const filtered=useMemo(()=>{
    let ps=cat!=="Alle"?products.filter(p=>p.category===cat):products;
    if(search.trim())ps=ps.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
    return [...ps].sort((a,b)=>sort==="name"?a.name.localeCompare(b.name):sort==="stock"?a.stock-b.stock:a.sellPrice-b.sellPrice);
  },[products,cat,search,sort]);

  const totalRev=sales.reduce((s,x)=>s+x.revenue,0);
  const totalPro=sales.reduce((s,x)=>s+x.profit,0);
  const totalCst=sales.reduce((s,x)=>s+x.buyPrice*x.qty,0);
  const lagWert=products.reduce((s,p)=>s+p.stock*p.buyPrice,0);
  const wenig=products.filter(p=>p.stock>0&&p.stock<=p.minStock).length;
  const aus=products.filter(p=>p.stock===0).length;
  const openStock=(p,mode)=>setModal({type:"stock",product:{...p,_mode:mode}});

  if(user===undefined) return <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${B[50]},${B[100]})`,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div style={{width:56,height:56,background:`linear-gradient(135deg,${B[700]},${B[400]})`,borderRadius:18,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="drop" s={26} style={{color:"#fff"}}/></div><div style={{fontWeight:900,fontSize:20,color:B[900]}}>proWIN Lager</div><div className="spinner"/></div></div>;
  if(!user) return <LoginScreen/>;

  return (
    <div style={{minHeight:"100vh",background:"#f0f5ff"}}>
      {/* Header */}
      <header style={{background:"#fff",borderBottom:`1px solid ${B[100]}`,position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",height:58,gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
            <div style={{width:36,height:36,background:`linear-gradient(135deg,${B[700]},${B[400]})`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="drop" s={18} style={{color:"#fff"}}/></div>
            <div><div style={{fontWeight:900,fontSize:17,color:B[900],letterSpacing:-.5,lineHeight:1}}>proWIN Lager</div><div style={{fontSize:10,color:B[400],fontWeight:700,letterSpacing:.8}}>CLOUD · ECHTZEIT</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:syncing?"#d97706":"#16a34a",fontWeight:700,background:syncing?"#fffbeb":"#f0fdf4",padding:"4px 10px",borderRadius:20,border:`1px solid ${syncing?"#fde68a":"#bbf7d0"}`}}>
            <Ic n={syncing?"sync":"check"} s={12}/>{syncing?"Speichern…":"Sync ✓"}
          </div>
          <div style={{display:"flex",gap:5}}>
            {aus>0&&<span style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",padding:"3px 8px",borderRadius:20,fontSize:11,fontWeight:700}}>{aus} aus</span>}
            {wenig>0&&<span style={{background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a",padding:"3px 8px",borderRadius:20,fontSize:11,fontWeight:700}}>{wenig} wenig</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {user.photoURL?<img src={user.photoURL} alt="" style={{width:30,height:30,borderRadius:"50%",border:`2px solid ${B[200]}`}}/>:<div style={{width:30,height:30,borderRadius:"50%",background:B[100],display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:B[700]}}>{user.displayName?.[0]||"?"}</div>}
            <button onClick={()=>signOut(auth)} style={{width:30,height:30,borderRadius:"50%",border:`1px solid ${B[100]}`,background:"#f8faff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8"}}><Ic n="logout" s={14}/></button>
          </div>
        </div>
      </header>

      {/* Nav */}
      <nav style={{background:"#fff",borderBottom:`1px solid ${B[100]}`,position:"sticky",top:58,zIndex:40}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 12px",display:"flex"}}>
          {[["dashboard","Dashboard","grid"],["products","Produkte","pkg"],["sales","Verkäufe","bar"],["settings","Einstellungen","cog"]].map(([id,label,icon])=>(
            <button key={id} onClick={()=>setTab(id)} style={{display:"flex",alignItems:"center",gap:5,padding:"13px 12px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:tab===id?B[600]:"#94a3b8",borderBottom:`2.5px solid ${tab===id?B[500]:"transparent"}`,transition:"all .15s"}}>
              <Ic n={icon} s={15}/><span>{label}</span>
            </button>
          ))}
        </div>
      </nav>

      <main style={{maxWidth:960,margin:"0 auto",padding:"20px 16px 80px"}}>
        {/* DASHBOARD */}
        {tab==="dashboard"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
            <Stat icon="pkg"   label="Lagerwert"     value={`CHF ${lagWert.toFixed(0)}`}  accent={B[600]}/>
            <Stat icon="trend" label="Gesamtumsatz"  value={`CHF ${totalRev.toFixed(0)}`} accent="#0891b2"/>
            <Stat icon="down"  label="Wenig Bestand" value={`${wenig} Produkte`}          accent="#d97706"/>
            <Stat icon="x"     label="Ausverkauft"   value={`${aus} Produkte`}            accent="#dc2626"/>
          </div>
          <div style={{background:"#fff",borderRadius:16,border:`1px solid ${B[100]}`,padding:14,marginBottom:18}}>
            <div style={{position:"relative",marginBottom:12}}>
              <Ic n="search" s={16} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:B[300]}}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Produktname suchen…" style={{width:"100%",padding:"10px 12px 10px 38px",border:`1px solid ${B[100]}`,borderRadius:10,fontSize:14,background:"#f8faff"}}/>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${cat===c?B[400]:B[100]}`,background:cat===c?B[50]:"#fff",color:cat===c?B[700]:"#94a3b8",fontSize:12,fontWeight:700,cursor:"pointer"}}>{c}</button>)}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>Sortieren:</span>
              {[["name","Name"],["stock","Bestand"],["price","Preis"]].map(([v,l])=><button key={v} onClick={()=>setSort(v)} style={{padding:"5px 11px",borderRadius:16,fontSize:12,fontWeight:700,border:`1px solid ${sort===v?B[400]:B[100]}`,background:sort===v?B[600]:"#fff",color:sort===v?"#fff":"#94a3b8",cursor:"pointer"}}>{l}</button>)}
              <button onClick={()=>setModal({type:"add"})} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5,padding:"8px 16px",background:B[600],color:"#fff",border:"none",borderRadius:20,fontSize:13,fontWeight:800,cursor:"pointer"}}><Ic n="plus" s={14}/> Neu</button>
            </div>
          </div>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:12,fontWeight:600}}>{filtered.length} von {products.length} Produkten</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
            {filtered.map(p=><ProdCard key={p.id} p={p} onEdit={p=>setModal({type:"edit",product:p})} onIn={p=>openStock(p,"in")} onSale={p=>openStock(p,"sale")}/>)}
            {filtered.length===0&&products.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:50,background:"#fff",borderRadius:16,border:`2px dashed ${B[200]}`}}>
              <Ic n="cloud" s={40} style={{display:"block",margin:"0 auto 12px",color:B[300]}}/>
              <div style={{fontWeight:800,fontSize:16,color:B[800],marginBottom:6}}>Noch keine Produkte</div>
              <p style={{color:"#94a3b8",fontSize:13,margin:"0 0 16px"}}>Gehe zu Einstellungen → "Produkte importieren"</p>
            </div>}
          </div>
        </div>}

        {/* PRODUKTE */}
        {tab==="products"&&<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <h2 style={{margin:0,fontSize:20,fontWeight:900,color:B[900]}}>Alle Produkte</h2>
            <button onClick={()=>setModal({type:"add"})} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",background:B[600],color:"#fff",border:"none",borderRadius:20,fontSize:13,fontWeight:800,cursor:"pointer"}}><Ic n="plus" s={14}/> Hinzufügen</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {products.map(p=>{
              const st=statusOf(p),cs=CAT_STYLE[p.category]||{bg:B[50],color:B[700],border:B[200]};
              const [e,se]=useState(false);
              return <div key={p.id} style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:48,height:48,borderRadius:12,background:B[50],flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                  {p.image&&!e?<img src={p.image} alt="" onError={()=>se(true)} style={{width:"100%",height:"100%",objectFit:"contain",padding:4}}/>:<span style={{fontSize:13,fontWeight:900,color:B[600]}}>{ini(p.name)}</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:14,color:B[900],whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
                  <div style={{fontSize:11,color:"#94a3b8",display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
                    <span style={{background:cs.bg,color:cs.color,padding:"1px 7px",borderRadius:8,fontWeight:700}}>{p.category}</span>
                    <span>VK: {chf(p.sellPrice)}</span>
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontWeight:900,fontSize:16,color:p.stock===0?"#dc2626":p.stock<=p.minStock?"#d97706":B[800]}}>{p.stock} Stk</div>
                  <div style={{fontSize:10,fontWeight:700,color:st.color}}>{st.label}</div>
                </div>
                <div style={{display:"flex",gap:5,flexShrink:0}}>
                  <button onClick={()=>openStock(p,"in")} style={{width:32,height:32,background:B[50],color:B[600],border:`1px solid ${B[100]}`,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="up" s={13}/></button>
                  <button onClick={()=>openStock(p,"sale")} style={{width:32,height:32,background:"#fff7ed",color:"#c2410c",border:"1px solid #fed7aa",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="down" s={13}/></button>
                  <button onClick={()=>setModal({type:"edit",product:p})} style={{width:32,height:32,background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" s={13}/></button>
                  <button onClick={()=>{if(window.confirm(`"${p.name}" löschen?`))delProduct(p.id);}} style={{width:32,height:32,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={13}/></button>
                </div>
              </div>;
            })}
          </div>
        </div>}

        {/* VERKÄUFE */}
        {tab==="sales"&&<div>
          <h2 style={{margin:"0 0 16px",fontSize:20,fontWeight:900,color:B[900]}}>Verkaufsübersicht</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
            <Stat icon="trend" label="Gesamtumsatz"       value={`CHF ${totalRev.toFixed(2)}`} accent="#0891b2"/>
            <Stat icon="bar"   label="Geschätzter Gewinn" value={`CHF ${totalPro.toFixed(2)}`} accent={B[600]}/>
            <Stat icon="truck" label="Einkaufskosten"     value={`CHF ${totalCst.toFixed(2)}`} accent="#d97706"/>
            <Stat icon="pkg"   label="Anz. Verkäufe"      value={sales.length}                  accent="#7e22ce"/>
          </div>
          {sales.length===0?<div style={{textAlign:"center",padding:60,color:"#94a3b8"}}><Ic n="bar" s={36} style={{display:"block",margin:"0 auto 12px",opacity:.3}}/><div style={{fontWeight:700}}>Noch keine Verkäufe</div></div>
          :<div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sales.map(s=><div key={s.id} style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:14,color:B[900],whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.productName}</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{new Date(s.date).toLocaleDateString("de-CH",{day:"2-digit",month:"short",year:"numeric"})} · {new Date(s.date).toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"})}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontWeight:900,fontSize:16,color:B[600]}}>+{chf(s.revenue)}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{s.qty} Stk × {chf(s.sellPrice)}</div>
                </div>
              </div>
              <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${B[50]}`,display:"flex",gap:16,fontSize:12}}>
                <span style={{color:"#94a3b8"}}>Einkauf: <strong style={{color:B[800]}}>{chf(s.buyPrice*s.qty)}</strong></span>
                <span style={{color:"#94a3b8"}}>Gewinn: <strong style={{color:"#16a34a"}}>{chf(s.profit)}</strong></span>
              </div>
            </div>)}
          </div>}
        </div>}

        {/* EINSTELLUNGEN */}
        {tab==="settings"&&<div>
          <h2 style={{margin:"0 0 20px",fontSize:20,fontWeight:900,color:B[900]}}>Einstellungen</h2>
          <div style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.4,marginBottom:10}}>Angemeldetes Konto</div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {user.photoURL&&<img src={user.photoURL} alt="" style={{width:44,height:44,borderRadius:"50%",border:`2px solid ${B[200]}`}}/>}
              <div><div style={{fontWeight:800,fontSize:15,color:B[900]}}>{user.displayName}</div><div style={{fontSize:13,color:"#94a3b8"}}>{user.email}</div></div>
              <button onClick={()=>signOut(auth)} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,padding:"8px 14px",background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer"}}><Ic n="logout" s={13}/> Abmelden</button>
            </div>
          </div>
          <div style={{background:B[50],border:`1px solid ${B[200]}`,borderRadius:14,padding:14,marginBottom:12,fontSize:13,color:B[800]}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,fontWeight:800}}><Ic n="cloud" s={16} style={{color:B[500]}}/>Cloud-Synchronisation aktiv</div>
            Änderungen auf dem Handy erscheinen sofort auf dem Laptop – und umgekehrt.
          </div>
          <div style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:B[900],marginBottom:3}}>Beispielprodukte laden</div>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>28 proWIN-Produkte in die Datenbank importieren</div>
            <button onClick={importSeed} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"9px 16px",background:B[600],color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}><Ic n="dl" s={14}/>Produkte importieren</button>
          </div>
          <div style={{textAlign:"center",fontSize:11,color:"#94a3b8",marginTop:8}}>{products.length} Produkte · {sales.length} Verkäufe · Firebase Firestore</div>
        </div>}
      </main>

      {modal?.type==="add"   &&<ProdModal onSave={saveProduct} onClose={()=>setModal(null)}/>}
      {modal?.type==="edit"  &&<ProdModal product={modal.product} onSave={saveProduct} onClose={()=>setModal(null)} onDel={delProduct}/>}
      {modal?.type==="stock" &&<StockModal product={modal.product} onApply={applyStock} onClose={()=>setModal(null)}/>}

      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.ok?B[800]:"#7f1d1d",color:"#fff",padding:"11px 22px",borderRadius:30,fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,.2)",zIndex:999,whiteSpace:"nowrap",animation:"fadein .2s ease"}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
