<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Lorena's Portal</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Lorena's Portal"/>
  <meta name="theme-color" content="#1e3a8a"/>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito','Segoe UI',sans-serif;background:#eef3fc;min-height:100vh;-webkit-tap-highlight-color:transparent}
    input,select,textarea,button{font-family:inherit}
    input:focus,select:focus,textarea:focus{outline:2px solid #93c5fd;outline-offset:1px}
    @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideup{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    @keyframes splashOut{to{opacity:0;pointer-events:none}}
    @keyframes logoIn{from{opacity:0;transform:scale(0.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes textIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%,100%{opacity:0.6}50%{opacity:1}}
    @keyframes ringPulse{0%{transform:scale(1);opacity:0.4}100%{transform:scale(1.6);opacity:0}}
    .spinner{width:28px;height:28px;border:3px solid #bfdbfe;border-top:3px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:16px auto 0}
    @media(max-width:600px){
      .hdr-sub{display:none!important}
      .nav-label{display:none}
      .nav-btn{padding:10px 4px!important;flex:1;justify-content:center!important}
      .main-pad{padding:12px 10px 90px!important}
      .stat-val{font-size:18px!important}
      .prod-row-btn{width:34px!important;height:34px!important}
      .prod-row-btns{gap:3px!important}
      .drawer-inner{padding:20px 16px 32px!important;border-radius:20px 20px 0 0!important;max-height:90vh!important}
      .module-card{padding:20px 16px!important}
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

// ── Helpers ───────────────────────────────────────────────────────────────────
function statusOf(p) {
  if (p.stock===0)            return {label:"Aus",    color:"#dc2626",bg:"#fef2f2",dot:"#ef4444"};
  if (p.stock<=p.minStock)    return {label:"Wenig",  color:"#d97706",bg:"#fffbeb",dot:"#f59e0b"};
  return                             {label:"OK",     color:"#16a34a",bg:"#f0fdf4",dot:"#22c55e"};
}

// ── UI Components ─────────────────────────────────────────────────────────────
function Drawer({children,onClose}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="drawer-inner" style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:24,width:"100%",maxWidth:540,maxHeight:"93vh",overflowY:"auto",animation:"slideup .25s ease"}}>
        <div style={{width:36,height:4,background:B[200],borderRadius:4,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:4}}>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:`1px solid ${B[100]}`,background:"#f8faff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8"}}><Ic n="x" s={15}/></button>
        </div>
        {children}
      </div>
    </div>

}

function Lbl({t,children}) {
  return <div><label style={{fontSize:11,color:"#94a3b8",fontWeight:700,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>{t}</label>{children}</div>;

const inp  = {width:"100%",padding:"10px 12px",border:`1px solid ${B[100]}`,borderRadius:10,fontSize:14,background:"#f8faff",color:B[900]};
const aBtn = (bg,col="#fff")=>({padding:"12px",background:bg,color:col,border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer"});

function Stat({icon,label,value,accent,sub}) {

    <div style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:"14px 16px"}}>

// ══════════════════════════════════════════════════════════════════════════════
// SPLASH SCREEN

      <div style={{position:"relative",marginBottom:32}}>

        <div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.65)",letterSpacing:5,marginTop:6,textTransform:"uppercase"}}>Mein Portal ✨</div>
      </div>
      <div style={{display:"flex",gap:7,marginTop:44,animation:"textIn 0.5s ease 1.3s both"}}>
        {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"rgba(255,255,255,0.5)",animation:`shimmer 1.2s ease ${0.2*i}s infinite`}}/>)}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════════════════════
function LoginScreen({onUnlock}) {
  const [pw,setPw]=useState(""); const [show,setShow]=useState(false);
  const [shake,setShake]=useState(false); const [err,setErr]=useState("");
  const tryLogin=(e)=>{
    e.preventDefault();
    if(pw===APP_PASSWORD){localStorage.setItem(STORAGE_KEY,"1");onUnlock();}
    else{setErr("Falsches Passwort – bitte nochmals versuchen");setShake(true);setPw("");setTimeout(()=>setShake(false),600);}
  };
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(145deg,${B[900]},#0891b2,${Z[600]})`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"rgba(255,255,255,0.97)",backdropFilter:"blur(20px)",borderRadius:28,padding:"48px 36px",maxWidth:380,width:"100%",textAlign:"center",boxShadow:`0 32px 80px rgba(30,58,138,0.35)`}}>
        <div style={{width:80,height:80,background:`linear-gradient(145deg,${B[900]},#0891b2,${Z[600]})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",boxShadow:`0 12px 32px #0891b260`}}>
          <span style={{fontSize:36,color:"#fff",fontWeight:900}}>L</span>
        </div>
        <h1 style={{margin:"0 0 6px",fontSize:26,fontWeight:900,color:B[900],letterSpacing:-.5}}>Lorena's Portal</h1>
        <p style={{margin:"0 0 36px",color:"#94a3b8",fontSize:14,fontWeight:500}}>proWIN & Zumba 💜</p>
        <form onSubmit={tryLogin}>
          <div style={{animation:shake?"shake .4s ease":undefined,marginBottom:16}}>
            <div style={{position:"relative"}}>
              <Ic n="lock" s={16} style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:B[400]}}/>
              <input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Passwort eingeben" autoFocus
                style={{width:"100%",padding:"14px 48px 14px 44px",border:`2px solid ${err?"#fecaca":B[100]}`,borderRadius:14,fontSize:16,background:"#f8faff",color:B[900]}}/>
              <button type="button" onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94a3b8"}}><Ic n="eye" s={16}/></button>
            </div>
            {err&&<p style={{marginTop:8,color:"#dc2626",fontSize:12,fontWeight:600,textAlign:"left"}}>{err}</p>}
          </div>
          <button type="submit" style={{width:"100%",padding:"15px",background:`linear-gradient(135deg,${B[900]},#0891b2)`,color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:800,cursor:"pointer"}}>Einloggen</button>
        </form>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// HOME (module selection)
// ══════════════════════════════════════════════════════════════════════════════
function HomeScreen({onSelect,prowinStats,zumbaStats}) {
  return (

          {[["users","Aktive",zumbaStats.members],["cash","Einnahmen",chf(zumbaStats.income)],["cal","Kurse",zumbaStats.classes]].map(([ic,lb,val])=>(
            <div key={lb} style={{background:Z[50],borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.4,marginBottom:4}}>{lb}</div>
              <div style={{fontWeight:900,fontSize:15,color:Z[800]}}>{val}</div>
            </div>
          ))}
        </div>
      </div>
    </main>
  );
}

function ProdRow({p,onIn,onSale,onEdit,onDel}) {
  const st=statusOf(p);
  const cs=CAT_STYLE[p.category]||{bg:B[50],color:B[700],border:B[200]};
  const [e,se]=useState(false);
  return (
    <div style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:44,height:44,borderRadius:12,background:B[50],flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        {p.image&&!e?<img src={p.image} alt="" onError={()=>se(true)} style={{width:"100%",height:"100%",objectFit:"contain",padding:4}}/>:<span style={{fontSize:12,fontWeight:900,color:B[600]}}>{ini(p.name)}</span>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:800,fontSize:14,color:B[900],whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
        <div style={{fontSize:11,color:"#94a3b8",display:"flex",gap:5,marginTop:2,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{background:cs.bg,color:cs.color,padding:"1px 6px",borderRadius:8,fontWeight:700,fontSize:10}}>{p.category}</span>
          {p.sellPrice>0&&<span>{chf(p.sellPrice)}</span>}
        </div>
      </div>
      <div style={{textAlign:"right",flexShrink:0,minWidth:52}}>
        <div style={{fontWeight:900,fontSize:16,color:p.stock===0?"#dc2626":p.stock<=p.minStock?"#d97706":B[800]}}>{p.stock} Stk</div>
        <div style={{fontSize:10,fontWeight:700,color:st.color}}>{st.label}</div>
      </div>
      <div className="prod-row-btns" style={{display:"flex",gap:5,flexShrink:0}}>
        <button onClick={onIn}   className="prod-row-btn" style={{width:34,height:34,background:B[50],color:B[600],border:`1px solid ${B[100]}`,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="up" s={13}/></button>
        <button onClick={onSale} className="prod-row-btn" style={{width:34,height:34,background:"#fff7ed",color:"#c2410c",border:"1px solid #fed7aa",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="down" s={13}/></button>
        <button onClick={onEdit} className="prod-row-btn" style={{width:34,height:34,background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" s={13}/></button>
        <button onClick={onDel}  className="prod-row-btn" style={{width:34,height:34,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={13}/></button>
      </div>
    </div>
  );
}

function ProdModal({product,onSave,onClose,onDel}) {
  const [f,setF]=useState(product||{name:"",description:"",category:"Reinigung",buyPrice:"",sellPrice:"",stock:"",minStock:2,image:"",notes:""});
  const [imgErr,setImgErr]=useState(false);
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const submit=(e)=>{e.preventDefault();if(!f.name.trim())return;onSave({...f,buyPrice:parseFloat(f.buyPrice)||0,sellPrice:parseFloat(f.sellPrice)||0,stock:parseInt(f.stock)||0,minStock:parseInt(f.minStock)||1});};
  const margin=f.sellPrice&&f.buyPrice?((f.sellPrice-f.buyPrice)/f.sellPrice*100).toFixed(0):null;
  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:B[900]}}>{product?"Produkt bearbeiten":"Neues Produkt"}</h3>
      <form onSubmit={submit}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <Lbl t="Produktname *"><input required value={f.name} onChange={e=>s("name",e.target.value)} style={inp}/></Lbl>
          <Lbl t="Beschreibung"><textarea value={f.description} onChange={e=>s("description",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></Lbl>
          <Lbl t="Kategorie"><select value={f.category} onChange={e=>s("category",e.target.value)} style={inp}>{CATS.filter(c=>c!=="Alle").map(c=><option key={c}>{c}</option>)}</select></Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Lbl t="Einkaufspreis CHF"><input type="number" step="0.01" min="0" value={f.buyPrice} onChange={e=>s("buyPrice",e.target.value)} style={inp} placeholder="0.00"/></Lbl>
            <Lbl t="Verkaufspreis CHF"><input type="number" step="0.01" min="0" value={f.sellPrice} onChange={e=>s("sellPrice",e.target.value)} style={inp} placeholder="0.00"/></Lbl>
            <Lbl t="Bestand (Stk)"><input type="number" min="0" value={f.stock} onChange={e=>s("stock",e.target.value)} style={inp} placeholder="0"/></Lbl>
            <Lbl t="Mindestbestand"><input type="number" min="0" value={f.minStock} onChange={e=>s("minStock",e.target.value)} style={inp} placeholder="2"/></Lbl>
          </div>
          {margin&&<div style={{background:B[50],border:`1px solid ${B[200]}`,borderRadius:8,padding:"7px 12px",fontSize:12,color:B[700],fontWeight:700,textAlign:"center"}}>Marge {margin}% · Gewinn/Stk: CHF {(f.sellPrice-f.buyPrice).toFixed(2)}</div>}
          <Lbl t="Produktbild">
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {f.image&&!imgErr
                ?<div style={{width:56,height:56,borderRadius:10,overflow:"hidden",flexShrink:0,border:`1px solid ${B[100]}`}}><img src={f.image} alt="" onError={()=>setImgErr(true)} style={{width:"100%",height:"100%",objectFit:"contain",padding:4}}/></div>
                :<div style={{width:56,height:56,borderRadius:10,background:B[50],flexShrink:0,border:`2px dashed ${B[200]}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="pkg" s={22} style={{color:B[300]}}/></div>
              }
              <label style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"11px 14px",background:B[50],border:`1.5px dashed ${B[300]}`,borderRadius:12,cursor:"pointer",fontSize:13,fontWeight:700,color:B[600]}}>
                <Ic n="dl" s={16}/>{f.image&&!imgErr?"Foto ändern":"Foto hochladen"}
                <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{s("image",ev.target.result);setImgErr(false);};r.readAsDataURL(file);}}/>
              </label>
              {f.image&&<button type="button" onClick={()=>{s("image","");setImgErr(false);}} style={{width:34,height:34,borderRadius:8,background:"#fff5f5",border:"1px solid #fecaca",color:"#dc2626",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="x" s={14}/></button>}
            </div>
          </Lbl>
          <Lbl t="Notizen"><textarea value={f.notes} onChange={e=>s("notes",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></Lbl>
        </div>
        <div style={{display:"flex",gap:10,marginTop:18}}>
          {product&&<button type="button" onClick={()=>{if(window.confirm("Löschen?"))onDel(product.id);}} style={{flex:1,...aBtn("#dc2626")}}>Löschen</button>}
          <button type="button" onClick={onClose} style={{flex:1,padding:"12px",background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>Abbrechen</button>
          <button type="submit" style={{flex:2,...aBtn(B[600])}}>Speichern</button>
        </div>
      </form>
    </Drawer>
  );
}

function StockModal({product,onApply,onClose}) {
  const mode=product._mode||"in";
  const [qty,setQty]=useState(1);
  const [price,setPrice]=useState(product.sellPrice||0);
  const apply=(type)=>{
    const delta=type==="in"?qty:-qty;
    onApply({product,delta,type,qty,overridePrice:type==="sale"?parseFloat(price):null});
  };
  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 4px",fontSize:18,fontWeight:900,color:B[900]}}>{mode==="in"?"Wareneingang":"Verkauf"}</h3>
      <p style={{color:"#94a3b8",fontSize:13,marginBottom:16}}>{product.name} · Bestand: {product.stock} Stk</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Lbl t="Menge"><input type="number" min="1" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} style={inp}/></Lbl>
        {mode==="sale"&&<Lbl t={`Verkaufspreis CHF (Standard: ${chf(product.sellPrice)})`}><input type="number" step="0.01" min="0" value={price} onChange={e=>setPrice(e.target.value)} style={inp}/></Lbl>}
      </div>
      <div style={{display:"flex",gap:10,marginTop:18}}>
        <button onClick={onClose} style={{flex:1,padding:"12px",background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>Abbrechen</button>
        <button onClick={()=>apply(mode==="in"?"in":"sale")} style={{flex:2,...aBtn(mode==="in"?B[600]:"#c2410c")}}>
          {mode==="in"?`+${qty} einlagern`:`${qty} Stk. verkaufen`}
        </button>
      </div>
    </Drawer>
  );
}

function ProwinModule({col,flash,syncing,setSyncing,onBack}) {
  const [products,setProducts]=useState([]);
  const [sales,setSales]=useState([]);
  const [tab,setTab]=useState("products");
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("Alle");
  const [modal,setModal]=useState(null);

  useEffect(()=>{
    const pq=query(col("products"),orderBy("name"));
    const sq=query(col("sales"),orderBy("date","desc"));
    const up=onSnapshot(pq,s=>setProducts(s.docs.map(d=>({id:d.id,...d.data()}))));
    const us=onSnapshot(sq,s=>setSales(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{up();us();};
  },[]);

  const saveProduct=async(p)=>{setSyncing(true);try{const id=p.id||uid();await setDoc(doc(col("products"),id),{...p,id,updatedAt:serverTimestamp()});flash(p.id?"Aktualisiert ✓":"Hinzugefügt ✓");}catch{flash("Fehler",false);}setSyncing(false);setModal(null);};
  const delProduct=async(id)=>{setSyncing(true);try{await deleteDoc(doc(col("products"),id));flash("Gelöscht",false);}catch{flash("Fehler",false);}setSyncing(false);setModal(null);};
  const applyStock=async({product,delta,type,qty,overridePrice})=>{
    setSyncing(true);
    const sellP=overridePrice!=null?overridePrice:product.sellPrice;
    try{
      await setDoc(doc(col("products"),product.id),{...product,stock:Math.max(0,product.stock+delta),updatedAt:serverTimestamp()});
      if(type==="sale"){const sid=uid();await setDoc(doc(col("sales"),sid),{id:sid,date:new Date().toISOString(),productId:product.id,productName:product.name,qty,sellPrice:sellP,buyPrice:product.buyPrice,profit:(sellP-product.buyPrice)*qty,revenue:sellP*qty,createdAt:serverTimestamp()});}
      flash(type==="sale"?`${qty} Stk. verkauft ✓`:`${qty} Stk. eingelagert ✓`);
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const filtered=useMemo(()=>{
    let ps=cat!=="Alle"?products.filter(p=>p.category===cat):products;
    if(search.trim())ps=ps.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
    return [...ps].sort((a,b)=>a.name.localeCompare(b.name));
  },[products,cat,search]);

  const totalRev=sales.reduce((s,x)=>s+x.revenue,0);
  const totalPro=sales.reduce((s,x)=>s+x.profit,0);
  const aus=products.filter(p=>p.stock===0).length;
  const wenig=products.filter(p=>p.stock>0&&p.stock<=p.minStock).length;

  return (
    <div style={{minHeight:"100vh",background:"#eef3fc"}}>
      {/* Header */}
      <header style={{background:`linear-gradient(135deg,${B[900]},${B[700]})`,position:"sticky",top:0,zIndex:50,boxShadow:`0 4px 24px ${B[900]}50`}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 12px",display:"flex",alignItems:"center",height:56,gap:8}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:12,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0}}><Ic n="home" s={16}/></button>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
            <Ic n="pkg" s={20} style={{color:"#fff"}}/>
            <div style={{fontWeight:900,fontSize:16,color:"#fff"}}>proWIN Lager</div>
            <div className="hdr-sub" style={{fontSize:10,color:"rgba(255,255,255,0.65)",fontWeight:700,letterSpacing:.6,marginLeft:4}}>✨ MEIN LAGER</div>
          </div>
          {aus>0&&<span style={{background:"rgba(254,242,242,0.9)",color:"#dc2626",border:"1px solid #fecaca",padding:"3px 7px",borderRadius:20,fontSize:11,fontWeight:700}}>{aus} aus</span>}
          {wenig>0&&<span style={{background:"rgba(255,251,235,0.9)",color:"#d97706",border:"1px solid #fde68a",padding:"3px 7px",borderRadius:20,fontSize:11,fontWeight:700}}>{wenig} wenig</span>}
        </div>
      </header>

      {/* Nav */}
      <nav style={{background:"#fff",borderBottom:`1px solid ${B[100]}`,position:"sticky",top:56,zIndex:40}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 12px",display:"flex"}}>
          {[["products","Produkte","pkg"],["sales","Verkäufe","bar"],["settings","Einstellungen","cog"]].map(([id,lb,ic])=>(
            <button key={id} onClick={()=>setTab(id)} className="nav-btn" style={{display:"flex",alignItems:"center",gap:5,padding:"12px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:tab===id?B[600]:"#94a3b8",borderBottom:`2.5px solid ${tab===id?B[500]:"transparent"}`,flex:1,justifyContent:"center"}}>
              <Ic n={ic} s={16}/><span className="nav-label">{lb}</span>
            </button>
          ))}
        </div>
      </nav>

      <main className="main-pad" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px 80px"}}>

        {tab==="products"&&<div>
          <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
            <div style={{flex:1,position:"relative"}}>
              <Ic n="info" s={14} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94a3b8"}}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Produkt suchen…" style={{...inp,paddingLeft:34}}/>
            </div>
            <select value={cat} onChange={e=>setCat(e.target.value)} style={{...inp,width:"auto",paddingLeft:10}}>
              {CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <button onClick={()=>setModal({type:"add"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 14px",background:B[600],color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:800,cursor:"pointer",flexShrink:0}}><Ic n="plus" s={14}/>Neu</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filtered.map(p=>(
              <ProdRow key={p.id} p={p}
                onIn={()=>setModal({type:"stock",product:{...p,_mode:"in"}})}
                onSale={()=>setModal({type:"stock",product:{...p,_mode:"sale"}})}
                onEdit={()=>setModal({type:"edit",product:p})}
                onDel={()=>{if(window.confirm("Produkt löschen?"))delProduct(p.id);}}
              />
            ))}
            {filtered.length===0&&<div style={{textAlign:"center",padding:40,background:"#fff",borderRadius:16,border:`2px dashed ${B[200]}`}}>
              <div style={{fontWeight:800,fontSize:15,color:B[800],marginBottom:4}}>Keine Produkte gefunden</div>
              <p style={{color:"#94a3b8",fontSize:13}}>Klicke "Neu" um ein Produkt hinzuzufügen</p>
            </div>}
          </div>
        </div>}

        {tab==="sales"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
            <Stat icon="trend" label="Gesamtumsatz" value={chf(totalRev)} accent="#0891b2"/>
            <Stat icon="bar" label="Gewinn" value={chf(totalPro)} accent={B[600]}/>
            <Stat icon="pkg" label="Anz. Verkäufe" value={sales.length} accent="#7e22ce"/>
            <Stat icon="info" label="Lagerprodukte" value={products.length} accent="#16a34a"/>
          </div>
          {sales.length===0
            ?<div style={{textAlign:"center",padding:60,color:"#94a3b8"}}><div style={{fontSize:40,marginBottom:12}}>📊</div><div style={{fontWeight:700}}>Noch keine Verkäufe</div></div>
            :<div style={{display:"flex",flexDirection:"column",gap:10}}>
              {sales.map(s=>(
                <div key={s.id} style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:800,fontSize:14,color:B[900]}}>{s.productName}</div>
                      <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{dateStr(s.date)}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontWeight:900,fontSize:16,color:B[600]}}>+{chf(s.revenue)}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>{s.qty} Stk × {chf(s.sellPrice)}</div>
                    </div>
                  </div>
                  <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${B[50]}`,display:"flex",gap:16,fontSize:12}}>
                    <span style={{color:"#94a3b8"}}>Einkauf: <strong style={{color:B[800]}}>{chf(s.buyPrice*s.qty)}</strong></span>
                    <span style={{color:"#94a3b8"}}>Gewinn: <strong style={{color:"#16a34a"}}>{chf(s.profit)}</strong></span>
                  </div>
                </div>
              ))}
            </div>
          }
        </div>}

        {tab==="settings"&&<div>
          <h2 style={{margin:"0 0 20px",fontSize:20,fontWeight:900,color:B[900]}}>Einstellungen</h2>
          <div style={{background:`linear-gradient(135deg,${B[700]},${B[500]})`,borderRadius:16,padding:18,marginBottom:12,fontSize:13,color:"#fff"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,fontWeight:800,fontSize:14}}><Ic n="check" s={16} style={{color:"#93c5fd"}}/>Daten sicher gespeichert</div>
            <span style={{color:"rgba(255,255,255,0.8)"}}>Alle Änderungen werden automatisch in der Cloud gesichert.</span>
          </div>
          <div style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:B[900],marginBottom:3}}>Beispielprodukte laden</div>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>proWIN-Produkte in die Datenbank importieren</div>
            <button onClick={async()=>{
              if(!window.confirm("Beispielprodukte importieren?"))return;
              setSyncing(true);

                {id:"s1",name:"WC Power",category:"Reinigung",buyPrice:8.50,sellPrice:16.90,stock:5,minStock:2,image:"",description:"WC Reiniger",notes:""},
                {id:"s2",name:"Badreiniger",category:"Reinigung",buyPrice:7.00,sellPrice:14.50,stock:3,minStock:2,image:"",description:"Bad & Dusche",notes:""},
                {id:"s3",name:"Küchenreiniger",category:"Küche",buyPrice:6.50,sellPrice:13.90,stock:4,minStock:2,image:"",description:"Fettlöser",notes:""},
                {id:"s4",name:"Handcreme",category:"Körperpflege",buyPrice:9.00,sellPrice:18.90,stock:6,minStock:3,image:"",description:"Pflegende Handcreme",notes:""},
                {id:"s5",name:"Duschgel",category:"Körperpflege",buyPrice:5.50,sellPrice:11.90,stock:8,minStock:3,image:"",description:"Pflegeduschgel",notes:""},
              ];

          </div>
          <div style={{background:"#fff",border:`1px solid ${B[100]}`,borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:B[900],marginBottom:3}}>Passwort</div>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:4}}>Aktuelles Passwort: <strong style={{color:B[800],letterSpacing:1}}>Lorenasunshine</strong></div>
            <div style={{fontSize:12,color:"#94a3b8"}}>Um das Passwort zu ändern, muss es in der HTML-Datei angepasst werden (APP_PASSWORD).</div>

            <div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>Alle {sales.length} Verkäufe unwiderruflich löschen</div>
            <button onClick={async()=>{
              if(!window.confirm("Alle Verkäufe löschen? Kann nicht rückgängig gemacht werden."))return;
              setSyncing(true);
              try{for(const s of sales)await deleteDoc(doc(col("sales"),s.id));flash("Verkäufe zurückgesetzt ✓");}
              catch{flash("Fehler",false);}
              setSyncing(false);
            }} disabled={sales.length===0} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"9px 16px",background:sales.length===0?"#f8faff":"#fff5f5",color:sales.length===0?"#cbd5e1":"#dc2626",border:`1px solid ${sales.length===0?"#e2e8f0":"#fecaca"}`,borderRadius:10,fontSize:13,fontWeight:700,cursor:sales.length===0?"not-allowed":"pointer"}}><Ic n="trash" s={14}/>Verkäufe löschen</button>
          </div>
          <div style={{textAlign:"center",fontSize:11,color:"#94a3b8",marginTop:16}}>{products.length} Produkte · {sales.length} Verkäufe · Firebase Firestore</div>
        </div>}

      </main>

      {modal?.type==="add"&&<ProdModal onSave={saveProduct} onClose={()=>setModal(null)}/>}
      {modal?.type==="edit"&&<ProdModal product={modal.product} onSave={saveProduct} onClose={()=>setModal(null)} onDel={delProduct}/>}
      {modal?.type==="stock"&&<StockModal product={modal.product} onApply={applyStock} onClose={()=>setModal(null)}/>}
    </div>
  );
}

const ABO_TYPES = [
  {id:"probe",   label:"Probestunde",  icon:"star",  color:"#0891b2", sessions:1},
  {id:"einzel",  label:"Einzelstunde", icon:"music", color:Z[600],    sessions:1},
  {id:"abo5",    label:"5er-Abo",      icon:"star",  color:"#0891b2", sessions:5,  bonus:1},
  {id:"abo10",   label:"10er-Abo",     icon:"star",  color:"#16a34a", sessions:10, bonus:1},
];

function getAboLabel(type) {
  const a=ABO_TYPES.find(x=>x.id===type);
  return a?a.label:type;
}

function getAboPrice(type,prices) {
  if(type==="probe")  return prices.probe;
  if(type==="einzel") return prices.einzel;
  if(type==="abo5")   return prices.abo5;
  if(type==="abo10")  return prices.abo10;
  return 0;
}

function getAboSessions(type) {
  const a=ABO_TYPES.find(x=>x.id===type);
  if(!a) return 1;
  return (a.sessions||1)+(a.bonus||0); // total including bonus
}

function ZumbaModule({col,flash,syncing,setSyncing,onBack}) {
  const [members,setMembers]=useState([]);
  const [income,setIncome]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [classes,setClasses]=useState([]);
  const [tab,setTab]=useState("dashboard");
  const [modal,setModal]=useState(null);
  const [prices,setPricesState]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("zumba_prices")||"null")||DEFAULT_ZUMBA_PRICES;}catch{return DEFAULT_ZUMBA_PRICES;}
  });
  const savePrices=(p)=>{setPricesState(p);localStorage.setItem("zumba_prices",JSON.stringify(p));};

  useEffect(()=>{
    const mq=query(col("zumba_members"),orderBy("name"));
    const iq=query(col("zumba_income"),orderBy("date","desc"));
    const eq=query(col("zumba_expenses"),orderBy("date","desc"));
    const cq=query(col("zumba_classes"),orderBy("date","desc"));
    const um=onSnapshot(mq,s=>setMembers(s.docs.map(d=>({id:d.id,...d.data()}))));
    const ui=onSnapshot(iq,s=>setIncome(s.docs.map(d=>({id:d.id,...d.data()}))));
    const ue=onSnapshot(eq,s=>setExpenses(s.docs.map(d=>({id:d.id,...d.data()}))));
    const uc=onSnapshot(cq,s=>setClasses(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{um();ui();ue();uc();};
  },[]);

  const saveMember=async(m)=>{setSyncing(true);try{const id=m.id||uid();await setDoc(doc(col("zumba_members"),id),{...m,id,updatedAt:serverTimestamp()});flash(m.id?"Aktualisiert ✓":"Hinzugefügt ✓");}catch{flash("Fehler",false);}setSyncing(false);setModal(null);};
  const delMember=async(id)=>{if(!window.confirm("Teilnehmerin löschen?"))return;setSyncing(true);try{await deleteDoc(doc(col("zumba_members"),id));flash("Gelöscht",false);}catch{flash("Fehler",false);}setSyncing(false);};

  const saveIncome=async(inc)=>{
    setSyncing(true);
    try{
      const id=uid();
      await setDoc(doc(col("zumba_income"),id),{...inc,id,createdAt:serverTimestamp()});
      // Deduct session from member if linked
      if(inc.memberId){
        const m=members.find(x=>x.id===inc.memberId);
        if(m&&m.sessionsLeft>0){
          await setDoc(doc(col("zumba_members"),m.id),{...m,sessionsLeft:Math.max(0,m.sessionsLeft-1),updatedAt:serverTimestamp()});
        }
      }
      flash("Einnahme gespeichert ✓");
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const saveExpense=async(exp)=>{setSyncing(true);try{const id=uid();await setDoc(doc(col("zumba_expenses"),id),{...exp,id,createdAt:serverTimestamp()});flash("Ausgabe gespeichert ✓");}catch{flash("Fehler",false);}setSyncing(false);setModal(null);};

  const saveClass=async(cls)=>{
    setSyncing(true);
    try{
      const id=uid();
      await setDoc(doc(col("zumba_classes"),id),{...cls,id,createdAt:serverTimestamp()});
      // Deduct 1 session from each attendee
      for(const mid of (cls.attendees||[])){
        const m=members.find(x=>x.id===mid);
        if(m&&m.sessionsLeft>0){
          await setDoc(doc(col("zumba_members"),m.id),{...m,sessionsLeft:Math.max(0,m.sessionsLeft-1),updatedAt:serverTimestamp()});
        }
      }
      // Auto-add rent expense
      const expId=uid();
      await setDoc(doc(col("zumba_expenses"),expId),{id:expId,date:cls.date,category:"Raummiete",amount:prices.miete,notes:`Automatisch: Kurs ${dateStr(cls.date)}`,createdAt:serverTimestamp()});
      flash(`Kurs gespeichert ✓ · Raummiete CHF ${prices.miete} verbucht`);

    return d.toLocaleDateString("de-CH",{day:"2-digit",month:"long"});

          <button onClick={onBack} style={{width:36,height:36,borderRadius:12,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0}}><Ic n="home" s={16}/></button>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
            <span style={{fontSize:22}}>💃</span>
            <div style={{fontWeight:900,fontSize:16,color:"#fff"}}>Zumba Kurse</div>
            <div className="hdr-sub" style={{fontSize:10,color:"rgba(255,255,255,0.65)",fontWeight:700,letterSpacing:.6,marginLeft:4}}>MONTAG 20:00</div>
          </div>
          {lowAbo>0&&<span style={{background:"rgba(255,251,235,0.9)",color:"#d97706",border:"1px solid #fde68a",padding:"3px 7px",borderRadius:20,fontSize:11,fontWeight:700}}>{lowAbo} fast leer</span>}
        </div>
      </header>

      {/* Nav */}
      <nav style={{background:"#fff",borderBottom:`1px solid ${Z[100]}`,position:"sticky",top:56,zIndex:40}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 4px",display:"flex"}}>
          {[["dashboard","Übersicht","grid"],["members","Teilnehmer","users"],["finances","Finanzen","cash"],["classes","Kurse","cal"]].map(([id,lb,ic])=>(

          {members.filter(m=>m.active&&m.sessionsLeft<=1).length>0&&(
            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:16,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontWeight:900,fontSize:14,color:"#92400e",marginBottom:10}}>⚠️ Abo fast leer</div>
              {members.filter(m=>m.active&&m.sessionsLeft<=1).map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #fde68a"}}>
                  <span style={{fontWeight:700,color:"#92400e"}}>{m.name}</span>
                  <span style={{fontSize:12,fontWeight:700,color:m.sessionsLeft===0?"#dc2626":"#d97706"}}>
                    {m.sessionsLeft===0?"Leer!":`${m.sessionsLeft} Std. übrig`}
                  </span>
                </div>
              ))}
            </div>
          )}

          {/* Recent income */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>Letzte Einnahmen</span>
              <button onClick={()=>setModal({type:"income"})} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",background:Z[600],color:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:800,cursor:"pointer"}}>
                <Ic n="plus" s={12}/>Neu
              </button>
            </div>
            {income.slice(0,5).map(inc=>(
              <div key={inc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${Z[50]}`}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:Z[900]}}>{inc.memberName||"–"}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{getAboLabel(inc.type)} · {dateStr(inc.date)}</div>
                </div>
                <div style={{fontWeight:900,fontSize:15,color:"#16a34a"}}>+{chf(inc.amount)}</div>
              </div>
            ))}
            {income.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Einnahmen</div>}
          </div>

          {/* Quick add expense */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>Ausgaben</span>
              <button onClick={()=>setModal({type:"expense"})} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:20,fontSize:12,fontWeight:800,cursor:"pointer"}}>
                <Ic n="plus" s={12}/>Ausgabe
              </button>
            </div>
            <div style={{marginTop:10,display:"flex",justifyContent:"space-between",background:"#f8faff",borderRadius:12,padding:"12px 14px"}}>
              <span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}>Total Ausgaben</span>
              <span style={{fontWeight:900,fontSize:15,color:"#dc2626"}}>{chf(totalExpenses)}</span>
            </div>
          </div>
        </div>}

        {/* MEMBERS */}
        {tab==="members"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:900,color:Z[900]}}>Teilnehmerinnen</h2>
              <div style={{fontSize:13,color:"#94a3b8"}}>{activeMembers} aktiv · {members.length-activeMembers} inaktiv</div>
            </div>
            <button onClick={()=>setModal({type:"member"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:Z[600],color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Neu
            </button>
          </div>

          {/* Active */}
          {members.filter(m=>m.active).length===0&&<div style={{textAlign:"center",padding:40,background:"#fff",borderRadius:16,border:`2px dashed ${Z[200]}`}}>
            <div style={{fontSize:36,marginBottom:8}}>💃</div>
            <div style={{fontWeight:800,fontSize:15,color:Z[800],marginBottom:4}}>Noch keine Teilnehmer</div>
            <p style={{color:"#94a3b8",fontSize:13}}>Füge deine erste Teilnehmerin hinzu</p>
          </div>}

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {members.sort((a,b)=>b.active-a.active||a.name.localeCompare(b.name)).map(m=>{
              const aboInfo=ABO_TYPES.find(x=>x.id===m.aboType);
              const sessionColor=m.sessionsLeft===0?"#dc2626":m.sessionsLeft<=1?"#d97706":"#16a34a";
              return (
                <div key={m.id} style={{background:"#fff",border:`2px solid ${m.active?Z[100]:"#e2e8f0"}`,borderRadius:16,padding:"14px 16px",opacity:m.active?1:.7}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:44,height:44,borderRadius:14,background:m.active?`linear-gradient(135deg,${Z[500]},${Z[300]})`:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#fff",flexShrink:0}}>
                      {m.name[0]?.toUpperCase()||"?"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                        <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>{m.name}</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,background:m.active?Z[100]:"#f1f5f9",color:m.active?Z[700]:"#64748b"}}>{m.active?"Aktiv":"Inaktiv"}</span>
                      </div>
                      <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>{getAboLabel(m.aboType)}{aboInfo?.bonus?` (+${aboInfo.bonus} gratis)`:""}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{flex:1,height:6,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${Math.min(100,(m.sessionsLeft/getAboSessions(m.aboType||"einzel"))*100)}%`,background:sessionColor,borderRadius:4,transition:"width .3s"}}/>
                        </div>
                        <span style={{fontSize:12,fontWeight:800,color:sessionColor,whiteSpace:"nowrap"}}>{m.sessionsLeft} Std.</span>
                      </div>
                      {m.phone&&<div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>📱 {m.phone}</div>}
                    </div>
                    <div style={{display:"flex",gap:5,flexShrink:0}}>
                      <button onClick={()=>setModal({type:"member",member:m})} style={{width:32,height:32,borderRadius:8,background:Z[50],color:Z[600],border:`1px solid ${Z[200]}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" s={13}/></button>
                      <button onClick={()=>delMember(m.id)} style={{width:32,height:32,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={13}/></button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>}

        {/* FINANCES */}
        {tab==="finances"&&<div style={{animation:"fadein .3s ease"}}>
          {/* Summary */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            <Stat icon="cash"  label="Einnahmen"  value={chf(totalIncome)}   accent="#16a34a"/>
            <Stat icon="trend" label="Ausgaben"   value={chf(totalExpenses)} accent="#dc2626"/>
            <Stat icon="bar"   label="Resultat"   value={chf(netResult)}     accent={netResult>=0?"#16a34a":"#dc2626"}/>
            <Stat icon="cal"   label="Kurse"      value={classes.length}     accent={Z[600]}/>
          </div>

          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <button onClick={()=>setModal({type:"income"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Einnahme
            </button>
            <button onClick={()=>setModal({type:"expense"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Ausgabe
            </button>
          </div>

          {/* Income list */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{fontWeight:900,fontSize:15,color:Z[900],marginBottom:12}}>💚 Einnahmen ({income.length})</div>
            {income.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Einnahmen</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {income.map(inc=>(
                <div key={inc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#f0fdf4",borderRadius:12}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#14532d"}}>{inc.memberName||"Anonym"}</div>
                    <div style={{fontSize:11,color:"#4ade80"}}>{getAboLabel(inc.type)} · {dateStr(inc.date)}</div>
                    {inc.notes&&<div style={{fontSize:11,color:"#94a3b8",fontStyle:"italic"}}>{inc.notes}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontWeight:900,fontSize:15,color:"#16a34a"}}>+{chf(inc.amount)}</div>
                    <button onClick={async()=>{if(!window.confirm("Einnahme löschen?"))return;await deleteDoc(doc(col("zumba_income"),inc.id));flash("Gelöscht",false);}} style={{width:28,height:28,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={12}/></button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Expense list */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16}}>
            <div style={{fontWeight:900,fontSize:15,color:Z[900],marginBottom:12}}>❤️ Ausgaben ({expenses.length})</div>
            {expenses.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Ausgaben</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {expenses.map(exp=>(
                <div key={exp.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#fff5f5",borderRadius:12}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#7f1d1d"}}>{exp.category}</div>
                    <div style={{fontSize:11,color:"#fca5a5"}}>{dateStr(exp.date)}</div>
                    {exp.notes&&<div style={{fontSize:11,color:"#94a3b8",fontStyle:"italic"}}>{exp.notes}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontWeight:900,fontSize:15,color:"#dc2626"}}>−{chf(exp.amount)}</div>
                    <button onClick={async()=>{if(!window.confirm("Ausgabe löschen?"))return;await deleteDoc(doc(col("zumba_expenses"),exp.id));flash("Gelöscht",false);}} style={{width:28,height:28,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={12}/></button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>}

        {/* CLASSES */}
        {tab==="classes"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:900,color:Z[900]}}>Kurse</h2>
              <div style={{fontSize:13,color:"#94a3b8"}}>Jeden Montag 20:00 Uhr</div>
            </div>
            <button onClick={()=>setModal({type:"class"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:Z[600],color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Kurs erfassen
            </button>
          </div>

          {classes.length===0&&<div style={{textAlign:"center",padding:60,background:"#fff",borderRadius:16,border:`2px dashed ${Z[200]}`}}>
            <div style={{fontSize:40,marginBottom:8}}>📅</div>
            <div style={{fontWeight:800,fontSize:15,color:Z[800],marginBottom:4}}>Noch keine Kurse</div>
            <p style={{color:"#94a3b8",fontSize:13}}>Erfasse deinen ersten Kurs</p>
          </div>}

          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {classes.map(cls=>(
              <div key={cls.id} style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontWeight:900,fontSize:15,color:Z[900]}}>📅 {dateStr(cls.date)}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{background:Z[100],color:Z[700],padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:800}}>{cls.count||0} Teilnehmer</span>
                    <button onClick={async()=>{if(!window.confirm("Kurs löschen?"))return;await deleteDoc(doc(col("zumba_classes"),cls.id));flash("Gelöscht",false);}} style={{width:28,height:28,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={12}/></button>
                  </div>
                </div>
                {cls.notes&&<div style={{fontSize:12,color:"#94a3b8",fontStyle:"italic",marginBottom:6}}>"{cls.notes}"</div>}
                {(cls.attendees||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {(cls.attendees||[]).map(mid=>{
                    const m=members.find(x=>x.id===mid);
                    return m?<span key={mid} style={{fontSize:11,fontWeight:700,background:Z[50],color:Z[700],padding:"2px 8px",borderRadius:20,border:`1px solid ${Z[200]}`}}>{m.name}</span>:null;
                  })}
                </div>}
              </div>
            ))}
          </div>
        </div>}
      </main>

      {/* Modals */}
      {modal?.type==="member"&&<MemberModal member={modal.member} onSave={saveMember} onClose={()=>setModal(null)} prices={prices}/>}
      {modal?.type==="income"&&<IncomeModal onSave={saveIncome} onClose={()=>setModal(null)} members={members} prices={prices}/>}
      {modal?.type==="expense"&&<ExpenseModal onSave={saveExpense} onClose={()=>setModal(null)}/>}
      {modal?.type==="class"&&<ClassModal onSave={saveClass} onClose={()=>setModal(null)} members={members}/>}

      {/* Settings FAB */}
      {tab==="dashboard"&&<div style={{position:"fixed",bottom:24,right:16,zIndex:90}}>
        <button onClick={()=>setModal({type:"settings"})} style={{width:48,height:48,borderRadius:24,background:`linear-gradient(135deg,${Z[700]},${Z[500]})`,border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 6px 24px ${Z[600]}60`}}><Ic n="cog" s={20}/></button>
      </div>}

      {modal?.type==="settings"&&(
        <Drawer onClose={()=>setModal(null)}>
          <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:Z[900]}}>Preise & Einstellungen</h3>
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            {[["probe","Probestunde CHF"],["einzel","Einzelstunde CHF"],["abo5","5er-Abo CHF"],["abo10","10er-Abo CHF"],["miete","Raummiete/Kurs CHF"]].map(([key,label])=>(
              <Lbl key={key} t={label}>
                <input type="number" step="0.01" min="0" defaultValue={prices[key]} onBlur={e=>savePrices({...prices,[key]:parseFloat(e.target.value)||0})} style={inp}/>
              </Lbl>
            ))}
            <div style={{background:Z[50],borderRadius:12,padding:"12px 14px",fontSize:12,color:Z[700],fontWeight:600}}>
              💡 5er-Abo: 5 Stunden + 1 gratis (total 6)<br/>10er-Abo: 10 Stunden + 1 gratis (total 11)
            </div>
          </div>
          <button onClick={()=>setModal(null)} style={{width:"100%",marginTop:18,...aBtn(`linear-gradient(135deg,${Z[700]},${Z[500]})`)}}>Fertig</button>
        </Drawer>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [unlocked,setUnlocked]=useState(!!localStorage.getItem(STORAGE_KEY));
  const [splash,setSplash]=useState(true);
  const [module,setModule]=useState(null); // null=home, "prowin", "zumba"
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState(null);

  // Aggregated stats for home screen
  const [prowinStats,setProwinStats]=useState({products:0,revenue:0,out:0});
  const [zumbaStats,setZumbaStats]=useState({members:0,income:0,classes:0});

  const col=(sub)=>collection(db,"users",USER_ID,sub);
  const flash=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2800);};

  // Load summary stats for home
  useEffect(()=>{
    if(!unlocked)return;
    const pq=query(col("products"),orderBy("name"));
    const sq=query(col("sales"),orderBy("date","desc"));
    const mq=query(col("zumba_members"),orderBy("name"));
    const iq=query(col("zumba_income"),orderBy("date","desc"));
    const cq=query(col("zumba_classes"),orderBy("date","desc"));

    const up=onSnapshot(pq,s=>{
      const ps=s.docs.map(d=>d.data());
      setProwinStats(x=>({...x,products:ps.length,out:ps.filter(p=>p.stock===0).length}));
    });
    const us=onSnapshot(sq,s=>{
      const ss=s.docs.map(d=>d.data());
      setProwinStats(x=>({...x,revenue:ss.reduce((a,b)=>a+(b.revenue||0),0)}));
    });
    const um=onSnapshot(mq,s=>{
      setZumbaStats(x=>({...x,members:s.docs.filter(d=>d.data().active).length}));
    });
    const ui=onSnapshot(iq,s=>{
      setZumbaStats(x=>({...x,income:s.docs.reduce((a,d)=>a+(d.data().amount||0),0)}));
    });
    const uc=onSnapshot(cq,s=>{
      setZumbaStats(x=>({...x,classes:s.docs.length}));
    });
    return()=>{up();us();um();ui();uc();};
  },[unlocked]);

  if(splash) return <SplashScreen onDone={()=>setSplash(false)}/>;
  if(!unlocked) return <LoginScreen onUnlock={()=>setUnlocked(true)}/>;

  return (
    <div>
      {/* Logout button on home */}
      {module===null&&(
        <div style={{position:"fixed",top:12,right:16,zIndex:100}}>
          <button onClick={()=>{localStorage.removeItem(STORAGE_KEY);setUnlocked(false);}} title="Ausloggen"
            style={{width:36,height:36,borderRadius:18,background:"rgba(255,255,255,0.9)",border:`1px solid ${B[200]}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:B[600],boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>
            <Ic n="key" s={15}/>
          </button>
        </div>
      )}

      {module===null&&(
        <HomeScreen onSelect={setModule} prowinStats={prowinStats} zumbaStats={zumbaStats}/>
      )}

      {module==="prowin"&&(
        <ProwinModule col={col} flash={flash} syncing={syncing} setSyncing={setSyncing} onBack={()=>setModule(null)}/>
      )}

      {module==="zumba"&&(
        <ZumbaModule col={col} flash={flash} syncing={syncing} setSyncing={setSyncing} onBack={()=>setModule(null)}/>
      )}

      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.ok?B[800]:"#7f1d1d",color:"#fff",padding:"11px 22px",borderRadius:30,fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,.2)",zIndex:9999,whiteSpace:"nowrap",animation:"fadein .2s ease"}}>{toast.msg}</div>}
    </div>
  );
}

function waitAndRender() {
  if(window.__firebase){ReactDOM.createRoot(document.getElementById("root")).render(<App/>);}
  else{setTimeout(waitAndRender,50);}
}
waitAndRender();
</script>
</body>
</html>
