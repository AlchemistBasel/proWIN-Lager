      return ms&&mk&&mq;
    });
    if(sortBy==="preis-asc")  res=[...res].sort((a,b)=>(a.wunschpreis||0)-(b.wunschpreis||0));
    if(sortBy==="preis-desc") res=[...res].sort((a,b)=>(b.wunschpreis||0)-(a.wunschpreis||0));
    if(sortBy==="kat")        res=[...res].sort((a,b)=>a.kategorie.localeCompare(b.kategorie));
    if(sortBy==="datum")      res=[...res]; // already ordered by createdAt desc from Firebase
    return res;
  },[items,filterStatus,filterKat,search,sortBy]);

  const byStatus = useMemo(()=>{
    const g={verfuegbar:[],mitgenommen:[],reserviert:[],online:[],verkauft:[]};
    filtered.forEach(it=>{if(g[it.status])g[it.status].push(it);});
    return g;
  },[filtered]);

  const nächsterFlohmarkt = flohmärkte.find(fm=>fm.datum>=today());

  return (
    <div style={{minHeight:"100vh",background:"#fff1f2"}}>
      <header className="safe-header" style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",position:"sticky",top:0,zIndex:50,boxShadow:"0 4px 24px "+FM_A[900]+"50",paddingTop:"env(safe-area-inset-top,0px)"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",height:56,gap:12}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:12,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0}}><Ic n="home" s={16}/></button>
          <div style={{fontSize:24}}>🏷️</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:16,color:"#fff"}}>Lorena's Flohmarkt</div>
            <div className="hdr-sub" style={{fontSize:10,color:"rgba(255,255,255,0.65)",fontWeight:700,letterSpacing:.6}}>ARTIKEL & EVENTS</div>
          </div>
          <button onClick={()=>exportCSV(items,flohmärkte)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:10,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            <Ic n="dl" s={13}/>CSV
          </button>
        </div>
      </header>

      <nav style={{background:"#fff",borderBottom:"1px solid #fecdd3",position:"sticky",top:"calc(56px + env(safe-area-inset-top,0px))",zIndex:40}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 4px",display:"flex"}}>
          {[["lager","Lager","pkg"],["flohmärkte","Flohmärkte","store"],["stats","Statistik","bar"]].map(([id,lb,ic])=>(
            <button key={id} onClick={()=>setTab(id)} className="nav-btn"
              style={{display:"flex",alignItems:"center",gap:5,padding:"12px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:tab===id?FM_A[700]:"#94a3b8",borderBottom:"2.5px solid "+(tab===id?FM_A[500]:"transparent"),flex:1,justifyContent:"center"}}>
              <Ic n={ic} s={16}/><span className="nav-label">{lb}</span>
            </button>
          ))}
        </div>
      </nav>

      <main className="main-pad" style={{maxWidth:960,margin:"0 auto",padding:"16px",paddingBottom:"calc(80px + env(safe-area-inset-bottom,0px))"}}>

        {tab==="lager"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
            {[["Artikel",items.length,FM_A[700]],["Verfügbar",verfuegbar.length,"#16a34a"],["Mitgenommen",mitgenommen.length,"#0891b2"],["Verkauft",verkauft.length,"#6b7280"]].map(([label,val,color])=>(
              <div key={label} style={{background:"#fff",border:"1px solid "+FM_A[200],borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontWeight:900,fontSize:18,color}}>{val}</div>
                <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.3}}>{label}</div>
              </div>
            ))}
          </div>

          {nächsterFlohmarkt&&(
            <div style={{background:"linear-gradient(135deg,"+FM_A[700]+","+FM_A[500]+")",borderRadius:16,padding:"14px 16px",marginBottom:16,color:"#fff",display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:28}}>🏪</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:900,fontSize:14}}>Naechster Flohmarkt</div>
                <div style={{fontSize:12,opacity:.85}}>{nächsterFlohmarkt.name} · {dateStr(nächsterFlohmarkt.datum)}{nächsterFlohmarkt.ort?" · "+nächsterFlohmarkt.ort:""}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:900,fontSize:14}}>{items.filter(i=>i.flohmarktId===nächsterFlohmarkt.id).length} Artikel</div>
                <div style={{fontSize:11,opacity:.7}}>eingeplant</div>
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:140,position:"relative"}}>
              <Ic n="search" s={14} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94a3b8"}}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Suchen..." style={{...FM_inp,paddingLeft:34}}/>
            </div>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{...FM_inp,width:"auto"}}>
              <option value="Alle">Alle Status</option>
              {FM_STATI.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
            <select value={filterKat} onChange={e=>setFilterKat(e.target.value)} style={{...FM_inp,width:"auto"}}>
              <option value="Alle">Alle Kat.</option>
              {cats.map(c=><option key={c}>{c}</option>)}
            </select>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{...FM_inp,width:"auto"}}>
              <option value="datum">↕ Datum</option>
              <option value="preis-asc">↑ Preis</option>
              <option value="preis-desc">↓ Preis</option>
              <option value="kat">A-Z Kategorie</option>
            </select>
          </div>

          {/* Schnellverkauf prominent */}
          <button onClick={()=>setModal({type:"quicksale"})}
            style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"16px",background:"linear-gradient(135deg,#9f1239,#f43f5e)",color:"#fff",border:"none",borderRadius:16,fontSize:15,fontWeight:900,cursor:"pointer",boxShadow:"0 6px 20px #f43f5e50",marginBottom:12,letterSpacing:.3}}>
            💰 Schnellverkauf erfassen
          </button>

          {/* Print + Add buttons */}
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button onClick={()=>setModal({type:"item"})}
              style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",background:"#fff",border:"2px solid "+FM_A[300],borderRadius:14,fontSize:14,fontWeight:800,color:FM_A[700],cursor:"pointer"}}>
              <Ic n="plus" s={16}/>Artikel hinzufügen
            </button>
            <button onClick={()=>setModal({type:"print"})}
              style={{display:"flex",alignItems:"center",gap:6,padding:"13px 16px",background:"#fff",border:"2px solid "+FM_A[300],borderRadius:14,fontSize:13,fontWeight:800,color:FM_A[700],cursor:"pointer"}}>
              🖨️ Etiketten
            </button>
          </div>

          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:48,background:"#fff",borderRadius:16,border:"2px dashed "+FM_A[300]}}>
              <div style={{fontSize:40,marginBottom:8}}>🏷️</div>
              <div style={{fontWeight:800,fontSize:15,color:FM_A[800],marginBottom:4}}>Noch keine Artikel</div>
              <p style={{color:"#94a3b8",fontSize:13}}>Fuege deinen ersten Artikel hinzu</p>
            </div>
          )}

          {FM_STATI.map(st=>{
            const grp=byStatus[st.id]||[];
            if(grp.length===0) return null;
            const wert=grp.reduce((s,i)=>s+(st.id==="verkauft"?(i.verkaufspreis||0):(i.wunschpreis||0)),0);
            return (
              <div key={st.id} style={{marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:11,fontWeight:800,padding:"3px 10px",borderRadius:20,background:st.bg,color:st.color,border:"1px solid "+st.border}}>{st.label}</span>
                  <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{grp.length} Artikel{wert>0?" · "+chf(wert):""}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {grp.map(it=>(
                    <ItemCard key={it.id} item={it} flohmärkte={flohmärkte}
                      onEdit={item=>setModal({type:"item",item})}
                      onVerkauft={item=>setModal({type:"verkauft",item})}
                      onToggleMitgenommen={toggleMitgenommen}
                    />
                  ))}
                </div>
              </div>
            );
          })}
        </div>}

        {tab==="flohmärkte"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:900,color:FM_A[900]}}>Flohmärkte</h2>
              <div style={{fontSize:13,color:"#94a3b8"}}>{flohmärkte.length} Events</div>
            </div>
            <button onClick={()=>setModal({type:"flohmarkt"})}
              style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"linear-gradient(135deg,"+FM_A[800]+","+FM_A[500]+")",color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Neu
            </button>
          </div>

          {flohmärkte.length===0&&(
            <div style={{textAlign:"center",padding:48,background:"#fff",borderRadius:16,border:"2px dashed "+FM_A[300]}}>
              <div style={{fontSize:40,marginBottom:8}}>🏪</div>
              <div style={{fontWeight:800,fontSize:15,color:FM_A[800],marginBottom:4}}>Noch kein Flohmarkt</div>
              <p style={{color:"#94a3b8",fontSize:13}}>Plane deinen naechsten Flohmarkt</p>
            </div>
          )}

          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {flohmärkte.map(fm=>{
              const fmItems=items.filter(i=>i.flohmarktId===fm.id);
              const sold=fmItems.filter(i=>i.status==="verkauft");
              const einnahmen=sold.reduce((s,i)=>s+(i.verkaufspreis||0),0);
              const fmAusgaben=(fm.ausgaben||[]).reduce((s,a)=>s+(a.betrag||0),0);
              const gewinn=einnahmen-fmAusgaben;
              const isPast=fm.datum<today();
              return (
                <div key={fm.id} style={{background:"#fff",border:"2px solid "+(isPast?FM_A[200]:FM_A[400]),borderRadius:16,padding:"16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                        <span style={{fontWeight:900,fontSize:16,color:FM_A[900]}}>{fm.name}</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:isPast?"#f1f5f9":FM_A[100],color:isPast?"#64748b":FM_A[700]}}>{isPast?"Vergangen":"Geplant"}</span>
                      </div>
                      <div style={{fontSize:12,color:"#94a3b8"}}>{dateStr(fm.datum)}{fm.ort?" · "+fm.ort:""}</div>
                    </div>
                    <button onClick={()=>setModal({type:"flohmarkt",fm})} style={{width:32,height:32,borderRadius:8,background:FM_A[100],color:FM_A[700],border:"1px solid "+FM_A[300],cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="edit" s={13}/></button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:fmItems.length>0||fmAusgaben>0?10:0}}>
                    {[["Artikel",fmItems.length,FM_A[700]],["Verkauft",sold.length,"#16a34a"],["Einnahmen",chf(einnahmen),"#16a34a"],["Gewinn",chf(gewinn),gewinn>=0?"#16a34a":"#dc2626"]].map(([label,val,color])=>(
                      <div key={label} style={{background:FM_A[50],borderRadius:10,padding:"8px",textAlign:"center"}}>
                        <div style={{fontWeight:900,fontSize:12,color}}>{val}</div>
                        <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>{label}</div>
                      </div>
                    ))}
                  </div>
                  {/* Ausgaben */}
                  {fmAusgaben>0&&(
                    <div style={{background:"#fff5f5",borderRadius:10,padding:"8px 12px",marginBottom:fmItems.length>0?10:0}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:4,textTransform:"uppercase",letterSpacing:.3}}>Ausgaben</div>
                      {(fm.ausgaben||[]).map(a=>(
                        <div key={a.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"2px 0"}}>
                          <span style={{color:"#7f1d1d",fontWeight:600}}>{a.bez}</span>
                          <span style={{color:"#dc2626",fontWeight:800}}>{chf(a.betrag)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {fmItems.length>0&&(
                    <div style={{paddingTop:10,borderTop:"1px solid "+FM_A[100]}}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {fmItems.map(it=>(
                          <span key={it.id} style={{fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:20,background:it.status==="verkauft"?"#f0fdf4":FM_A[100],color:it.status==="verkauft"?"#16a34a":FM_A[700],border:"1px solid "+(it.status==="verkauft"?"#bbf7d0":FM_A[300])}}>
                            {it.status==="verkauft"?"✓ ":""}{it.name}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>}

        {tab==="stats"&&<div style={{animation:"fadein .3s ease"}}>
          <h2 style={{fontSize:20,fontWeight:900,color:FM_A[900],marginBottom:16}}>Statistik</h2>
          <div style={{background:"linear-gradient(135deg,"+FM_A[800]+","+FM_A[500]+")",borderRadius:20,padding:"20px",marginBottom:16,color:"#fff"}}>
            <div style={{fontSize:12,opacity:.75,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Gesamteinnahmen</div>
            <div style={{fontSize:36,fontWeight:900}}>{chf(totalEinnahmen)}</div>
            <div style={{fontSize:13,opacity:.8,marginTop:4}}>{verkauft.length} Artikel verkauft von {items.length} total</div>
          </div>

          <div style={{background:"#fff",border:"1px solid "+FM_A[200],borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{fontWeight:900,fontSize:15,color:FM_A[900],marginBottom:12}}>Einnahmen pro Kanal</div>
            {FM_KANAELE.map(k=>{
              const kItems=verkauft.filter(i=>i.kanal===k);
              if(kItems.length===0) return null;
              const total=kItems.reduce((s,i)=>s+(i.verkaufspreis||0),0);
              const pct=totalEinnahmen>0?Math.round((total/totalEinnahmen)*100):0;
              return (
                <div key={k} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:700,color:FM_A[800]}}>{k}</span>
                    <span style={{fontSize:13,fontWeight:900,color:FM_A[700]}}>{chf(total)} · {kItems.length} Stk</span>
                  </div>
                  <div style={{height:6,background:FM_A[100],borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+FM_A[500]+","+FM_A[300]+")",borderRadius:4}}/>
                  </div>
                </div>
              );
            })}
            {verkauft.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Verkaeufe</div>}
          </div>

          <div style={{background:"#fff",border:"1px solid "+FM_A[200],borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{fontWeight:900,fontSize:15,color:FM_A[900],marginBottom:12}}>Pro Kategorie</div>
            {cats.map(k=>{
              const all=items.filter(i=>i.kategorie===k);
              const s=all.filter(i=>i.status==="verkauft");
              if(all.length===0) return null;
              return (
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+FM_A[100]}}>
                  <span style={{fontSize:13,fontWeight:700,color:FM_A[800]}}>{k}</span>
                  <div style={{display:"flex",gap:12,fontSize:12}}>
                    <span style={{color:"#94a3b8"}}>{all.length} total</span>
                    <span style={{color:"#16a34a",fontWeight:700}}>{s.length} verk.</span>
                    <span style={{color:FM_A[700],fontWeight:900}}>{chf(s.reduce((sum,i)=>sum+(i.verkaufspreis||0),0))}</span>
                  </div>
                </div>
              );
            })}
          </div>

          {flohmärkte.length>0&&(
            <div style={{background:"#fff",border:"1px solid "+FM_A[200],borderRadius:16,padding:16}}>
              <div style={{fontWeight:900,fontSize:15,color:FM_A[900],marginBottom:12}}>Pro Flohmarkt</div>
              {flohmärkte.map(fm=>{
                const fmSold=verkauft.filter(i=>i.flohmarktId===fm.id);
                const einnahmen=fmSold.reduce((s,i)=>s+(i.verkaufspreis||0),0);
                const ausgaben=(fm.ausgaben||[]).reduce((s,a)=>s+(a.betrag||0),0);
                const gewinn=einnahmen-ausgaben;
                return (
                  <div key={fm.id} style={{padding:"10px 0",borderBottom:"1px solid "+FM_A[100]}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:FM_A[800]}}>{fm.name}</div>
                        <div style={{fontSize:11,color:"#94a3b8"}}>{dateStr(fm.datum)} · {fmSold.length} Artikel</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontWeight:900,fontSize:14,color:"#16a34a"}}>{chf(einnahmen)}</div>
                        {ausgaben>0&&<div style={{fontSize:11,color:"#dc2626"}}>- {chf(ausgaben)} Ausg.</div>}
                        {ausgaben>0&&<div style={{fontSize:12,fontWeight:900,color:gewinn>=0?"#16a34a":"#dc2626"}}>= {chf(gewinn)} Gewinn</div>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>}

      </main>

      {modal?.type==="print"&&<PrintModal items={items} flohmärkte={flohmärkte} onClose={()=>setModal(null)}/>}
      {modal?.type==="quicksale"&&<QuickSaleModal flohmärkte={flohmärkte} onSave={quickSale} onClose={()=>setModal(null)}/>}
      {modal?.type==="item"&&<ItemModal item={modal.item||null} flohmärkte={flohmärkte} onSave={saveItem} onClose={()=>setModal(null)} onDel={delItem} cats={cats} onAddCat={addCat}/>}
      {modal?.type==="verkauft"&&<VerkauftModal item={modal.item} onSave={opts=>markVerkauft(modal.item,opts)} onClose={()=>setModal(null)}/>}
      {modal?.type==="flohmarkt"&&<FlohmarktModal fm={modal.fm||null} onSave={saveFm} onClose={()=>setModal(null)}/>}

      {toast&&<div style={{position:"fixed",bottom:"calc(24px + env(safe-area-inset-bottom,0px))",left:"50%",transform:"translateX(-50%)",background:toast.ok?FM_A[800]:"#7f1d1d",color:"#fff",padding:"11px 22px",borderRadius:30,fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,.2)",zIndex:9999,whiteSpace:"nowrap",animation:"fadein .2s ease"}}>{toast.msg}</div>}
    </div>
  );
}

//const ks_uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);


function KleidungCard({item,onClick,onFav}) {
  const [err,setErr]=useState(false);
  return (
    <div onClick={onClick} style={{background:"#fff",borderRadius:18,overflow:"hidden",cursor:"pointer",border:`1px solid ${KSC[100]}`,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",transition:"transform .15s",position:"relative"}}
      onMouseEnter={e=>e.currentTarget.style.transform="translateY(-3px)"}

  const [searchQ,setSearchQ]=useState("");

  const toggle=(id)=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const filtered=allItems.filter(i=>!searchQ||i.name.toLowerCase().includes(searchQ.toLowerCase()));

  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:KSC[800]}}>{isEdit?"Outfit bearbeiten":"Neues Outfit"}</h3>

                    <div style={{width:42,height:42,borderRadius:10,background:KSC[100],flexShrink:0,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>

// ── SwipeView ─────────────────────────────────────────────────────────────────
function SwipeView({items}) {
  const [idx,setIdx]=useState(0);
  const [anim,setAnim]=useState(null);
  const [filterCat,setFilterCat]=useState("Alle");

  const filtered=filterCat==="Alle"?items:items.filter(i=>i.kategorie===filterCat);
  const current=filtered[idx];
  const [err,setErr]=useState(false);

  const go=(dir)=>{
    setAnim(dir);
    setTimeout(()=>{
      setAnim(null);
      setErr(false);
      setIdx(i=>(i+1)%Math.max(1,filtered.length));
    },350);
  };

  const reset=()=>{setIdx(0);setErr(false);};

  if(filtered.length===0) return (
    <div style={{textAlign:"center",padding:60,color:"#94a3b8"}}>
      <div style={{fontSize:48,marginBottom:12}}>👗</div>
      <div style={{fontWeight:700,fontSize:16}}>Keine Kleider in dieser Kategorie</div>
    </div>
  );

  return (
    <div style={{animation:"fadein .3s ease"}}>
      {/* Category filter */}
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:20,scrollbarWidth:"none"}}>
        {KS_CATS.map(c=>(
          <button key={c} onClick={()=>{setFilterCat(c);setIdx(0);}} style={{flexShrink:0,padding:"6px 14px",borderRadius:20,border:`2px solid ${filterCat===c?KSC[500]:KSC[200]}`,background:filterCat===c?KSC[500]:"#fff",color:filterCat===c?"#fff":KSC[700],fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            {KS_ICONS[c]} {c}
          </button>
        ))}
      </div>

      {/* Counter */}
      <div style={{textAlign:"center",fontSize:13,color:"#94a3b8",fontWeight:600,marginBottom:16}}>
        {idx+1} / {filtered.length}
        <button onClick={reset} style={{marginLeft:8,fontSize:11,color:KSC[600],background:"none",border:"none",cursor:"pointer",fontWeight:700}}>↺ Neustart</button>
      </div>

      {/* Swipe card */}
      <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>
        <div className={anim==="left"?"swipe-left":anim==="right"?"swipe-right":""}
          style={{width:280,borderRadius:28,background:"#fff",boxShadow:"0 12px 40px rgba(0,0,0,0.12)",overflow:"hidden",animation:!anim?"popIn .3s ease":undefined}}>
          <div style={{height:340,background:`linear-gradient(145deg,${KSC[50]},${KSC[100]})`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            {current.image&&!err
              ?<img src={current.image} alt={current.name} onError={()=>setErr(true)} style={{width:"100%",height:"100%",objectFit:"contain",padding:20}}/>
              :<span style={{fontSize:80}}>{KS_ICONS[current.kategorie]||"👗"}</span>
            }
            {current.favorite&&<div style={{position:"absolute",top:16,right:16,color:"#ef4444"}}><Ic n="heartFill" s={22}/></div>}
          </div>
          <div style={{padding:"16px 20px 20px"}}>
            <div style={{fontWeight:900,fontSize:18,color:KSC[900],marginBottom:6}}>{current.name}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <span style={{fontSize:11,fontWeight:700,background:KSC[100],color:KSC[700],padding:"2px 8px",borderRadius:10}}>{current.kategorie}</span>
              {current.farbe&&current.farbe!=="–"&&<span style={{fontSize:11,fontWeight:700,background:"#f1f5f9",color:"#64748b",padding:"2px 8px",borderRadius:10}}>{current.farbe}</span>}
              {current.marke&&<span style={{fontSize:11,fontWeight:700,background:"#f8faff",color:"#475569",padding:"2px 8px",borderRadius:10}}>{current.marke}</span>}
              {current.groesse&&<span style={{fontSize:11,fontWeight:700,background:KSC[50],color:KSC[600],padding:"2px 8px",borderRadius:10}}>Gr. {current.groesse}</span>}
            </div>
            {current.notizen&&<p style={{fontSize:12,color:"#94a3b8",fontStyle:"italic",marginTop:8}}>{current.notizen}</p>}
          </div>
        </div>
      </div>

      {/* Navigation buttons */}
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:20}}>
        <button onClick={()=>go("left")} style={{width:64,height:64,borderRadius:32,background:"#fff",border:`2px solid ${KSC[200]}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 4px 16px rgba(0,0,0,0.08)",color:KSC[600]}}>
          ←
        </button>
        <div style={{fontSize:13,color:"#94a3b8",fontWeight:600,textAlign:"center",lineHeight:1.4}}>
          Wische oder klicke<br/>um zu navigieren
        </div>
        <button onClick={()=>go("right")} style={{width:64,height:64,borderRadius:32,background:"linear-gradient(135deg,#facc15,#fde047)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 4px 16px #facc1560",color:"#fff"}}>
          →
        </button>
      </div>

      {/* Progress dots */}
      <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:20,flexWrap:"wrap"}}>
        {filtered.slice(0,20).map((_,i)=>(
          <div key={i} onClick={()=>setIdx(i)} style={{width:i===idx?20:6,height:6,borderRadius:3,background:i===idx?KSC[500]:KSC[200],cursor:"pointer",transition:"all .2s"}}/>
        ))}
        {filtered.length>20&&<span style={{fontSize:11,color:"#94a3b8",marginLeft:4}}>+{filtered.length-20}</span>}
      </div>
    </div>
  );
}

    setModal(null);
  };

  const filtered=useMemo(()=>{
    let r=items;
    if(filterCat!=="Alle")r=r.filter(i=>i.kategorie===filterCat);
    if(filterFav)r=r.filter(i=>i.favorite);
    if(search.trim())r=r.filter(i=>i.name.toLowerCase().includes(search.toLowerCase())||(i.marke||"").toLowerCase().includes(search.toLowerCase()));
    return r;
  },[items,filterCat,filterFav,search]);

  // Group by category for schrank view
  const byCat=useMemo(()=>{
    const g={};
    filtered.forEach(i=>{
      if(!g[i.kategorie])g[i.kategorie]=[];
      g[i.kategorie].push(i);
    });
    return g;
  },[filtered]);

  const totalBycat=useMemo(()=>{
    const g={};
    items.forEach(i=>{g[i.kategorie]=(g[i.kategorie]||0)+1;});
    return g;
  },[items]);

  return (
    <div style={{minHeight:"100vh",background:"#fffbeb"}}>
      {/* Header */}
      <header style={{background:`linear-gradient(135deg,${KSC[800]},#facc15)`,position:"sticky",top:0,zIndex:50,boxShadow:`0 4px 24px ${KSC[900]}50`}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",height:56,gap:12}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:12,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0}}><Ic n="home" s={16}/></button>
          <span style={{fontSize:24}}>👗</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:16,color:"#fff"}}>Lorena's Kleiderschrank</div>
            <div className="hdr-sub" style={{fontSize:10,color:"rgba(255,255,255,0.65)",fontWeight:700,letterSpacing:.6}}>{items.length} TEILE · {outfits.length} OUTFITS</div>
          </div>
          <button onClick={()=>setModal({type:"add"})} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.35)",borderRadius:20,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer"}}>
            <Ic n="plus" s={14}/>Neu
          </button>
        </div>
      </header>

      {/* Nav */}
      <nav style={{background:"#fff",borderBottom:`1px solid ${KSC[100]}`,position:"sticky",top:56,zIndex:40}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 4px",display:"flex"}}>
          {[["schrank","Schrank","grid"],["outfits","Outfits","star"],["swipen","Swipen","swap"]].map(([id,lb,ic])=>(
            <button key={id} onClick={()=>setTab(id)} className="nav-btn" style={{display:"flex",alignItems:"center",gap:5,padding:"12px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:tab===id?KSC[700]:"#94a3b8",borderBottom:`2.5px solid ${tab===id?KSC[500]:"transparent"}`,flex:1,justifyContent:"center"}}>
              <Ic n={ic} s={15}/><span className="nav-label">{lb}</span>
            </button>
          ))}
        </div>
      </nav>

      <main className="main-pad" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px 80px"}}>

        {/* SCHRANK TAB */}
        {tab==="schrank"&&<div style={{animation:"fadein .3s ease"}}>
          {/* Stats row */}
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:16,scrollbarWidth:"none"}}>
            {KS_CATS.filter(c=>c!=="Alle").map(c=>(
              <div key={c} onClick={()=>setFilterCat(filterCat===c?"Alle":c)}
                style={{flexShrink:0,background:filterCat===c?`linear-gradient(135deg,${KSC[700]},#facc15)`:"#fff",border:`1px solid ${filterCat===c?KSC[500]:KSC[200]}`,borderRadius:14,padding:"8px 12px",cursor:"pointer",textAlign:"center",minWidth:72}}>
                <div style={{fontSize:20,marginBottom:2}}>{KS_ICONS[c]}</div>
                <div style={{fontSize:10,fontWeight:700,color:filterCat===c?"#fff":KSC[700],whiteSpace:"nowrap"}}>{c.split("/")[0]}</div>
                <div style={{fontSize:12,fontWeight:900,color:filterCat===c?"#fff":KSC[600]}}>{totalBycat[c]||0}</div>
              </div>
            ))}
          </div>

          {/* Search + Fav filter */}
          <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
            <div style={{flex:1,position:"relative"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Suchen nach Name oder Marke…" style={{...ks_inp,paddingLeft:12}}/>
            </div>
            <button onClick={()=>setFilterFav(x=>!x)} style={{padding:"10px 14px",borderRadius:12,border:`2px solid ${filterFav?"#ef4444":KSC[200]}`,background:filterFav?"#fff5f5":"#fff",color:filterFav?"#ef4444":KSC[600],cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontWeight:700,fontSize:13,flexShrink:0}}>
              <Ic n={filterFav?"heartFill":"heart"} s={15}/>
            </button>
          </div>

          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:60,background:"#fff",borderRadius:20,border:`2px dashed ${KSC[200]}`}}>
              <div style={{fontSize:48,marginBottom:12}}>👗</div>
              <div style={{fontWeight:800,fontSize:16,color:KSC[800],marginBottom:6}}>Noch nichts im Schrank</div>
              <p style={{color:"#94a3b8",fontSize:13,marginBottom:16}}>Füge dein erstes Kleidungsstück hinzu</p>
              <button onClick={()=>setModal({type:"add"})} style={{padding:"11px 22px",background:`linear-gradient(135deg,${KSC[700]},${KSC[500]})`,color:"#fff",border:"none",borderRadius:14,fontSize:14,fontWeight:800,cursor:"pointer"}}>+ Hinzufügen</button>
            </div>
          )}

          {/* Grouped by category */}
          {Object.entries(byCat).map(([cat,catItems])=>(
            <div key={cat} style={{marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <span style={{fontSize:20}}>{KS_ICONS[cat]||"👗"}</span>
                <span style={{fontWeight:900,fontSize:16,color:KSC[800]}}>{cat}</span>
                <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>({catItems.length})</span>
              </div>
              <div className="grid-3" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                {catItems.map(item=>(
                  <KleidungCard key={item.id} item={item}
                    onClick={()=>setModal({type:"detail",item})}
                    onFav={()=>toggleFav(item)}
                  />
                ))}
              </div>
            </div>
          ))}
        </div>}

        {/* OUTFITS TAB */}
        {tab==="outfits"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:900,color:KSC[900]}}>Meine Outfits</h2>
              <div style={{fontSize:13,color:"#94a3b8"}}>{outfits.length} gespeicherte Outfits</div>
            </div>
            <button onClick={()=>setModal({type:"outfit"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:`linear-gradient(135deg,${KSC[700]},${KSC[500]})`,color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Neu
            </button>
          </div>

          {outfits.length===0&&(
            <div style={{textAlign:"center",padding:60,background:"#fff",borderRadius:20,border:`2px dashed ${KSC[200]}`}}>
              <div style={{fontSize:48,marginBottom:12}}>✨</div>
              <div style={{fontWeight:800,fontSize:16,color:KSC[800],marginBottom:6}}>Noch kein Outfit</div>
              <p style={{color:"#94a3b8",fontSize:13,marginBottom:16}}>Kombiniere Teile aus deinem Schrank</p>
              <button onClick={()=>setModal({type:"outfit"})} style={{padding:"11px 22px",background:`linear-gradient(135deg,${KSC[700]},${KSC[500]})`,color:"#fff",border:"none",borderRadius:14,fontSize:14,fontWeight:800,cursor:"pointer"}}>+ Outfit erstellen</button>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14}}>
            {outfits.map(outfit=>(
              <OutfitCard key={outfit.id} outfit={outfit} allItems={items}
                onClick={()=>setModal({type:"outfit",outfit})}
              />
            ))}
          </div>
        </div>}

        {/* SWIPE TAB */}
        {tab==="swipen"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <h2 style={{fontSize:20,fontWeight:900,color:KSC[900],marginBottom:4}}>Schrank durchblättern</h2>
            <p style={{fontSize:13,color:"#94a3b8"}}>Navigiere durch deine Kleider wie eine Diashow</p>
          </div>
          <SwipeView items={items}/>
        </div>}

      </main>

      {/* Modals */}
      {modal?.type==="add"&&<KleidungModal onSave={saveItem} onClose={()=>setModal(null)} onDel={delItem}/>}
      {modal?.type==="edit"&&<KleidungModal item={modal.item} onSave={saveItem} onClose={()=>setModal(null)} onDel={delItem}/>}
      {modal?.type==="detail"&&<DetailModal item={modal.item} onClose={()=>setModal(null)} onEdit={()=>setModal({type:"edit",item:modal.item})} onFav={toggleFav}/>}
      {modal?.type==="outfit"&&<OutfitModal outfit={modal.outfit||null} allItems={items} onSave={saveOutfit} onClose={()=>setModal(null)} onDel={delOutfit}/>}

      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.ok?KSC[800]:"#7f1d1d",color:"#fff",padding:"11px 22px",borderRadius:30,fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,.2)",zIndex:9999,whiteSpace:"nowrap",animation:"fadein .2s ease"}}>{toast.msg}</div>}
    </div>
  );
}
function App() {
  const [unlocked,setUnlocked]=useState(!!localStorage.getItem(STORAGE_KEY));
  const [splash,setSplash]=useState(true);
  const [module,setModule]=useState(null); // null=home, "prowin", "zumba", "flohmarkt"
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState(null);

  // Aggregated stats for home screen
  const [prowinStats,setProwinStats]=useState({products:0,revenue:0,out:0});
  const [zumbaStats,setZumbaStats]=useState({members:0,income:0,classes:0});
  const [flohmarktStats,setFlohmarktStats]=useState({artikel:0,verkauft:0,einnahmen:0});
  const [kleiderschrankStats,setKleiderschrankStats]=useState({teile:0,outfits:0});

  // Rohdaten für Monats-Saldo
  const [_sales,setSales_]=useState([]);
  const [_zincome,setZincome_]=useState([]);
  const [_zexp,setZexp_]=useState([]);
  const [_fitems,setFitems_]=useState([]);
  const [_fevents,setFevents_]=useState([]);

  // Aktueller Monat (Year-Month-Präfix)
  const monthSaldo=useMemo(()=>{
    const now=new Date();
    const prefix=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    const inMonth=(d)=>typeof d==="string"&&d.startsWith(prefix);
    const prowinRev=_sales.filter(s=>{const d=s.date||"";return d.slice(0,7)===prefix;}).reduce((a,s)=>a+(s.revenue||0),0);
    const zumIn=_zincome.filter(x=>inMonth(x.date)).reduce((a,x)=>a+(x.amount||0),0);
    const zumOut=_zexp.filter(x=>inMonth(x.date)).reduce((a,x)=>a+(x.amount||0),0);
    const flohIn=_fitems.filter(i=>i.status==="verkauft"&&inMonth(i.verkauftAm)).reduce((a,i)=>a+(i.verkaufspreis||0),0);
    const flohOut=_fevents.reduce((a,e)=>{
      if(!inMonth(e.datum))return a;
      return a+(e.ausgaben||[]).reduce((s,x)=>s+(x.betrag||0),0);
    },0);
    return {prowinRev,zumIn,zumOut,flohIn,flohOut,netto:prowinRev+zumIn-zumOut+flohIn-flohOut};
  },[_sales,_zincome,_zexp,_fitems,_fevents]);

  const col=(sub)=>collection(db,"users",USER_ID,sub);
  const flash=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2800);};

  // Load summary stats for home
  useEffect(()=>{
    if(!unlocked)return;
    const pq=query(col("products"),orderBy("name"));
    const sq=query(col("sales"),orderBy("date","desc"));
    const mq=query(col("zumba_members"),orderBy("name"));
    const iq=query(col("zumba_income"),orderBy("date","desc"));
    const cq=query(col("zumba_classes"),orderBy("date","desc"));

    const up=onSnapshot(pq,s=>{
      const ps=s.docs.map(d=>d.data());
      setProwinStats(x=>({...x,products:ps.length,out:ps.filter(p=>p.stock===0).length}));
    });
    const us=onSnapshot(sq,s=>{
      const ss=s.docs.map(d=>d.data());
      setProwinStats(x=>({...x,revenue:ss.reduce((a,b)=>a+(b.revenue||0),0)}));
      setSales_(ss);
    });
    const um=onSnapshot(mq,s=>{
      setZumbaStats(x=>({...x,members:s.docs.filter(d=>d.data().active).length}));
    });
    const ui=onSnapshot(iq,s=>{
      const arr=s.docs.map(d=>d.data());
      setZumbaStats(x=>({...x,income:arr.reduce((a,b)=>a+(b.amount||0),0)}));
      setZincome_(arr);
    });
    const uc=onSnapshot(cq,s=>{
      setZumbaStats(x=>({...x,classes:s.docs.length}));
    });
    // Zumba Ausgaben für Saldo
    const zeq=query(col("zumba_expenses"),orderBy("date","desc"));
    const uze=onSnapshot(zeq,s=>setZexp_(s.docs.map(d=>d.data())));
    // Flohmarkt stats
    const fiq=query(col("flohmarkt_items"),orderBy("createdAt","desc"));
    const ufi=onSnapshot(fiq,s=>{
      const its=s.docs.map(d=>d.data());
      const sold=its.filter(i=>i.status==="verkauft");
      setFlohmarktStats({artikel:its.length,verkauft:sold.length,einnahmen:sold.reduce((a,b)=>a+(b.verkaufspreis||0),0)});
      setFitems_(its);
    });
    const feq=query(col("flohmarkt_events"),orderBy("datum","desc"));
    const ufe=onSnapshot(feq,s=>setFevents_(s.docs.map(d=>d.data())));
    // Kleiderschrank stats
    const ksq=query(col("ks_items"),orderBy("createdAt","desc"));
    const koq=query(col("ks_outfits"),orderBy("createdAt","desc"));
    const uks=onSnapshot(ksq,s=>setKleiderschrankStats(x=>({...x,teile:s.docs.length})));
    const uko=onSnapshot(koq,s=>setKleiderschrankStats(x=>({...x,outfits:s.docs.length})));
    return()=>{up();us();um();ui();uc();uze();ufi();ufe();uks();uko();};
  },[unlocked]);

  if(splash) return <SplashScreen onDone={()=>setSplash(false)}/>;
  if(!unlocked) return <LoginScreen onUnlock={()=>setUnlocked(true)}/>;

  return (
    <div>
      {/* Logout button on home */}
      {module===null&&(
        <div style={{position:"fixed",top:"calc(12px + env(safe-area-inset-top,0px))",right:16,zIndex:100}}>
          <button onClick={()=>{localStorage.removeItem(STORAGE_KEY);setUnlocked(false);}} title="Ausloggen"
            style={{width:36,height:36,borderRadius:18,background:"rgba(255,255,255,0.9)",border:`1px solid ${B[200]}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:B[600],boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>
            <Ic n="key" s={15}/>
          </button>
        </div>
      )}

      {module===null&&(
        <HomeScreen onSelect={setModule} prowinStats={prowinStats} zumbaStats={zumbaStats} flohmarktStats={flohmarktStats} kleiderschrankStats={kleiderschrankStats} monthSaldo={monthSaldo}/>
      )}

      {module==="prowin"&&(
        <ProwinModule col={col} flash={flash} syncing={syncing} setSyncing={setSyncing} onBack={()=>setModule(null)}/>
      )}

      {module==="zumba"&&(
        <ZumbaModule col={col} flash={flash} syncing={syncing} setSyncing={setSyncing} onBack={()=>setModule(null)}/>
      )}

      {module==="flohmarkt"&&(
        <FlohmarktModule onBack={()=>setModule(null)}/>
      )}

      {module==="kleiderschrank"&&(
        <KleiderschrankModule onBack={()=>setModule(null)}/>
      )}

      {toast&&<div style={{position:"fixed",bottom:"calc(24px + env(safe-area-inset-bottom,0px))",left:"50%",transform:"translateX(-50%)",background:toast.ok?B[800]:"#7f1d1d",color:"#fff",padding:"11px 22px",borderRadius:30,fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,.2)",zIndex:9999,whiteSpace:"nowrap",animation:"fadein .2s ease"}}>{toast.msg}</div>}
    </div>
  );
}

function waitAndRender() {
  if(window.__firebase){ReactDOM.createRoot(document.getElementById("root")).render(<App/>);}
  else{setTimeout(waitAndRender,50);}
}
waitAndRender();
</script>
</body>
</html>
