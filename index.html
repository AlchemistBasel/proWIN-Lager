  <script>
    // PWA: Icon zur Laufzeit als PNG-Canvas → data-URL erzeugen, dann Manifest verknüpfen
    (function(){
      function makeIcon(size){
        const c=document.createElement("canvas");
        c.width=size;c.height=size;
        const ctx=c.getContext("2d");
        // Gradient-Background
        const g=ctx.createLinearGradient(0,0,size,size);
        g.addColorStop(0,"#1e3a8a");
        g.addColorStop(0.5,"#0891b2");
        g.addColorStop(1,"#0f766e");
        ctx.fillStyle=g;
        // Rundes Rechteck (iOS-Style)
        const r=size*0.22;
        ctx.beginPath();
        ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
        ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
        ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
        ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
        ctx.closePath();ctx.fill();
        // "L"
        ctx.fillStyle="#fff";
        ctx.font="900 "+(size*0.65)+"px 'Nunito',sans-serif";
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText("L",size/2,size*0.54);
        return c.toDataURL("image/png");
      }
      const icon192=makeIcon(192);
      const icon512=makeIcon(512);
      const icon180=makeIcon(180);
      const manifest={
        name:"Lorena's Portal",
        short_name:"Lorena",
        description:"proWIN, Zumba, Flohmarkt & Kleiderschrank",
        start_url:".",
        display:"standalone",
        background_color:"#eef3fc",
        theme_color:"#1e3a8a",
        orientation:"portrait",
        icons:[
          {src:icon192,sizes:"192x192",type:"image/png",purpose:"any maskable"},
          {src:icon512,sizes:"512x512",type:"image/png",purpose:"any maskable"}
        ]
      };
      const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
      document.getElementById("pwa-manifest").href=URL.createObjectURL(blob);
      document.getElementById("pwa-apple-icon").href=icon180;
    })();
  </script>

// ── Helpers ───────────────────────────────────────────────────────────────────
function statusOf(p) {
  if (p.stock===0)            return {label:"Aus",    color:"#dc2626",bg:"#fef2f2",dot:"#ef4444"};
  if (p.stock<=p.minStock)    return {label:"Wenig",  color:"#d97706",bg:"#fffbeb",dot:"#f59e0b"};
  return                             {label:"OK",     color:"#16a34a",bg:"#f0fdf4",dot:"#22c55e"};
}

function LoginScreen({onUnlock}) {
  const [pw,setPw]=useState(""); const [show,setShow]=useState(false);
  const [shake,setShake]=useState(false); const [err,setErr]=useState("");
  const tryLogin=(e)=>{
    e.preventDefault();
    if(pw===APP_PASSWORD){localStorage.setItem(STORAGE_KEY,"1");onUnlock();}
    else{setErr("Falsches Passwort – bitte nochmals versuchen");setShake(true);setPw("");setTimeout(()=>setShake(false),600);}
  };
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(145deg,${B[900]},#0891b2,${Z[600]})`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

        </div>
        <h1 style={{margin:"0 0 6px",fontSize:26,fontWeight:900,color:B[900],letterSpacing:-.5}}>Lorena's Portal</h1>
        <p style={{margin:"0 0 36px",color:"#94a3b8",fontSize:14,fontWeight:500}}>proWIN & Zumba 💜</p>
        <form onSubmit={tryLogin}>
          <div style={{animation:shake?"shake .4s ease":undefined,marginBottom:16}}>
            <div style={{position:"relative"}}>
              <Ic n="lock" s={16} style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:B[400]}}/>
              <input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Passwort eingeben" autoFocus

              <button type="button" onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94a3b8"}}><Ic n="eye" s={16}/></button>

function ProdModal({product,onSave,onClose,onDel}) {
  const [f,setF]=useState(product||{name:"",description:"",category:"Reinigung",buyPrice:"",sellPrice:"",stock:"",minStock:2,image:"",notes:""});
  const [imgErr,setImgErr]=useState(false);
  const [showRef,setShowRef]=useState(false);
  const [refSearch,setRefSearch]=useState("");

  const submit=(e)=>{e.preventDefault();if(!f.name.trim())return;onSave({...f,buyPrice:parseFloat(f.buyPrice)||0,sellPrice:parseFloat(f.sellPrice)||0,stock:parseInt(f.stock)||0,minStock:parseInt(f.minStock)||1});};
  const margin=f.sellPrice&&f.buyPrice?((f.sellPrice-f.buyPrice)/f.sellPrice*100).toFixed(0):null;

  const refResults=useMemo(()=>{
    if(!refSearch.trim()) return [];
    const q=refSearch.toLowerCase();
    return PREISLISTE.filter(p=>p.name.toLowerCase().includes(q)||(p.groesse&&p.groesse.toLowerCase().includes(q))).slice(0,8);
  },[refSearch]);

  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:B[900]}}>{product?"Produkt bearbeiten":"Neues Produkt"}</h3>

          <Lbl t="Produktname *"><input required value={f.name} onChange={e=>s("name",e.target.value)} style={inp}/></Lbl>

          <Lbl t="Kategorie"><select value={f.category} onChange={e=>s("category",e.target.value)} style={inp}>{CATS.filter(c=>c!=="Alle").map(c=><option key={c}>{c}</option>)}</select></Lbl>

            <button type="button" onClick={()=>setShowRef(x=>!x)}

              <Ic n="star" s={14} style={{color:B[500]}}/>

            {showRef&&<div style={{padding:"0 12px 12px"}}>

              {refResults.map((p,i)=>{

function OrderListModal({products,onClose}) {
  const lowStock=useMemo(()=>{
    return products
      .filter(p=>p.stock<=p.minStock)
      .map(p=>{
        const suggested=Math.max(1,(p.minStock||1)*2-p.stock);
        return {...p,_suggested:suggested};
      })
      .sort((a,b)=>(a.stock-a.minStock)-(b.stock-b.minStock));
  },[products]);

  // Alle standardmässig ausgewählt, Mengen als editierbarer State
  const [selected,setSelected]=useState(()=>new Set());
  const [qtys,setQtys]=useState({});
  useEffect(()=>{
    setSelected(new Set(lowStock.map(p=>p.id)));
    const q={};
    lowStock.forEach(p=>{q[p.id]=p._suggested;});
    setQtys(q);
  },[lowStock.length]);

  const toggle=(id)=>setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  const selectAll=()=>setSelected(new Set(lowStock.map(p=>p.id)));
  const selectNone=()=>setSelected(new Set());
  const setQty=(id,val)=>setQtys(prev=>({...prev,[id]:Math.max(1,parseInt(val)||1)}));

  const selectedItems=lowStock.filter(p=>selected.has(p.id));
  const selectedTotal=selectedItems.reduce((s,p)=>s+(qtys[p.id]||p._suggested)*(p.buyPrice||0),0);

  const [copied,setCopied]=useState(false);
  const copy=async()=>{
    const lines=selectedItems.map(p=>{
      const qty=qtys[p.id]||p._suggested;
      return `${qty}× ${p.name}${p.buyPrice?` (CHF ${(qty*p.buyPrice).toFixed(2)})`:""}`;
    });
    if(selectedTotal>0){lines.push("");lines.push(`Total ${selectedItems.length} Positionen · CHF ${selectedTotal.toFixed(2)}`);}
    try{await navigator.clipboard.writeText(lines.join("\n"));setCopied(true);setTimeout(()=>setCopied(false),2500);}catch{}
  };

  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 4px",fontSize:18,fontWeight:900,color:B[900]}}>📋 Bestelliste</h3>
      <p style={{color:"#94a3b8",fontSize:13,marginBottom:12}}>
        {lowStock.length===0?"Alle Produkte über Mindestbestand 🎉":`${lowStock.length} Produkt${lowStock.length!==1?"e":""} unter Mindestbestand · Menge anpassbar`}
      </p>

      {lowStock.length>0&&<>
        {/* Auswahl-Schnellbuttons */}

function StockModal({product,onApply,onClose}) {
  const mode=product._mode||"in";
  const [qty,setQty]=useState(1);
  const [price,setPrice]=useState(product.sellPrice||0);
  const apply=(type)=>{
    const delta=type==="in"?qty:-qty;
    onApply({product,delta,type,qty,overridePrice:type==="sale"?parseFloat(price):null});
  };
  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 4px",fontSize:18,fontWeight:900,color:B[900]}}>{mode==="in"?"Wareneingang":"Verkauf"}</h3>
      <p style={{color:"#94a3b8",fontSize:13,marginBottom:16}}>{product.name} · Bestand: {product.stock} Stk</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Lbl t="Menge"><input type="number" min="1" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} style={inp}/></Lbl>
        {mode==="sale"&&<Lbl t={`Verkaufspreis CHF (Standard: ${chf(product.sellPrice)})`}><input type="number" step="0.01" min="0" value={price} onChange={e=>setPrice(e.target.value)} style={inp}/></Lbl>}
      </div>
      <div style={{display:"flex",gap:10,marginTop:18}}>
        <button onClick={onClose} style={{flex:1,padding:"12px",background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>Abbrechen</button>
        <button onClick={()=>apply(mode==="in"?"in":"sale")} style={{flex:2,...aBtn(mode==="in"?B[600]:"#c2410c")}}>
          {mode==="in"?`+${qty} einlagern`:`${qty} Stk. verkaufen`}
        </button>
      </div>
    </Drawer>
  );
}

// SWIPE BACK HOOK
// ══════════════════════════════════════════════════════════════════════════════
function useSwipeBack(onBack) {
  useEffect(()=>{
    let startX=0, startY=0, active=false;
    const onStart=(e)=>{
      const t=e.touches?e.touches[0]:e;
      startX=t.clientX; startY=t.clientY; active=true;
    };
    const onEnd=(e)=>{
      if(!active)return; active=false;
      const t=e.changedTouches?e.changedTouches[0]:e;
      const dx=t.clientX-startX;
      const dy=Math.abs(t.clientY-startY);
      // Right swipe from left edge (first 60px) or general right swipe > 80px and mostly horizontal
      if(dx>60&&dy<80&&(startX<60||dx>120)){onBack();}
    };
    document.addEventListener("touchstart",onStart,{passive:true});
    document.addEventListener("touchend",onEnd,{passive:true});
    return()=>{document.removeEventListener("touchstart",onStart);document.removeEventListener("touchend",onEnd);};
  },[onBack]);
}

function ProwinModule({col,flash,syncing,setSyncing,onBack}) {
  const [products,setProducts]=useState([]);
  const [sales,setSales]=useState([]);
  const [tab,setTab]=useState("products");
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("Alle");
  const [modal,setModal]=useState(null);

  useSwipeBack(useCallback(()=>{if(!modal)onBack();},[modal,onBack]));

  useEffect(()=>{
    const pq=query(col("products"),orderBy("name"));
    const sq=query(col("sales"),orderBy("date","desc"));
    const up=onSnapshot(pq,s=>setProducts(s.docs.map(d=>({id:d.id,...d.data()}))));
    const us=onSnapshot(sq,s=>setSales(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{up();us();};
  },[]);

  const saveProduct=async(p)=>{setSyncing(true);try{const id=p.id||uid();await setDoc(doc(col("products"),id),{...p,id,updatedAt:serverTimestamp()});flash(p.id?"Aktualisiert ✓":"Hinzugefügt ✓");}catch{flash("Fehler",false);}setSyncing(false);setModal(null);};
  const delProduct=async(id)=>{setSyncing(true);try{await deleteDoc(doc(col("products"),id));flash("Gelöscht",false);}catch{flash("Fehler",false);}setSyncing(false);setModal(null);};
  const applyStock=async({product,delta,type,qty,overridePrice})=>{
    setSyncing(true);
    const sellP=overridePrice!=null?overridePrice:product.sellPrice;
    try{
      await setDoc(doc(col("products"),product.id),{...product,stock:Math.max(0,product.stock+delta),updatedAt:serverTimestamp()});
      if(type==="sale"){const sid=uid();await setDoc(doc(col("sales"),sid),{id:sid,date:new Date().toISOString(),productId:product.id,productName:product.name,qty,sellPrice:sellP,buyPrice:product.buyPrice,profit:(sellP-product.buyPrice)*qty,revenue:sellP*qty,createdAt:serverTimestamp()});}
      flash(type==="sale"?`${qty} Stk. verkauft ✓`:`${qty} Stk. eingelagert ✓`);
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };
  // Quick-Sale: 1× direkt zum Standardpreis, ohne Modal
  const quickSale=async(product)=>{
    if(!product.stock){flash("Kein Bestand",false);return;}
    if(!product.sellPrice){flash("Kein Verkaufspreis hinterlegt",false);return;}
    setSyncing(true);
    try{
      await setDoc(doc(col("products"),product.id),{...product,stock:Math.max(0,product.stock-1),updatedAt:serverTimestamp()});
      const sid=uid();
      await setDoc(doc(col("sales"),sid),{id:sid,date:new Date().toISOString(),productId:product.id,productName:product.name,qty:1,sellPrice:product.sellPrice,buyPrice:product.buyPrice,profit:product.sellPrice-product.buyPrice,revenue:product.sellPrice,createdAt:serverTimestamp()});
      flash(`1× ${product.name} verkauft ✓ · ${chf(product.sellPrice)}`);
    }catch{flash("Fehler",false);}
    setSyncing(false);
  };

  const filtered=useMemo(()=>{
    let ps=cat!=="Alle"?products.filter(p=>p.category===cat):products;
    if(search.trim())ps=ps.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
    return [...ps].sort((a,b)=>a.name.localeCompare(b.name));
  },[products,cat,search]);

  const totalRev=sales.reduce((s,x)=>s+x.revenue,0);
  const totalPro=sales.reduce((s,x)=>s+x.profit,0);
  const aus=products.filter(p=>p.stock===0).length;
  const wenig=products.filter(p=>p.stock>0&&p.stock<=p.minStock).length;

  return (
    <div style={{minHeight:"100vh",background:"#eef3fc"}}>
      {/* Header */}
      <header className="safe-header" style={{background:`linear-gradient(135deg,${B[900]},${B[700]})`,position:"sticky",top:0,zIndex:50,boxShadow:`0 4px 24px ${B[900]}50`,paddingTop:"env(safe-area-inset-top,0px)"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 12px",display:"flex",alignItems:"center",height:56,gap:8}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:12,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0,WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}><Ic n="home" s={16}/></button>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
            <Ic n="pkg" s={20} style={{color:"#fff"}}/>
            <div style={{fontWeight:900,fontSize:16,color:"#fff"}}>proWIN Lager</div>
            <div className="hdr-sub" style={{fontSize:10,color:"rgba(255,255,255,0.65)",fontWeight:700,letterSpacing:.6,marginLeft:4}}>✨ MEIN LAGER</div>
          </div>
          {aus>0&&<span style={{background:"rgba(254,242,242,0.9)",color:"#dc2626",border:"1px solid #fecaca",padding:"3px 7px",borderRadius:20,fontSize:11,fontWeight:700}}>{aus} aus</span>}
          {wenig>0&&<span style={{background:"rgba(255,251,235,0.9)",color:"#d97706",border:"1px solid #fde68a",padding:"3px 7px",borderRadius:20,fontSize:11,fontWeight:700}}>{wenig} wenig</span>}
        </div>

// ── Monthly Income Chart ──────────────────────────────────────────────────────
function MonthlyChart({income,expenses}) {
  const [selected,setSelected]=useState(null);
  const MONTHS=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const currentYear=new Date().getFullYear();
  const currentMonth=new Date().getMonth();

  const data=useMemo(()=>{
    return MONTHS.map((_,i)=>{
      const inc=income.filter(x=>{
        const d=new Date(x.date); return d.getFullYear()===currentYear&&d.getMonth()===i;
      }).reduce((s,x)=>s+(x.amount||0),0);
      const exp=expenses.filter(x=>{
        const d=new Date(x.date); return d.getFullYear()===currentYear&&d.getMonth()===i;
      }).reduce((s,x)=>s+(x.amount||0),0);
      return {inc,exp,net:inc-exp};
    });
  },[income,expenses,currentYear]);

  const maxVal=Math.max(...data.map(d=>d.inc),1);
  const totalYear=data.reduce((s,d)=>s+d.inc,0);
  const bestMonth=data.reduce((bi,d,i)=>d.inc>data[bi].inc?i:bi,0);

  return (
    <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:20,padding:"18px 16px",marginBottom:16}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
        <div>
          <div style={{fontWeight:900,fontSize:15,color:Z[900]}}>Einnahmen {currentYear}</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>Total: <strong style={{color:Z[700]}}>{chf(totalYear)}</strong></div>
        </div>
        {selected!==null&&(
          <div style={{textAlign:"right",animation:"fadein .15s ease"}}>
            <div style={{fontWeight:900,fontSize:14,color:Z[700]}}>{chf(data[selected].inc)}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{MONTHS[selected]} · Netto {chf(data[selected].net)}</div>
          </div>
        )}
      </div>

      {/* Bars */}
      <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80,marginTop:14,marginBottom:8}}>
        {data.map((d,i)=>{
          const isSelected=selected===i;
          const isCurrent=i===currentMonth;
          const isFuture=i>currentMonth;
          const h=d.inc>0?Math.max(6,Math.round((d.inc/maxVal)*72)):4;
          return (
            <div key={i} onClick={()=>setSelected(selected===i?null:i)}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",gap:3}}>
              <div style={{
                width:"100%",height:h,
                background:isFuture?"#f1f5f9":isSelected?`linear-gradient(180deg,${Z[400]},${Z[600]})`:`linear-gradient(180deg,${Z[300]},${Z[500]})`,
                borderRadius:"4px 4px 2px 2px",
                transition:"all .2s",
                opacity:isFuture?0.35:1,
                boxShadow:isSelected?`0 4px 12px ${Z[400]}60`:"none",
                transform:isSelected?"scaleX(1.15)":"scaleX(1)",
              }}/>
              {/* Current month dot */}
              {isCurrent&&<div style={{width:4,height:4,borderRadius:"50%",background:Z[500]}}/>}
            </div>
          );
        })}
      </div>

      {/* Month labels */}
      <div style={{display:"flex",gap:4}}>
        {MONTHS.map((m,i)=>(
          <div key={i} style={{flex:1,textAlign:"center",fontSize:9,fontWeight:selected===i?900:600,color:selected===i?Z[600]:i===currentMonth?"#64748b":"#94a3b8",transition:"all .15s"}}>
            {m}
          </div>
        ))}
      </div>

      {/* Best month pill */}
      {totalYear>0&&(
        <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
          <div style={{fontSize:11,fontWeight:700,color:Z[700],background:Z[50],borderRadius:20,padding:"3px 10px",border:`1px solid ${Z[200]}`}}>
            🏆 Bester Monat: {MONTHS[bestMonth]} · {chf(data[bestMonth].inc)}
          </div>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",background:"#f8faff",borderRadius:20,padding:"3px 10px",border:"1px solid #e2e8f0"}}>
            Ø {chf(Math.round(totalYear/Math.max(1,data.filter(d=>d.inc>0).length)))} / Monat
          </div>
        </div>
      )}
    </div>
  );
}

const ABO_TYPES = [
  {id:"probe",   label:"Probestunde",  icon:"star",  color:"#0891b2", sessions:1},
  {id:"einzel",  label:"Einzelstunde", icon:"music", color:Z[600],    sessions:1},
  {id:"abo5",    label:"5er-Abo",      icon:"star",  color:"#0891b2", sessions:5,  bonus:1},
  {id:"abo10",   label:"10er-Abo",     icon:"star",  color:"#16a34a", sessions:10, bonus:1},
];

function getAboLabel(type) {
  const a=ABO_TYPES.find(x=>x.id===type);
  return a?a.label:type;
}

function getAboPrice(type,prices) {
  if(type==="probe")  return prices.probe;
  if(type==="einzel") return prices.einzel;
  if(type==="abo5")   return prices.abo5;
  if(type==="abo10")  return prices.abo10;
  return 0;
}

function getAboSessions(type) {
  const a=ABO_TYPES.find(x=>x.id===type);
  if(!a) return 1;
  return (a.sessions||1)+(a.bonus||0); // total including bonus
}

// Member modal – neu: kombiniert mit Einnahme + Mehrfach-Datum-Auswahl
function MemberModal({member,onSave,onClose,prices}) {
  const isEdit=!!member;
  const [f,setF]=useState(member||{name:"",phone:"",email:"",notes:"",birthday:"",aboType:"einzel",aboStart:today(),sessionsLeft:1,active:true});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));

  // Mehrere Daten (nur bei neuem Teilnehmer, für Nachtragseinnahmen)
  const [selectedDates,setSelectedDates]=useState([]);
  const [showCalendar,setShowCalendar]=useState(false);

  // Kalender: Montage von 01.01 bis heute (FIX: UTC-basiert, sonst DST-Bug ab März)
  const mondaysSinceJan=useMemo(()=>{
    const mondays=[];
    const year=new Date().getFullYear();
    let d=new Date(Date.UTC(year,0,1));
    while(d.getUTCDay()!==1) d.setUTCDate(d.getUTCDate()+1);
    const t=new Date();
    while(d<=t){
      mondays.push(d.toISOString().slice(0,10));
      d.setUTCDate(d.getUTCDate()+7);
    }
    return mondays.reverse();
  },[]);

  const toggleDate=(dt)=>setSelectedDates(prev=>prev.includes(dt)?prev.filter(x=>x!==dt):[...prev,dt]);

  const isAbo=f.aboType==="abo5"||f.aboType==="abo10";
  const showDatePicker=!isEdit; // immer anzeigen bei neuen Teilnehmern

  const handleAboChange=(type)=>{
    const sessions=getAboSessions(type);
    s("aboType",type);
    if(!isEdit) s("sessionsLeft",sessions);
    setSelectedDates([]);
  };

  const submit=(e)=>{
    e.preventDefault();
    if(!f.name.trim())return;
    // Für Abos: Lektionen = Total - bereits besucht
    const totalSessions=getAboSessions(f.aboType);
    const sessionsLeft=isAbo?Math.max(0,totalSessions-selectedDates.length):f.sessionsLeft;
    onSave({
      member:{...f,aboPrice:getAboPrice(f.aboType,prices),sessionsLeft},
      incomeDates:isEdit?[]:selectedDates.length>0?selectedDates:[f.aboStart],
      isEdit,
    });
  };

  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:Z[900]}}>{isEdit?"Teilnehmer bearbeiten":"Neue Teilnehmerin"}</h3>
      <form onSubmit={submit}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <Lbl t="Name *"><input required value={f.name} onChange={e=>s("name",e.target.value)} style={inp}/></Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Lbl t="Telefon"><input value={f.phone} onChange={e=>s("phone",e.target.value)} style={inp} placeholder="+41…"/></Lbl>
            <Lbl t="E-Mail"><input value={f.email} onChange={e=>s("email",e.target.value)} style={inp} placeholder="name@…"/></Lbl>
          </div>
          <Lbl t="Geburtstag (optional)"><input type="date" value={f.birthday||""} onChange={e=>s("birthday",e.target.value)} style={inp}/></Lbl>
          <Lbl t="Abo-Typ">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {ABO_TYPES.map(a=>(
                <div key={a.id} onClick={()=>handleAboChange(a.id)}
                  style={{padding:"10px 12px",borderRadius:12,border:`2px solid ${f.aboType===a.id?a.color:B[100]}`,background:f.aboType===a.id?a.color+"10":"#f8faff",cursor:"pointer",transition:"all .15s"}}>
                  <div style={{fontWeight:800,fontSize:13,color:f.aboType===a.id?a.color:B[800]}}>{a.label}</div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{chf(getAboPrice(a.id,prices))}{a.bonus?` · +${a.bonus} gratis`:""}</div>
                </div>
              ))}
            </div>
          </Lbl>

          {/* Datum-Auswahl – für alle Typen bei neuen Teilnehmern */}
          {showDatePicker&&(
            <div>
              <label style={{fontSize:11,color:"#94a3b8",fontWeight:700,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>
                {isAbo?"Bereits besuchte Lektionen (seit Jahresbeginn)":"Besuchte Lektionen (seit Jahresbeginn)"}
              </label>
              <button type="button" onClick={()=>setShowCalendar(v=>!v)}
                style={{width:"100%",padding:"10px 14px",background:Z[50],border:`1.5px solid ${Z[200]}`,borderRadius:12,fontSize:13,fontWeight:700,color:Z[700],cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{selectedDates.length===0?"Daten auswählen…":`${selectedDates.length} Lektion${selectedDates.length!==1?"en":""} ausgewählt`}</span>
                <Ic n={showCalendar?"up":"down"} s={14}/>
              </button>
              {showCalendar&&(
                <div style={{marginTop:8,background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:12,maxHeight:220,overflowY:"auto",padding:8,display:"flex",flexDirection:"column",gap:4}}>
                  {mondaysSinceJan.map(dt=>{
                    const sel=selectedDates.includes(dt);
                    const d=new Date(dt+"T00:00:00Z");
                    const wd=["So","Mo","Di","Mi","Do","Fr","Sa"][d.getUTCDay()];
                    const lbl=d.toLocaleDateString("de-CH",{day:"2-digit",month:"short",year:"numeric",timeZone:"UTC"});
                    return (
                      <div key={dt} onClick={()=>toggleDate(dt)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,background:sel?Z[50]:"transparent",border:`1px solid ${sel?Z[300]:"transparent"}`,cursor:"pointer",transition:"all .1s"}}>
                        <div style={{width:22,height:22,borderRadius:6,background:sel?Z[500]:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#fff",fontSize:12,fontWeight:900}}>
                          {sel?"✓":""}
                        </div>
                        <span style={{fontSize:13,fontWeight:sel?700:500,color:sel?Z[800]:"#64748b"}}>{wd}. {lbl}</span>
                      </div>
                    );
                  })}
                </div>
              )}
              {isAbo&&selectedDates.length>0&&(
                <div style={{marginTop:6,background:Z[50],borderRadius:10,padding:"8px 12px",fontSize:12,color:Z[700],fontWeight:600}}>
                  📊 {getAboSessions(f.aboType)-selectedDates.length} von {getAboSessions(f.aboType)} Lektionen übrig
                </div>
              )}
              {!isAbo&&selectedDates.length>0&&(
                <div style={{marginTop:6,background:Z[50],borderRadius:10,padding:"8px 12px",fontSize:12,color:Z[700],fontWeight:600}}>
                  💰 {selectedDates.length}× {chf(getAboPrice(f.aboType,prices))} = {chf(selectedDates.length*getAboPrice(f.aboType,prices))} total
                </div>
              )}
            </div>
          )}

          {/* Abo-Start */}
          <Lbl t="Abo-Start"><input type="date" value={f.aboStart} onChange={e=>s("aboStart",e.target.value)} style={inp}/></Lbl>

          {/* Lektionen übrig – nur beim Bearbeiten oder Abo */}
          {(isEdit||isAbo)&&(
            <Lbl t="Lektionen übrig"><input type="number" min="0" value={f.sessionsLeft} onChange={e=>s("sessionsLeft",parseInt(e.target.value)||0)} style={inp}/></Lbl>
          )}

          <Lbl t="Status">
            <div style={{display:"flex",gap:8}}>
              {[["Aktiv",true],["Inaktiv",false]].map(([lb,val])=>(
                <div key={lb} onClick={()=>s("active",val)}
                  style={{flex:1,padding:"10px",borderRadius:12,border:`2px solid ${f.active===val?(val?"#16a34a":"#dc2626"):B[100]}`,background:f.active===val?(val?"#f0fdf4":"#fff5f5"):"#f8faff",cursor:"pointer",textAlign:"center",fontWeight:800,fontSize:13,color:f.active===val?(val?"#16a34a":"#dc2626"):B[600]}}>
                  {lb}
                </div>
              ))}
            </div>
          </Lbl>
          <Lbl t="Notizen"><textarea value={f.notes} onChange={e=>s("notes",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></Lbl>
        </div>
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <button type="button" onClick={onClose} style={{flex:1,padding:"12px",background:"#f8faff",color:"#94a3b8",border:`1px solid ${B[100]}`,borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>Abbrechen</button>
          <button type="submit" style={{flex:2,...aBtn(`linear-gradient(135deg,${Z[700]},${Z[500]})`)}}>
            {isEdit?"Speichern":selectedDates.length>0?`Speichern + ${selectedDates.length} Einnahme${selectedDates.length!==1?"n":""}`:"Speichern + Einnahme"}
          </button>
        </div>
      </form>
    </Drawer>
  );
}

    while(d.getUTCDay()!==1) d.setUTCDate(d.getUTCDate()+1);
    const t=new Date();
    while(d<=t){mondays.push(d.toISOString().slice(0,10));d.setUTCDate(d.getUTCDate()+7);}
    return mondays.reverse();
  },[]);

  const toggleDate=(dt)=>setSelectedDates(prev=>prev.includes(dt)?prev.filter(x=>x!==dt):[...prev,dt]);

  const submit=(e)=>{
    e.preventDefault();
    const amt=parseFloat(f.amount)||0;
    if(isRaummiete(f.category)){
      if(selectedDates.length===0){alert("Bitte mindestens ein Datum auswählen.");return;}
      // One expense per selected date
      onSave(selectedDates.map(dt=>({...f,amount:amt,date:dt})));
    } else {
      onSave([{...f,amount:amt,date:today()}]);
    }
  };

  const addCustomDate=()=>{
    if(!customDate)return;
    if(!selectedDates.includes(customDate))setSelectedDates([...selectedDates,customDate]);
    setCustomDate("");
  };

  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:Z[900]}}>Neue Ausgabe</h3>
      <form onSubmit={submit}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <Lbl t="Kategorie">
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["Raummiete","Material","Sonstiges"].map(c=>(
                <div key={c} onClick={()=>s("category",c)}
                  style={{padding:"7px 14px",borderRadius:20,border:`2px solid ${f.category===c?"#dc2626":B[100]}`,background:f.category===c?"#fff5f5":"#f8faff",cursor:"pointer",fontSize:12,fontWeight:700,color:f.category===c?"#dc2626":"#94a3b8",transition:"all .15s"}}>
                  {c==="Raummiete"?"🏠 Raummiete":c==="Material"?"📦 Material":"• Sonstiges"}
                </div>
              ))}
            </div>
          </Lbl>

          <Lbl t="Betrag CHF">
            <input required type="number" step="0.01" min="0" value={f.amount} onChange={e=>s("amount",e.target.value)} style={inp}/>
          </Lbl>

          {/* Multi-date picker only for Raummiete */}
          {isRaummiete(f.category)?(
            <div>
              <label style={{fontSize:11,color:"#94a3b8",fontWeight:700,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>
                Kursdaten
              </label>

              {/* Gewählte Daten als Pills (entfernbar) */}
              {selectedDates.length>0&&(
                <div style={{marginBottom:8,display:"flex",flexWrap:"wrap",gap:6}}>
                  {[...selectedDates].sort().reverse().map(dt=>{
                    const d=new Date(dt+"T00:00:00Z");
                    const wd=["So","Mo","Di","Mi","Do","Fr","Sa"][d.getUTCDay()];
                    const lbl=d.toLocaleDateString("de-CH",{day:"2-digit",month:"short",year:"numeric",timeZone:"UTC"});
                    return (
                      <span key={dt} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 10px",background:"#fff5f5",border:"1.5px solid #fecaca",borderRadius:20,fontSize:12,fontWeight:700,color:"#7f1d1d"}}>
                        {wd}. {lbl}
                        <button type="button" onClick={()=>toggleDate(dt)} style={{width:16,height:16,borderRadius:"50%",background:"#dc2626",color:"#fff",border:"none",fontSize:11,fontWeight:900,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,padding:0}}>×</button>
                      </span>
                    );

                </div>

              <button type="button" onClick={()=>setShowCalendar(v=>!v)}
                style={{width:"100%",padding:"10px 14px",background:"#fff5f5",border:"1.5px solid #fecaca",borderRadius:12,fontSize:13,fontWeight:700,color:"#dc2626",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{selectedDates.length===0?"Datum hinzufügen…":"+ Weitere Daten"}</span>
                <Ic n={showCalendar?"up":"down"} s={14}/>
              </button>

              {showCalendar&&(
                <div style={{marginTop:8,background:"#fff",border:"1px solid #fecaca",borderRadius:12,padding:10}}>
                  {/* Freies Datum */}
                  <div style={{marginBottom:8,padding:"8px 4px 10px",borderBottom:"1px solid #fecaca"}}>
                    <div style={{fontSize:11,color:"#94a3b8",fontWeight:700,marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>Eigenes Datum</div>
                    <div style={{display:"flex",gap:6}}>

                      <button type="button" onClick={addCustomDate} disabled={!customDate}

                      const lbl=d.toLocaleDateString("de-CH",{day:"2-digit",month:"short",year:"numeric",timeZone:"UTC"});
                      return (
                        <div key={dt} onClick={()=>toggleDate(dt)}
                          style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,background:sel?"#fff5f5":"transparent",border:`1px solid ${sel?"#fecaca":"transparent"}`,cursor:"pointer",transition:"all .1s"}}>

                        </div>

              {selectedDates.length>0&&(

// ZUMBA MODULE
// ══════════════════════════════════════════════════════════════════════════════
function ZumbaModule({col,flash,syncing,setSyncing,onBack}) {
  const [members,setMembers]=useState([]);
  const [income,setIncome]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [classes,setClasses]=useState([]);
  const [tab,setTab]=useState("dashboard");
  const [modal,setModal]=useState(null);

  useSwipeBack(useCallback(()=>{if(!modal)onBack();},[modal,onBack]));
  const [prices,setPricesState]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("zumba_prices")||"null")||DEFAULT_ZUMBA_PRICES;}catch{return DEFAULT_ZUMBA_PRICES;}
  });
  const savePrices=(p)=>{setPricesState(p);localStorage.setItem("zumba_prices",JSON.stringify(p));};

  useEffect(()=>{
    const mq=query(col("zumba_members"),orderBy("name"));
    const iq=query(col("zumba_income"),orderBy("date","desc"));
    const eq=query(col("zumba_expenses"),orderBy("date","desc"));
    const cq=query(col("zumba_classes"),orderBy("date","desc"));
    const um=onSnapshot(mq,s=>setMembers(s.docs.map(d=>({id:d.id,...d.data()}))));
    const ui=onSnapshot(iq,s=>setIncome(s.docs.map(d=>({id:d.id,...d.data()}))));
    const ue=onSnapshot(eq,s=>setExpenses(s.docs.map(d=>({id:d.id,...d.data()}))));
    const uc=onSnapshot(cq,s=>setClasses(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{um();ui();ue();uc();};
  },[]);

  const saveMember=async(payload)=>{
    setSyncing(true);
    try{
      const {member:m,incomeDates=[],isEdit}=payload;
      const id=m.id||uid();
      await setDoc(doc(col("zumba_members"),id),{...m,id,updatedAt:serverTimestamp()});
      if(!isEdit&&incomeDates.length>0){
        const price=getAboPrice(m.aboType,prices);
        if(m.aboType==="abo5"||m.aboType==="abo10"){
          // Abo: eine Einnahme für den ganzen Abo-Preis
          const incId=uid();
          const firstDate=incomeDates.slice().sort()[0];
          await setDoc(doc(col("zumba_income"),incId),{id:incId,date:firstDate,type:m.aboType,memberId:id,memberName:m.name,amount:price,notes:`Abo erfasst · ${incomeDates.length} Lektionen nachgetragen`,createdAt:serverTimestamp()});
        } else {
          // Einzel/Probe: pro Datum eine separate Einnahme
          for(const dt of incomeDates){
            const incId=uid();
            await setDoc(doc(col("zumba_income"),incId),{id:incId,date:dt,type:m.aboType,memberId:id,memberName:m.name,amount:price,notes:"Automatisch bei Anmeldung erfasst",createdAt:serverTimestamp()});
          }
        }
      }
      flash(isEdit?"Aktualisiert ✓":incomeDates.length>0?`Gespeichert + ${incomeDates.length} Einnahme${incomeDates.length!==1?"n":""} ✓`:"Hinzugefügt ✓");
    }catch(e){flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };
  const renewAbo=async(m,{payment="Twint",notes=""}={})=>{
    setSyncing(true);
    try{
      const totalSessions=getAboSessions(m.aboType);
      const price=getAboPrice(m.aboType,prices);
      await setDoc(doc(col("zumba_members"),m.id),{...m,sessionsLeft:totalSessions,aboStart:today(),updatedAt:serverTimestamp()});
      const incId=uid();
      const noteText=[`Abo erneuert · ${getAboLabel(m.aboType)}`,payment,notes].filter(Boolean).join(" · ");
      await setDoc(doc(col("zumba_income"),incId),{id:incId,date:today(),type:m.aboType,memberId:m.id,memberName:m.name,amount:price,payment,notes:noteText,createdAt:serverTimestamp()});
      flash(`Abo erneuert ✓ · ${chf(price)} (${payment})`);
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const delMember=async(id)=>{if(!window.confirm("Teilnehmerin löschen?"))return;setSyncing(true);try{await deleteDoc(doc(col("zumba_members"),id));flash("Gelöscht",false);}catch{flash("Fehler",false);}setSyncing(false);};

  const saveIncome=async(inc)=>{
    setSyncing(true);
    try{
      const id=uid();
      await setDoc(doc(col("zumba_income"),id),{...inc,id,createdAt:serverTimestamp()});
      // Deduct session from member if linked
      if(inc.memberId){
        const m=members.find(x=>x.id===inc.memberId);
        if(m&&m.sessionsLeft>0){
          await setDoc(doc(col("zumba_members"),m.id),{...m,sessionsLeft:Math.max(0,m.sessionsLeft-1),updatedAt:serverTimestamp()});
        }
      }
      flash("Einnahme gespeichert ✓");
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const saveExpense=async(exps)=>{
    setSyncing(true);
    try{
      const list=Array.isArray(exps)?exps:[exps];
      for(const exp of list){const id=uid();await setDoc(doc(col("zumba_expenses"),id),{...exp,id,createdAt:serverTimestamp()});}
      flash(list.length>1?`${list.length} Ausgaben gespeichert ✓`:"Ausgabe gespeichert ✓");
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const saveClass=async(cls)=>{
    setSyncing(true);
    try{
      const id=uid();
      await setDoc(doc(col("zumba_classes"),id),{...cls,id,createdAt:serverTimestamp()});
      // FIX: Lektion abziehen, leere Abos sammeln
      let emptyNames=[];
      for(const mid of (cls.attendees||[])){
        const m=members.find(x=>x.id===mid);
        if(!m)continue;
        if(m.sessionsLeft>0){
          await setDoc(doc(col("zumba_members"),m.id),{...m,sessionsLeft:Math.max(0,m.sessionsLeft-1),updatedAt:serverTimestamp()});
        } else if(m.aboType==="abo5"||m.aboType==="abo10"){
          emptyNames.push(m.name);
        }
      }
      // FIX: Miete nur einmal pro Datum
      const existingRent=expenses.find(e=>e.date===cls.date&&e.category==="Raummiete");
      if(!existingRent){
        const expId=uid();
        await setDoc(doc(col("zumba_expenses"),expId),{id:expId,date:cls.date,category:"Raummiete",amount:prices.miete,notes:`Automatisch: Kurs ${dateStr(cls.date)}`,createdAt:serverTimestamp()});
      }
      let msg=existingRent?`Kurs gespeichert ✓ · Miete bereits erfasst`:`Kurs gespeichert ✓ · Raummiete CHF ${prices.miete} verbucht`;
      if(emptyNames.length>0)msg+=` ⚠️ Leeres Abo: ${emptyNames.join(", ")}`;
      flash(msg);
    }catch{flash("Fehler",false);}
    setSyncing(false);setModal(null);
  };

  const exportCSV=(inc,exp)=>{
    const header=["Datum","Typ","Name/Kategorie","Betrag CHF","Zahlungsart","Notiz"];
    const rows=[];
    inc.forEach(x=>rows.push([x.date,getAboLabel(x.type),x.memberName||"",x.amount.toFixed(2),x.payment||"",x.notes||""]));
    exp.forEach(x=>rows.push([x.date,"Ausgabe",x.category,"-"+x.amount.toFixed(2),"",x.notes||""]));
    rows.sort((a,b)=>a[0]<b[0]?-1:1);
    rows.unshift(header);
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const bom="\uFEFF";
    const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`Zumba_Finanzen_${new Date().getFullYear()}.csv`;a.click();
    URL.revokeObjectURL(url);
    flash("CSV exportiert ✓");
  };

  const totalIncome=income.reduce((s,x)=>s+(x.amount||0),0);
  const totalExpenses=expenses.reduce((s,x)=>s+(x.amount||0),0);
  const netResult=totalIncome-totalExpenses;
  const activeMembers=members.filter(m=>m.active).length;
  const lowAbo=members.filter(m=>m.active&&m.sessionsLeft<=2&&(m.aboType==="abo5"||m.aboType==="abo10")).length;

  // Anwesenheits-Statistik pro Mitglied
  const memberStats=useMemo(()=>{
    const map={};
    members.forEach(m=>{map[m.id]={count:0,lastDate:null};});
    classes.forEach(c=>{
      (c.attendees||[]).forEach(mid=>{
        if(!map[mid])return;
        map[mid].count++;
        if(!map[mid].lastDate||c.date>map[mid].lastDate) map[mid].lastDate=c.date;
      });
    });
    return map;
  },[members,classes]);

  const daysAgo=(dateStr)=>{
    if(!dateStr)return null;
    const diff=Math.floor((new Date()-new Date(dateStr+"T00:00:00Z"))/86400000);
    if(diff<0)return null;
    if(diff===0)return "heute";
    if(diff===1)return "gestern";
    if(diff<7)return `vor ${diff} Tagen`;
    if(diff<14)return "letzte Woche";
    if(diff<30)return `vor ${Math.floor(diff/7)} Wochen`;
    if(diff<60)return "letzten Monat";
    return `vor ${Math.floor(diff/30)} Monaten`;
  };

  // Next Monday calculation
  const nextMonday=useMemo(()=>{
    const d=new Date();
    const day=d.getDay();
    // FIX: Wenn heute Montag, ist der "nächste Kurs" heute (nicht in 7 Tagen)
    const diff=day===1?0:(8-day)%7;
    d.setDate(d.getDate()+diff);
    return d.toLocaleDateString("de-CH",{day:"2-digit",month:"long"});
  },[]);

  return (
    <div style={{minHeight:"100vh",background:"#fdf4ff"}}>
      {/* Header */}
      <header className="safe-header" style={{background:`linear-gradient(135deg,${Z[900]},${Z[600]})`,position:"sticky",top:0,zIndex:50,boxShadow:`0 4px 24px ${Z[900]}50`,paddingTop:"env(safe-area-inset-top,0px)"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 12px",display:"flex",alignItems:"center",height:56,gap:8}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:12,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0,WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}><Ic n="home" s={16}/></button>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
            <span style={{fontSize:22}}>💃</span>
            <div style={{fontWeight:900,fontSize:16,color:"#fff"}}>Zumba Kurse</div>
            <div className="hdr-sub" style={{fontSize:10,color:"rgba(255,255,255,0.65)",fontWeight:700,letterSpacing:.6,marginLeft:4}}>MONTAG 20:00</div>
          </div>
          {lowAbo>0&&<span style={{background:"rgba(255,251,235,0.9)",color:"#d97706",border:"1px solid #fde68a",padding:"3px 7px",borderRadius:20,fontSize:11,fontWeight:700}}>{lowAbo} fast leer</span>}
        </div>
      </header>

      {/* Nav */}
      <nav style={{background:"#fff",borderBottom:`1px solid ${Z[100]}`,position:"sticky",top:"calc(56px + env(safe-area-inset-top,0px))",zIndex:40}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 4px",display:"flex"}}>
          {[["dashboard","Übersicht","grid"],["members","Teilnehmer","users"],["finances","Finanzen","cash"],["classes","Kurse","cal"]].map(([id,lb,ic])=>(
            <button key={id} onClick={()=>setTab(id)} className="nav-btn" style={{display:"flex",alignItems:"center",gap:5,padding:"12px 8px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,color:tab===id?Z[600]:"#94a3b8",borderBottom:`2.5px solid ${tab===id?Z[500]:"transparent"}`,flex:1,justifyContent:"center"}}>
              <Ic n={ic} s={15}/><span className="nav-label">{lb}</span>
            </button>
          ))}
        </div>
      </nav>

      <main className="main-pad" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px",paddingBottom:"calc(80px + env(safe-area-inset-bottom,0px))"}}>

        {/* DASHBOARD */}
        {tab==="dashboard"&&<div style={{animation:"fadein .3s ease"}}>
          {/* Birthday banner (nur wenn jemand heute Geburtstag hat) */}
          {(() => {
            const todayDate=new Date();
            const todayKey=`${String(todayDate.getMonth()+1).padStart(2,"0")}-${String(todayDate.getDate()).padStart(2,"0")}`;
            const birthdayPeople=members.filter(m=>m.birthday&&m.birthday.slice(5)===todayKey);
            if(birthdayPeople.length===0)return null;
            return (
              <div style={{background:"linear-gradient(135deg,#db2777,#f472b6)",borderRadius:20,padding:"16px 20px",marginBottom:14,color:"#fff",display:"flex",alignItems:"center",gap:14,boxShadow:"0 6px 24px #db277750"}}>
                <div style={{fontSize:32}}>🎂</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:900,fontSize:15}}>Heute Geburtstag!</div>
                  <div style={{fontSize:13,opacity:.95,marginTop:2}}>{birthdayPeople.map(p=>p.name).join(", ")} feiert heute 🎉</div>
                </div>
              </div>
            );
          })()}

          {/* Next class banner */}
          <div style={{background:`linear-gradient(135deg,${Z[700]},${Z[500]})`,borderRadius:20,padding:"18px 20px",marginBottom:20,color:"#fff",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:36}}>💃</div>
            <div>
              <div style={{fontWeight:900,fontSize:16}}>Nächster Kurs</div>
              <div style={{fontSize:14,opacity:.9,marginTop:2}}>Montag, {nextMonday} · 20:00 Uhr</div>
              <div style={{fontSize:12,opacity:.7,marginTop:2}}>{activeMembers} aktive Teilnehmer</div>
            </div>
            <button onClick={()=>setModal({type:"class"})} style={{marginLeft:"auto",padding:"10px 14px",background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.35)",borderRadius:12,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
              Kurs erfassen
            </button>
          </div>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
            <Stat icon="users" label="Aktive Teilnehmer" value={activeMembers} accent={Z[600]}/>
            <Stat icon="cal" label="Kurse total" value={classes.length} accent="#0891b2"/>
            <Stat icon="cash" label="Einnahmen (gesamt)" value={chf(totalIncome)} accent="#16a34a"/>
            <Stat icon="trend" label="Gewinn / Verlust" value={chf(netResult)} accent={netResult>=0?"#16a34a":"#dc2626"} sub={netResult>=0?"positiv 🎉":"negativ"}/>
          </div>

          {/* Monats-Chart */}
          <MonthlyChart income={income} expenses={expenses}/>

          {/* Abo-Warnungen – nur für 5er/10er-Abo */}
          {members.filter(m=>m.active&&m.sessionsLeft<=2&&(m.aboType==="abo5"||m.aboType==="abo10")).length>0&&(
            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:16,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontWeight:900,fontSize:14,color:"#92400e",marginBottom:10}}>⚠️ Abo fast leer</div>
              {members.filter(m=>m.active&&m.sessionsLeft<=2&&(m.aboType==="abo5"||m.aboType==="abo10")).map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #fde68a"}}>
                  <span style={{fontWeight:700,color:"#92400e"}}>{m.name}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,fontWeight:700,color:m.sessionsLeft===0?"#dc2626":"#d97706"}}>
                      {m.sessionsLeft===0?"Leer!":`${m.sessionsLeft} Lekt. übrig`}
                    </span>
                    <button onClick={()=>setModal({type:"renew",member:m})}
                      style={{padding:"4px 10px",background:Z[600],color:"#fff",border:"none",borderRadius:8,fontSize:11,fontWeight:800,cursor:"pointer"}}>
                      🔄 Erneuern
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Recent income */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>Letzte Einnahmen</span>
              <button onClick={()=>setModal({type:"income"})} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",background:Z[600],color:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:800,cursor:"pointer"}}>
                <Ic n="plus" s={12}/>Neu
              </button>
            </div>
            {income.slice(0,5).map(inc=>(
              <div key={inc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${Z[50]}`}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:Z[900]}}>{inc.memberName||"–"}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{getAboLabel(inc.type)} · {dateStr(inc.date)}</div>
                </div>
                <div style={{fontWeight:900,fontSize:15,color:"#16a34a"}}>+{chf(inc.amount)}</div>
              </div>
            ))}
            {income.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Einnahmen</div>}
          </div>

          {/* Quick add expense */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>Ausgaben</span>
              <button onClick={()=>setModal({type:"expense"})} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:20,fontSize:12,fontWeight:800,cursor:"pointer"}}>
                <Ic n="plus" s={12}/>Ausgabe
              </button>
            </div>
            <div style={{marginTop:10,display:"flex",justifyContent:"space-between",background:"#f8faff",borderRadius:12,padding:"12px 14px"}}>
              <span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}>Total Ausgaben</span>
              <span style={{fontWeight:900,fontSize:15,color:"#dc2626"}}>{chf(totalExpenses)}</span>
            </div>
          </div>
        </div>}

        {/* MEMBERS */}
        {tab==="members"&&<div style={{animation:"fadein .3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:900,color:Z[900]}}>Teilnehmerinnen</h2>
              <div style={{fontSize:13,color:"#94a3b8"}}>{activeMembers} aktiv · {members.length-activeMembers} inaktiv</div>
            </div>
            <button onClick={()=>setModal({type:"member"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:Z[600],color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Neu
            </button>
          </div>

          {/* Active */}
          {members.filter(m=>m.active).length===0&&<div style={{textAlign:"center",padding:40,background:"#fff",borderRadius:16,border:`2px dashed ${Z[200]}`}}>
            <div style={{fontSize:36,marginBottom:8}}>💃</div>
            <div style={{fontWeight:800,fontSize:15,color:Z[800],marginBottom:4}}>Noch keine Teilnehmer</div>
            <p style={{color:"#94a3b8",fontSize:13}}>Füge deine erste Teilnehmerin hinzu</p>
          </div>}

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[...members].sort((a,b)=>b.active-a.active||a.name.localeCompare(b.name)).map(m=>{
              const aboInfo=ABO_TYPES.find(x=>x.id===m.aboType);
              const sessionColor=m.sessionsLeft===0?"#dc2626":m.sessionsLeft<=2?"#d97706":"#16a34a";
              return (
                <div key={m.id} style={{background:"#fff",border:`2px solid ${m.active?Z[100]:"#e2e8f0"}`,borderRadius:16,padding:"14px 16px",opacity:m.active?1:.7}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:44,height:44,borderRadius:14,background:m.active?`linear-gradient(135deg,${Z[500]},${Z[300]})`:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#fff",flexShrink:0}}>
                      {m.name[0]?.toUpperCase()||"?"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                        <span style={{fontWeight:900,fontSize:15,color:Z[900]}}>{m.name}</span>
                        <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,background:m.active?Z[100]:"#f1f5f9",color:m.active?Z[700]:"#64748b"}}>{m.active?"Aktiv":"Inaktiv"}</span>
                      </div>
                      <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>{getAboLabel(m.aboType)}{aboInfo?.bonus?` (+${aboInfo.bonus} gratis)`:""}</div>
                      {memberStats[m.id]&&memberStats[m.id].count>0&&(
                        <div style={{fontSize:11,color:Z[700],marginBottom:6,fontWeight:600}}>
                          🎯 {memberStats[m.id].count} Kurs{memberStats[m.id].count!==1?"e":""}
                          {memberStats[m.id].lastDate&&<span style={{color:"#94a3b8",fontWeight:500}}> · zuletzt {daysAgo(memberStats[m.id].lastDate)}</span>}
                        </div>
                      )}
                      {(m.aboType==="abo5"||m.aboType==="abo10")&&(
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{flex:1,height:6,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${Math.min(100,(m.sessionsLeft/getAboSessions(m.aboType||"einzel"))*100)}%`,background:sessionColor,borderRadius:4,transition:"width .3s"}}/>
                        </div>
                        <span style={{fontSize:12,fontWeight:800,color:sessionColor,whiteSpace:"nowrap"}}>{m.sessionsLeft} Lekt.</span>
                      </div>
                      )}
                      {m.phone&&<div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>📱 {m.phone}</div>}
                    </div>
                    <div style={{display:"flex",gap:5,flexShrink:0}}>
                      <button onClick={()=>setModal({type:"member",member:m})} style={{width:32,height:32,borderRadius:8,background:Z[50],color:Z[600],border:`1px solid ${Z[200]}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="edit" s={13}/></button>
                      <button onClick={()=>delMember(m.id)} style={{width:32,height:32,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={13}/></button>
                    </div>
                  </div>
                  {/* Abo erneuern Button – nur für 5er/10er wenn leer oder fast leer */}
                  {m.active&&(m.aboType==="abo5"||m.aboType==="abo10")&&m.sessionsLeft<=2&&(
                    <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${Z[50]}`}}>
                      <button onClick={()=>setModal({type:"renew",member:m})}
                        style={{width:"100%",padding:"9px 14px",background:`linear-gradient(135deg,${Z[600]},${Z[400]})`,color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        🔄 Abo erneuern · {chf(getAboPrice(m.aboType,prices))}
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>}

        {/* FINANCES */}
        {tab==="finances"&&<div style={{animation:"fadein .3s ease"}}>
          {/* Summary */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            <Stat icon="cash"  label="Einnahmen"  value={chf(totalIncome)}   accent="#16a34a"/>
            <Stat icon="trend" label="Ausgaben"   value={chf(totalExpenses)} accent="#dc2626"/>
            <Stat icon="bar"   label="Resultat"   value={chf(netResult)}     accent={netResult>=0?"#16a34a":"#dc2626"}/>
            <Stat icon="cal"   label="Kurse"      value={classes.length}     accent={Z[600]}/>
          </div>

          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <button onClick={()=>setModal({type:"income"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Einnahme
            </button>
            <button onClick={()=>setModal({type:"expense"})} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer"}}>
              <Ic n="plus" s={14}/>Ausgabe
            </button>
            <button onClick={()=>exportCSV(income,expenses)} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 16px",background:"#f8faff",color:B[600],border:`1px solid ${B[200]}`,borderRadius:12,fontSize:13,fontWeight:800,cursor:"pointer",marginLeft:"auto"}}>
              <Ic n="dl" s={14}/>Export CSV
            </button>
          </div>

          {/* Income list */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{fontWeight:900,fontSize:15,color:Z[900],marginBottom:12}}>💚 Einnahmen ({income.length})</div>
            {income.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>Noch keine Einnahmen</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {income.map(inc=>(
                <div key={inc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#f0fdf4",borderRadius:12}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#14532d"}}>{inc.memberName||"Anonym"}</div>
                    <div style={{fontSize:11,color:"#4ade80",display:"flex",alignItems:"center",gap:6}}>
                      {getAboLabel(inc.type)} · {dateStr(inc.date)}
                      {inc.payment&&<span style={{background:"#dcfce7",color:"#166534",padding:"1px 7px",borderRadius:20,fontWeight:700,fontSize:10}}>{inc.payment==="Twint"?"📱 Twint":inc.payment==="Bar"?"💵 Bar":"🏦 "+inc.payment}</span>}
                    </div>
                    {inc.notes&&<div style={{fontSize:11,color:"#94a3b8",fontStyle:"italic"}}>{inc.notes}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontWeight:900,fontSize:15,color:"#16a34a"}}>+{chf(inc.amount)}</div>
                    <button onClick={async()=>{if(!window.confirm("Einnahme löschen?"))return;await deleteDoc(doc(col("zumba_income"),inc.id));flash("Gelöscht",false);}} style={{width:28,height:28,borderRadius:8,background:"#fff5f5",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="trash" s={12}/></button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Expense list */}
          <div style={{background:"#fff",border:`1px solid ${Z[100]}`,borderRadius:16,padding:16}}>

        <Drawer onClose={()=>setModal(null)}>

}

// FLOHMARKT MODULE

// Flohmarkt blue color palette
const FM_A = {50:"#fff1f2",100:"#ffe4e6",200:"#fecdd3",300:"#fda4af",400:"#fb7185",500:"#f43f5e",600:"#e11d48",700:"#be123c",800:"#9f1239",900:"#881337"};
const FM_inp = {width:"100%",padding:"10px 12px",border:"1px solid #fecdd3",borderRadius:10,fontSize:14,background:"#fff1f2",color:"#881337"};
const FM_DEFAULT_CATS = ["Kleider","Schuhe","Haushalt","Deko","Bücher/Spiele","Elektro","Sonstiges"];
const FM_KANAELE = ["FB Marketplace","WhatsApp","Flohmarkt","Direkt","Sonstiges"];
const FM_STATI = [
  {id:"verfuegbar",label:"Verfügbar",color:"#16a34a",bg:"#f0fdf4",border:"#bbf7d0"},

];


const FM_aBtn = (bg,col="#fff") => ({padding:"12px",background:bg,color:col,border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer"});
function FM_col(sub){ return collection(db,"users",USER_ID,sub); }

function FM_Drawer({children,onClose}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="drawer-inner" style={{background:"#fff",borderRadius:"22px 22px 0 0",padding:24,width:"100%",maxWidth:560,maxHeight:"93vh",overflowY:"auto",animation:"slideup .25s ease"}}>
        <div style={{width:36,height:4,background:"#bfdbfe",borderRadius:4,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:4}}>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:"1px solid #fecdd3",background:"#fff1f2",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#be123c"}}><Ic n="x" s={15}/></button>
        </div>
        {children}
      </div>
    </div>

}

function FM_Lbl({t,children}) {
  return <div><label style={{fontSize:11,color:"#1e40af",fontWeight:700,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.4}}>{t}</label>{children}</div>;
}

function StatusBadge({status}) {
  const s = FM_STATI.find(x=>x.id===status)||FM_STATI[0];
  return <span style={{fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:20,background:s.bg,color:s.color,border:"1px solid "+s.border,whiteSpace:"nowrap"}}>{s.label}{status==="verkauft"?" checkmark":""}</span>;
}

function QuickSaleModal({flohmärkte,onSave,onClose,recentSales=[]}) {
  // Default: nächster Flohmarkt (>= heute), sonst der letzte
  const defaultFmId=useMemo(()=>{
    const t=today();
    const future=flohmärkte.filter(f=>f.datum>=t).sort((a,b)=>a.datum.localeCompare(b.datum));
    if(future.length>0)return future[0].id;
    if(flohmärkte.length>0)return flohmärkte[0].id;
    return "";
  },[flohmärkte]);

  const [flohmarktId,setFlohmarktId]=useState(defaultFmId);
  const [name,setName]=useState("");
  const [preis,setPreis]=useState("");
  const [savedJustNow,setSavedJustNow]=useState([]);
  const [saving,setSaving]=useState(false);

  const canSave=name.trim()&&parseFloat(preis)>0&&!saving;

  const submit=async(e)=>{
    e.preventDefault();
    if(!canSave)return;
    setSaving(true);
    const verkaufspreis=parseFloat(preis);
    const itemName=name.trim();
    try{
      await onSave({name:itemName,verkaufspreis,flohmarktId,kanal:"Flohmarkt"});
      setSavedJustNow(prev=>[{name:itemName,preis:verkaufspreis,ts:Date.now()},...prev].slice(0,8));
      setName("");setPreis("");
      // Auto-focus zurück aufs Namensfeld
      setTimeout(()=>{const el=document.getElementById("qs-name");if(el)el.focus();},10);
    }catch{}
    setSaving(false);
  };

  const sessionTotal=savedJustNow.reduce((s,x)=>s+x.preis,0);
  const fm=flohmärkte.find(f=>f.id===flohmarktId);

  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 4px",fontSize:18,fontWeight:900,color:"#9f1239"}}>💰 Schnellverkauf</h3>
      <p style={{color:"#94a3b8",fontSize:13,marginBottom:16}}>Direkt erfassen ohne Artikel-Anlegen</p>

      <form onSubmit={submit}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          {flohmärkte.length>0?(
            <Lbl t="Flohmarkt">
              <select value={flohmarktId} onChange={e=>setFlohmarktId(e.target.value)} style={{...inp,background:"#fff1f2",borderColor:"#fecdd3",color:"#881337"}}>
                <option value="">— Kein Flohmarkt (lose Verkauf) —</option>
                {flohmärkte.map(f=><option key={f.id} value={f.id}>{f.name} · {dateStr(f.datum)}</option>)}
              </select>
            </Lbl>
          ):(
            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#92400e"}}>
              ⚠️ Noch kein Flohmarkt angelegt. Verkäufe werden ohne Zuordnung gespeichert.
            </div>
          )}

          <Lbl t="Was verkauft? *">
            <input id="qs-name" autoFocus required value={name} onChange={e=>setName(e.target.value)}
              placeholder="z.B. Winterjacke blau" style={{...inp,background:"#fff1f2",borderColor:"#fecdd3",color:"#881337",fontSize:15,padding:"12px 14px"}}/>
          </Lbl>

          <Lbl t="Verkaufspreis CHF *">
            <input required type="number" step="0.50" min="0" value={preis} onChange={e=>setPreis(e.target.value)}
              placeholder="0.00" inputMode="decimal"
              style={{...inp,background:"#fff1f2",borderColor:"#fecdd3",color:"#881337",fontSize:22,fontWeight:900,textAlign:"center",padding:"14px"}}/>
          </Lbl>

          <button type="submit" disabled={!canSave}
            style={{padding:"14px",background:canSave?"linear-gradient(135deg,#9f1239,#f43f5e)":"#e2e8f0",color:canSave?"#fff":"#94a3b8",border:"none",borderRadius:12,fontSize:15,fontWeight:900,cursor:canSave?"pointer":"not-allowed",letterSpacing:.3}}>
            {saving?"…":"✓ Verkauft speichern"}
          </button>
        </div>
      </form>

      {/* Session-Übersicht: bereits in dieser Session erfasste Verkäufe */}
      {savedJustNow.length>0&&(
        <div style={{marginTop:18,padding:"14px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
            <div style={{fontWeight:900,fontSize:13,color:"#15803d"}}>
              ✅ Diese Session: {savedJustNow.length} verkauft
            </div>
            <div style={{fontWeight:900,fontSize:15,color:"#15803d"}}>{chf(sessionTotal)}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:140,overflowY:"auto"}}>
            {savedJustNow.map((x,i)=>(
              <div key={x.ts} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0"}}>
                <span style={{color:"#15803d",fontWeight:600}}>{x.name}</span>
                <span style={{color:"#16a34a",fontWeight:800}}>+{chf(x.preis)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <button type="button" onClick={onClose}
        style={{width:"100%",marginTop:14,padding:"12px",background:"#f8faff",color:"#94a3b8",border:"1px solid #e2e8f0",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>
        Fertig
      </button>
    </Drawer>
  );
}

function ItemModal({item,flohmärkte,onSave,onClose,onDel,cats,onAddCat}) {
  const isEdit = !!item;
  const [f,setF] = useState(item||{name:"",kategorie:"Haushalt",beschreibung:"",wunschpreis:"",status:"verfuegbar",kanal:"",flohmarktId:"",image:"",notizen:""});
  const [imgErr,setImgErr] = useState(false);
  const [newCat,setNewCat] = useState("");
  const s = (k,v) => setF(x=>({...x,[k]:v}));
  const submit = e => {
    e.preventDefault();
    if(!f.name.trim()) return;
    onSave({...f,wunschpreis:parseFloat(f.wunschpreis)||0});
  };
  const handleAddCat = () => {
    const c = newCat.trim();
    if(!c||cats.includes(c)) return;
    onAddCat(c);
    s("kategorie",c);
    setNewCat("");
  };
  return (
    <Drawer onClose={onClose}>
      <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:900,color:FM_A[900]}}>{isEdit?"Artikel bearbeiten":"Neuer Artikel"}</h3>
      <form onSubmit={submit}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <Lbl t="Bezeichnung"><input required value={f.name} onChange={e=>s("name",e.target.value)} style={FM_inp} placeholder="z.B. Winterjacke blau"/></Lbl>
          <Lbl t="Kategorie">
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
              {cats.map(c=>(
                <div key={c} onClick={()=>s("kategorie",c)}
                  style={{padding:"6px 12px",borderRadius:20,border:"2px solid "+(f.kategorie===c?FM_A[500]:FM_A[200]),background:f.kategorie===c?FM_A[100]:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,color:f.kategorie===c?FM_A[800]:"#94a3b8",transition:"all .15s"}}>
                  {c}
                </div>
              ))}
            </div>
            {/* Add custom category */}
            <div style={{display:"flex",gap:6}}>
              <input value={newCat} onChange={e=>setNewCat(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();handleAddCat();}}}
                placeholder="+ Neue Kategorie…" style={{...FM_inp,flex:1,fontSize:12,padding:"7px 12px"}}/>
              <button type="button" onClick={handleAddCat}
                style={{padding:"7px 14px",background:FM_A[600],color:"#fff",border:"none",borderRadius:10,fontSize:12,fontWeight:800,cursor:"pointer",flexShrink:0}}>
                Hinzufügen
              </button>
            </div>
          </Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Lbl t="Wunschpreis CHF"><input type="number" step="0.50" min="0" value={f.wunschpreis} onChange={e=>s("wunschpreis",e.target.value)} style={FM_inp} placeholder="0.00"/></Lbl>
            <Lbl t="Status">
              <select value={f.status} onChange={e=>s("status",e.target.value)} style={FM_inp}>
                {FM_STATI.map(st=><option key={st.id} value={st.id}>{st.label}</option>)}
              </select>
            </Lbl>
          </div>
          {f.status==="verkauft"&&(
            <Lbl t="Verkaufspreis CHF">
              <input type="number" step="0.50" min="0" value={f.verkaufspreis||""} onChange={e=>s("verkaufspreis",parseFloat(e.target.value)||0)} style={FM_inp} placeholder="0.00"/>
            </Lbl>
          )}
          <Lbl t="Kanal">
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {FM_KANAELE.map(k=>(
                <div key={k} onClick={()=>s("kanal",f.kanal===k?"":k)}
                  style={{padding:"6px 12px",borderRadius:20,border:"2px solid "+(f.kanal===k?FM_A[500]:FM_A[200]),background:f.kanal===k?FM_A[100]:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,color:f.kanal===k?FM_A[800]:"#94a3b8",transition:"all .15s"}}>
                  {k==="FB Marketplace"?"FB":k==="WhatsApp"?"WhatsApp":k==="Flohmarkt"?"Flohmarkt":k==="Direkt"?"Direkt":"Sonstiges"}
                </div>
              ))}
            </div>
          </Lbl>
          {f.kanal==="Flohmarkt"&&flohmärkte.length>0&&(
            <Lbl t="Welcher Flohmarkt">
              <select value={f.flohmarktId||""} onChange={e=>s("flohmarktId",e.target.value)} style={FM_inp}>
                <option value="">Kein</option>
                {flohmärkte.map(fm=><option key={fm.id} value={fm.id}>{fm.name} - {dateStr(fm.datum)}</option>)}
              </select>
            </Lbl>
          )}
          <Lbl t="Foto">
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {f.image&&!imgErr
                ?<div style={{width:60,height:60,borderRadius:10,overflow:"hidden",flexShrink:0,border:"1px solid "+FM_A[200]}}><img src={f.image} alt="" onError={()=>setImgErr(true)} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                :<div style={{width:60,height:60,borderRadius:10,background:FM_A[100],flexShrink:0,border:"2px dashed "+FM_A[300],display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="img" s={22} style={{color:FM_A[400]}}/></div>
              }
              <label style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"11px 14px",background:FM_A[50],border:"1.5px dashed "+FM_A[400],borderRadius:12,cursor:"pointer",fontSize:13,fontWeight:700,color:FM_A[700]}}>
                <Ic n="img" s={16}/>{f.image&&!imgErr?"Foto aendern":"Foto hochladen"}

              </label>
              {f.image&&<button type="button" onClick={()=>{s("image","");setImgErr(false);}} style={{width:34,height:34,borderRadius:8,background:"#fff5f5",border:"1px solid #fecaca",color:"#dc2626",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="x" s={14}/></button>}
            </div>
          </Lbl>
          <Lbl t="Notizen"><textarea value={f.notizen} onChange={e=>s("notizen",e.target.value)} rows={2} style={{...FM_inp,resize:"vertical"}} placeholder="z.B. leichter Fleck, VB..."/></Lbl>
        </div>
        <div style={{display:"flex",gap:10,marginTop:18}}>
          {isEdit&&<button type="button" onClick={()=>onDel(item.id)} style={{flex:1,...FM_aBtn("#dc2626")}}>Loeschen</button>}
          <button type="button" onClick={onClose} style={{flex:1,padding:"12px",background:"#f8faff",color:"#94a3b8",border:"1px solid #e2e8f0",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>Abbrechen</button>
          <button type="submit" style={{flex:2,...FM_aBtn("linear-gradient(135deg,"+FM_A[800]+","+FM_A[500]+")")}}>Speichern</button>
        </div>
      </form>
    </Drawer>
  );
}

    const bez=newAusgabeBez.trim();

    s("ausgaben",[...(f.ausgaben||[]),{bez,betrag,id:uid()}]);
    setNewAusgabeBez("");setNewAusgabeBetrag("");

                  </div>

    const s=new Set(prev);
    s.has(id)?s.delete(id):s.add(id);
    return s;

function exportCSV(items,flohmärkte) {
  const rows=[["Bezeichnung","Kategorie","Status","Wunschpreis","Verkaufspreis","Kanal","Flohmarkt","Verkauft am","Notizen"]];
  items.forEach(it=>{
    const fm=flohmärkte.find(f=>f.id===it.flohmarktId);
    rows.push([it.name,it.kategorie,FM_STATI.find(s=>s.id===it.status)?.label||"",it.wunschpreis||"",it.verkaufspreis||"",it.kanal||"",fm?fm.name:"",it.verkauftAm||"",it.notizen||""]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="Flohmarkt_Artikel.csv";a.click();URL.revokeObjectURL(url);
}
function FlohmarktModule({onBack}) {
  const [items,setItems]     = useState([]);
  const [flohmärkte,setFm]   = useState([]);
  const [tab,setTab]=useState("lager");

  const [filterStatus,setFilterStatus] = useState("Alle");

    try{return JSON.parse(localStorage.getItem("flohmarkt_cats")||"null")||FM_DEFAULT_CATS;}catch{return FM_DEFAULT_CATS;}
  });
  const addCat = c => {
    const next=[...cats,c];
    setCats(next);
    localStorage.setItem("flohmarkt_cats",JSON.stringify(next));
  }; // datum | preis-asc | preis-desc | kat

  useSwipeBack(useCallback(()=>{if(!modal)onBack();},[modal,onBack]));
  const flash = (msg,ok=true) => {setToast({msg,ok});setTimeout(()=>setToast(null),2800);};

  useEffect(()=>{
    if(!db) return;
    const iq=query(FM_col("flohmarkt_items"),orderBy("createdAt","desc"));
    const fq=query(FM_col("flohmarkt_events"),orderBy("datum","desc"));
    const ui=onSnapshot(iq,s=>setItems(s.docs.map(d=>({id:d.id,...d.data()}))));
    const uf=onSnapshot(fq,s=>setFm(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{ui();uf();};
  },[]);

  const saveItem = async it => {
    try{
      const id=it.id||uid();

      flash(it.id?"Aktualisiert":"Artikel hinzugefuegt");

    setModal(null);
  };

    setModal(null);

  // Schnellverkauf: Artikel direkt als verkauft anlegen, ohne vorherige Erfassung

    const id=uid();

      id,
      name,
      kategorie:"Sonstiges",
      beschreibung:"",

      flohmarktId:flohmarktId||"",

  const toggleMitgenommen = async item => {

      flash(newStatus==="mitgenommen"?"Mitgenommen 🎒":"Zurück ins Lager 🏠");

  const saveFm = async fm => {
    if(fm._delete){
      try{await deleteDoc(doc(FM_col("flohmarkt_events"),fm.id));flash("Geloescht",false);}catch{flash("Fehler",false);}
      setModal(null);return;

  const totalEinnahmen = verkauft.reduce((s,i)=>s+(i.verkaufspreis||0),0);

  const filtered = useMemo(()=>{
    let res = items.filter(it=>{
